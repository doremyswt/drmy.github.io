name: Update arch images

on:
  push:
    branches:
      - main
    paths:
      - 'static/remake/current-site/arch/**'

jobs:
  update-images:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Rebuild images.json and hard_drive gallery entries
        run: |
          # Build a map of file -> git addition timestamp (newest first)
          declare -A FILE_TIMES
          for f in static/remake/current-site/arch/*.{png,jpg,jpeg,gif,webp}; do
            [ -f "$f" ] || continue
            fname=$(basename "$f")
            # timestamp of the commit that first added this file
            ts=$(git log --diff-filter=A --format=%at -- "$f" | tail -1)
            [ -z "$ts" ] && ts=$(git log --format=%at -- "$f" | tail -1)
            [ -z "$ts" ] && ts=0
            FILE_TIMES["$fname"]=$ts
          done
          # Write timestamps to a temp file for node to read
          for fname in "${!FILE_TIMES[@]}"; do
            echo "${FILE_TIMES[$fname]} $fname"
          done > /tmp/arch_file_times.txt

          node -e "
            const fs   = require('fs');
            const path = require('path');
            const archDir = 'static/remake/current-site/arch';

            // 1. Collect image files with git timestamps (newest first)
            const timeData = fs.readFileSync('/tmp/arch_file_times.txt', 'utf8').trim().split('\n');
            const fileMap = {};
            for (const line of timeData) {
              const spaceIdx = line.indexOf(' ');
              const ts = parseInt(line.slice(0, spaceIdx));
              const name = line.slice(spaceIdx + 1);
              fileMap[name] = ts;
            }
            const files = Object.keys(fileMap)
              .sort((a, b) => fileMap[b] - fileMap[a]);

            // 2. Update images.json (used by old site)
            const urls = files.map(f => '/remake/current-site/arch/' + f);
            fs.writeFileSync(path.join(archDir, 'images.json'), JSON.stringify(urls, null, 2));
            console.log('images.json: wrote', files.length, 'entries');

            // 3. Update hard_drive.json gallery children
            const hdPath = 'static/json/hard_drive.json';
            const hd = JSON.parse(fs.readFileSync(hdPath, 'utf8'));

            // Remove all existing drmyArchImg* entries
            for (const key of Object.keys(hd)) {
              if (key.startsWith('drmyArchImg')) delete hd[key];
            }

            // Recreate entries and children list
            const children = [];
            files.forEach((file, i) => {
              const id = 'drmyArchImg' + String(i).padStart(2, '0');
              const ext = path.extname(file).toLowerCase();
              const base = path.basename(file, ext);
              children.push(id);
              hd[id] = {
                id, type: 'file',
                name: file, basename: base, ext,
                storage_type: 'remote',
                url: '/remake/current-site/arch/' + file,
                parent: 'drmyGalleryFolder01',
                size: 0, children: [],
                date_created: 1676799354180,
                date_modified: 1676799354180,
                sort_option: 0, sort_order: 0
              };
            });
            hd['drmyGalleryFolder01'].children = children;

            fs.writeFileSync(hdPath, JSON.stringify(hd, null, 2));
            console.log('hard_drive.json: gallery has', children.length, 'items');
          "

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/remake/current-site/arch/images.json static/json/hard_drive.json
          git diff --cached --quiet || git commit -m "chore: sync arch gallery"
          git push origin HEAD:main
