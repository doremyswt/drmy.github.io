function toggleForumTranslation(id, button) {
  const panel = document.getElementById(id);
  if (!panel || !button) return false;
  const isHidden = panel.hasAttribute('hidden');
  if (isHidden) {
    panel.removeAttribute('hidden');
    button.textContent = 'hide english translation';
    button.setAttribute('aria-expanded', 'true');
  } else {
    panel.setAttribute('hidden', 'hidden');
    button.textContent = 'translate to english';
    button.setAttribute('aria-expanded', 'false');
  }
  return false;
}

function stripTags(html) {
  const wrapper = document.createElement('div');
  wrapper.innerHTML = html;
  return wrapper.textContent || wrapper.innerText || '';
}

function spinRow(count = 2) {
  return Array.from({ length: count }, () => '<span class="sparkle-spin" aria-hidden="true"></span>').join('');
}

function badgeBlock(label, tone = 'lavender', count = 2) {
  return `<span class="post-subtitle-label">${label}</span><span class="forum-badge-line ${tone}">${spinRow(count)}</span>`;
}

function defaultSubtitleFor(username, rankText) {
  const rank = (rankText || '').toLowerCase();
  if (username === 'drmy') return badgeBlock('Admin', 'black', 7);
  if (username === 'x_glitter_n3ko_x') return badgeBlock('Pink Elite', 'pink', 4);
  if (username === 'pixel_fairy') return badgeBlock('Pixel Club', 'lavender', 2);
  if (username === 'sakura_mochi') return badgeBlock('Sketch Bloom', 'pink', 2);
  if (username === '夜更かし_07') return badgeBlock('Night Crew', 'blue', 2);
  if (username === 'コーヒー好き') return badgeBlock('Cafe Club', 'gold', 2);
  if (username === 'midi_knight') return badgeBlock('Winamp Hours', 'blue', 2);
  if (username === 'dialup_drifter') return badgeBlock('56k Club', 'silver', 2);
  if (username === 'ghostwatcher88') return badgeBlock('Night Watch', 'silver', 2);
  if (username === 'xX_shadow_Xx') return badgeBlock('Do Not Sleep', 'silver', 2);
  if (rank.includes('admin')) return badgeBlock('Admin', 'black', 7);
  if (rank.includes('regular')) return badgeBlock('Regular', 'lavender', 2);
  if (rank.includes('new')) return badgeBlock('New Kid', 'blue', 2);
  if (rank.includes('guest')) return badgeBlock('Guest', 'silver', 2);
  return badgeBlock('Forum Kid', 'lavender', 2);
}

function applyConsistentProfiles(root) {
  root.querySelectorAll('.forum-post').forEach(post => {
    const usernameNode = post.querySelector('.post-username');
    if (!usernameNode) return;
    const username = usernameNode.textContent.trim();
    const profile = PROFILE_LIBRARY[username] || {};

    const rankNode = post.querySelector('.post-rank');
    const joinedNode = post.querySelector('.post-joined');
    const countNode = post.querySelector('.post-count');
    const avatarNode = post.querySelector('img.post-avatar');
    let subtitleNode = post.querySelector('.post-subtitle');
    let sigNode = post.querySelector('.forum-post-sig');

    if (rankNode && profile.rank) rankNode.textContent = profile.rank;
    if (joinedNode && profile.joined) joinedNode.textContent = profile.joined;
    if (countNode && profile.count) countNode.textContent = profile.count;
    if (avatarNode && profile.avatar) avatarNode.setAttribute('src', profile.avatar);
    if (avatarNode && profile.avatar) avatarNode.setAttribute('alt', `${username} avatar`);

    usernameNode.style.cssText = profile.usernameStyle || '';
    if (rankNode) rankNode.style.cssText = profile.rankStyle || '';
    if (avatarNode) avatarNode.style.cssText = profile.avatarStyle || '';
    const subtitleHtml = profile.subtitleHtml || defaultSubtitleFor(username, rankNode?.textContent?.trim());
    if (subtitleHtml) {
      if (!subtitleNode) {
        subtitleNode = document.createElement('div');
        subtitleNode.className = 'post-subtitle';
        if (rankNode) {
          rankNode.insertAdjacentElement('afterend', subtitleNode);
        } else {
          post.querySelector('.forum-post-user')?.prepend(subtitleNode);
        }
      }
      subtitleNode.innerHTML = subtitleHtml;
    }
    if (profile.signatureHtml) {
      if (!sigNode) {
        sigNode = document.createElement('div');
        sigNode.className = 'forum-post-sig';
        post.querySelector('.forum-post-body')?.appendChild(sigNode);
      }
      sigNode.innerHTML = profile.signatureHtml;
    }
  });
}

function addReplyQuotes(root) {
  const posts = Array.from(root.querySelectorAll('.forum-post'));
  posts.forEach((post, index) => {
    if (index === 0) return;
    if (post.querySelector('.forum-reply-quote')) return;

    const prevPost = posts[index - 1];
    const prevUser = prevPost.querySelector('.post-username')?.textContent?.trim();
    const prevBody = prevPost.querySelector('.forum-post-body');
    const body = post.querySelector('.forum-post-body');
    const header = body?.querySelector('.forum-post-header');
    if (!prevUser || !prevBody || !body || !header) return;

    const clone = prevBody.cloneNode(true);
    clone.querySelector('.forum-post-header')?.remove();
    clone.querySelector('.forum-post-sig')?.remove();
    clone.querySelector('.forum-reply-quote')?.remove();
    clone.querySelectorAll('.forum-translate-toggle,.forum-translation').forEach(node => node.remove());
    const excerpt = (clone.textContent || '').replace(/\s+/g, ' ').trim().slice(0, 180);
    if (!excerpt) return;

    const quote = document.createElement('div');
    quote.className = 'forum-reply-quote';
    quote.innerHTML = `<strong>${prevUser} wrote:</strong><br>${excerpt}${excerpt.length === 180 ? '...' : ''}`;
    header.insertAdjacentElement('afterend', quote);
  });
}

document.addEventListener('DOMContentLoaded', () => {
  const threads = Array.isArray(window.THREAD_DATA) ? window.THREAD_DATA : [];
  const params = new URLSearchParams(window.location.search);
  const threadId = params.get('t') || 'welcome-rules';
  const thread = threads.find(entry => entry.id === threadId);
  const titleNode = document.getElementById('thread-title');
  const breadcrumbNode = document.getElementById('thread-crumb');
  const contentNode = document.getElementById('thread-content');

  if (!thread) {
    titleNode.textContent = 'Thread not found';
    breadcrumbNode.textContent = 'missing topic';
    contentNode.innerHTML = '<div class="section-head">Missing Thread</div><div class="archive-box">That topic does not exist here anymore. Try the <a href="threads.html">thread hub</a>.</div>';
    return;
  }

  document.title = `${stripTags(thread.titleHtml)} - drmy's Art Forum`;
  titleNode.innerHTML = thread.titleHtml;
  titleNode.style.cssText = thread.titleStyle || '';
  breadcrumbNode.innerHTML = thread.titleHtml;
  contentNode.innerHTML = thread.sectionHtml;
  applyConsistentProfiles(contentNode);
  addReplyQuotes(contentNode);
});
