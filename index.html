<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>drmy archive</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#100d0a;--surface:#1a1410;--border:#2e231a;--latte:#c4a882;--cream:#f0e8dc;--muted:#7a6355}
body{background-color:var(--bg);background-image:radial-gradient(ellipse at 20% 0%,rgba(100,70,40,.18) 0%,transparent 55%),radial-gradient(ellipse at 80% 100%,rgba(60,35,15,.25) 0%,transparent 50%);color:var(--cream);font-family:'Lora',Georgia,serif;min-height:100vh}
#vhs-canvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:500;opacity:.55;mix-blend-mode:screen}
#vhs-scanlines{position:fixed;inset:0;pointer-events:none;z-index:501;background:repeating-linear-gradient(to bottom,transparent 0,transparent 3px,rgba(0,0,0,.17) 3px,rgba(0,0,0,.17) 4px)}
#vhs-band{position:fixed;left:0;right:0;height:4px;background:rgba(255,255,255,.07);pointer-events:none;z-index:502;top:-10px}
header{position:sticky;top:0;z-index:100;background:rgba(16,13,10,.9);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--border);overflow:visible;padding-top:58px}
.header-inner{max-width:960px;margin:0 auto;padding:0 28px 22px;display:flex;align-items:center;gap:22px;overflow:visible}
.avatar-wrap{position:relative;flex-shrink:0;cursor:pointer}
.avatar{width:72px;height:72px;border-radius:50%;object-fit:cover;border:2.5px solid var(--latte);display:block;transition:transform .18s,box-shadow .18s}
.avatar-wrap:hover .avatar{transform:scale(1.07);box-shadow:0 0 20px rgba(196,168,130,.4)}
.avatar-ring{position:absolute;inset:-5px;border-radius:50%;border:1px dashed var(--latte);opacity:.5;animation:spin 18s linear infinite;pointer-events:none}
@keyframes spin{to{transform:rotate(360deg)}}
.header-text{display:flex;flex-direction:column;gap:5px}
.header-name-row{display:flex;align-items:center;gap:9px}
.header-text h1{font-family:'Lora',serif;font-size:22px;font-weight:600;color:var(--cream);letter-spacing:.02em;line-height:1}
.header-text .tagline{font-family:'DM Mono',monospace;font-size:11px;font-weight:300;color:var(--muted);letter-spacing:.12em;text-transform:lowercase}
.socials{margin-left:auto;display:flex;align-items:center;gap:8px;overflow:visible}
.socials a{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--surface);transition:border-color .2s,transform .2s;text-decoration:none;color:var(--muted);flex-shrink:0}
.socials a:hover{border-color:var(--latte);color:var(--latte);transform:translateY(-2px)}
.socials a svg{width:15px;height:15px;fill:currentColor;display:block}
.socials a img{width:17px;height:17px;object-fit:contain;display:block}
.vgen-wrap{position:relative;display:flex;align-items:center}
.comm-callout{position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:3px;pointer-events:none;animation:bob 1.9s ease-in-out infinite;white-space:nowrap;z-index:200}
.comm-callout span{font-family:'DM Mono',monospace;font-size:10.5px;font-weight:400;letter-spacing:.14em;color:#d4f542;text-shadow:0 0 10px rgba(212,245,66,.7)}
.comm-arrow{width:14px;height:18px;color:#d4f542;filter:drop-shadow(0 0 4px rgba(212,245,66,.6));display:block}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-5px)}}
.divider{max-width:960px;margin:0 auto 32px;padding:36px 28px 0;display:flex;align-items:center;gap:14px}
.divider-line{flex:1;height:1px;background:var(--border)}
.divider-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;color:var(--latte);text-transform:lowercase}
.gallery{max-width:960px;margin:0 auto 60px;padding:0 28px;position:relative}
.item{position:absolute;border-radius:8px;overflow:hidden;background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:transform .22s,box-shadow .22s}
.item:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(0,0,0,.45)}
.item img{width:100%;height:auto;display:block}
.lightbox{position:fixed;inset:0;background:rgba(42,29,18,.96);display:none;justify-content:center;align-items:center;z-index:9999;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.lightbox.active{display:flex}
.lightbox img{max-width:88vw;max-height:85vh;object-fit:contain;border-radius:8px;border:1px solid rgba(196,168,130,.2);cursor:zoom-in;transition:transform .12s}
.lb-btn{position:absolute;background:rgba(245,240,232,.08);border:1px solid rgba(196,168,130,.2);color:var(--cream);border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:background .18s;user-select:none;top:50%;transform:translateY(-50%)}
.lb-btn:hover{background:rgba(245,240,232,.16)}
.lb-close{top:24px;right:24px;transform:none;font-size:14px}
.lb-prev{left:20px}.lb-next{right:20px}
.lb-counter{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);font-family:'DM Mono',monospace;font-size:11px;color:var(--latte);letter-spacing:.14em;opacity:.75}
@media(hover:none)and(pointer:coarse){.lb-prev,.lb-next{display:none}}
#game-modal{position:fixed;inset:0;background:rgba(3,2,1,.97);display:none;z-index:8000}
#game-modal.active{display:block}
#game-canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
.game-topbar{position:absolute;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:linear-gradient(to bottom,rgba(3,1,0,.82),transparent);pointer-events:none}
.game-topbar>*{pointer-events:all}
.game-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;color:var(--latte);text-transform:lowercase}
.game-topbar-right{display:flex;align-items:center;gap:8px}
.game-close,.game-credits{background:rgba(6,3,1,.75);border:1px solid var(--border);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;padding:4px 10px;border-radius:5px;cursor:pointer;transition:border-color .15s,color .15s;text-decoration:none;display:inline-flex;align-items:center}
.game-close{color:var(--muted)}.game-close:hover{color:var(--cream);border-color:var(--muted)}
.game-credits{color:#9ab8c4;border-color:#9ab8c455}.game-credits:hover{color:#c4e8f0;border-color:#9ab8c4}
.game-bottom{position:absolute;bottom:0;left:0;right:0;z-index:10;padding:8px 20px 12px;background:linear-gradient(to top,rgba(3,1,0,.82),transparent);pointer-events:none;display:flex;flex-direction:column;gap:4px;align-items:center}
.game-bottom>*{pointer-events:all}
.hp-bar-wrap{display:flex;align-items:center;gap:8px;width:100%;max-width:320px}
.hp-bar-bg{flex:1;height:4px;background:#1a0e06;border-radius:2px;overflow:hidden;border:1px solid #2e231a}
.hp-bar-fill{height:100%;border-radius:2px;transition:width .18s,background .3s;background:linear-gradient(90deg,#c4a882,#e8c49a)}
.hp-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.1em;white-space:nowrap;min-width:50px}
.game-hud-row{display:flex;justify-content:space-between;align-items:center;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.12em;width:100%;max-width:320px}
.game-hud-row span{color:var(--latte)}
#game-feedback{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.14em;text-align:center;height:14px}
.bottom-row{display:flex;align-items:center;gap:18px;flex-wrap:wrap;justify-content:center}
.ar-row{display:flex;align-items:center;gap:7px;font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.1em}
.ar-row input[type=range]{-webkit-appearance:none;appearance:none;width:80px;height:3px;border-radius:2px;background:#2e231a;outline:none;cursor:pointer}
.ar-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--latte);cursor:pointer}
.ar-val{color:var(--cream);min-width:30px;text-align:right}
.hint{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.09em}
.hint b{color:var(--latte);font-weight:400}
footer{text-align:center;padding:28px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;color:var(--muted);border-top:1px solid var(--border)}
@media(max-width:600px){.gallery{padding:0 14px}.header-inner{padding:0 18px 18px}.divider{padding:28px 16px 0}}
</style>
</head>

<script>
(function(){
  const cv=document.getElementById('vhs-canvas'),cx=cv.getContext('2d'),bd=document.getElementById('vhs-band');
  let by=-10,bs=0.7;
  function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  function tick(){
    const W=cv.width,H=cv.height,id=cx.createImageData(W,H),d=id.data;
    for(let i=0;i<d.length;i+=4)if(Math.random()<.10){const v=Math.random()*220|0;d[i]=v*.6|0;d[i+1]=v*.38|0;d[i+2]=v*.22|0;d[i+3]=Math.random()*55|0;}
    cx.putImageData(id,0,0);
    if(Math.random()<.06){const ly=Math.random()*H|0;cx.fillStyle='rgba(255,240,210,'+(Math.random()*.09).toFixed(3)+')';cx.fillRect(0,ly,W,Math.random()<.5?1:2);}
    by+=bs;if(by>window.innerHeight+12){by=-12;bs=.4+Math.random()*.9;}
    bd.style.top=by+'px';requestAnimationFrame(tick);
  }
  tick();
})();
const galleryEl=document.getElementById('gallery'),lightbox=document.getElementById('lightbox'),lbImg=document.getElementById('lightbox-img'),lbCounter=document.getElementById('lb-counter');
let images=[],items=[],currentIndex=0,zoomed=false;
const GAP=10;
function numCols(){const w=galleryEl.clientWidth;return w<480?2:w<720?3:4;}
function layout(){
  const W=galleryEl.clientWidth,cols=numCols(),colW=(W-GAP*(cols-1))/cols,hs=new Array(cols).fill(0);
  items.forEach(({el,img})=>{const nH=img.naturalHeight||0,nW=img.naturalWidth||1,iH=nH?Math.round(colW*nH/nW):colW;let col=0;for(let c=1;c<cols;c++)if(hs[c]<hs[col])col=c;el.style.width=colW+'px';el.style.left=col*(colW+GAP)+'px';el.style.top=hs[col]+'px';hs[col]+=iH+GAP;});
  galleryEl.style.height=Math.max(...hs)-GAP+'px';
}
async function loadImages(){
  try{const r=await fetch('arch/images.json');images=await r.json();}catch{images=[];}
  images.forEach((url,i)=>{const el=document.createElement('div');el.className='item';const img=document.createElement('img');img.src=url;img.loading='lazy';img.alt='';img.onclick=()=>openLB(i);img.onload=layout;img.onerror=layout;el.appendChild(img);galleryEl.appendChild(el);items.push({el,img});});
}
window.addEventListener('resize',layout);
function openLB(i){currentIndex=i;lbImg.src=images[i];lbCounter.textContent=(i+1)+' / '+images.length;lightbox.classList.add('active');zoomed=false;lbImg.style.transform='scale(1)';lbImg.style.cursor='zoom-in';}
const closeLB=()=>lightbox.classList.remove('active');
const prevLB=()=>{if(currentIndex>0)openLB(currentIndex-1);};
const nextLB=()=>{if(currentIndex<images.length-1)openLB(currentIndex+1);};
document.getElementById('lb-close').onclick=closeLB;
document.getElementById('lb-prev').onclick=prevLB;
document.getElementById('lb-next').onclick=nextLB;
lbImg.addEventListener('click',()=>{zoomed=!zoomed;lbImg.style.transform=zoomed?'scale(1.9)':'scale(1)';lbImg.style.cursor=zoomed?'zoom-out':'zoom-in';});
lbImg.addEventListener('mousemove',e=>{if(!zoomed)return;const r=lbImg.getBoundingClientRect();const x=((e.clientX-r.left)/r.width-.5)*2,y=((e.clientY-r.top)/r.height-.5)*2;lbImg.style.transform='scale(2) translate('+((-x*45))+'%,'+((-y*45))+'%)';});
lbImg.addEventListener('mouseleave',()=>{if(zoomed)lbImg.style.transform='scale(1.9)';});
lightbox.addEventListener('click',e=>{if(e.target===lightbox)closeLB();});
let lbTX=null,lbTY=null;
lightbox.addEventListener('touchstart',e=>{lbTX=e.touches[0].clientX;lbTY=e.touches[0].clientY;},{passive:true});
lightbox.addEventListener('touchend',e=>{if(lbTX===null)return;const dx=e.changedTouches[0].clientX-lbTX,dy=e.changedTouches[0].clientY-lbTY;if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){dx<0?nextLB():prevLB();}lbTX=null;lbTY=null;},{passive:true});
document.addEventListener('keydown',e=>{if(!lightbox.classList.contains('active'))return;if(e.key==='ArrowRight')nextLB();if(e.key==='ArrowLeft')prevLB();if(e.key==='Escape')closeLB();});
loadImages();

(function(){
  const modal=document.getElementById('game-modal');
  const gc=document.getElementById('game-canvas');
  const ctx=gc.getContext('2d');
  const avatarBtn=document.getElementById('avatar-btn');
  const closeBtn=document.getElementById('game-close-btn');
  const hudScore=document.getElementById('hud-score');
  const hudCombo=document.getElementById('hud-combo');
  const hpLabel=document.getElementById('hud-hp-label');
  const hpFill=document.getElementById('hp-bar-fill');
  const feedback=document.getElementById('game-feedback');
  const arSlider=document.getElementById('ar-slider');
  const arVal=document.getElementById('ar-val');

  const audioEl=document.getElementById('game-audio');
  let audioCtx=null,mediaSource=null,gainNode=null,audioReady=false;
  let gameStartTime=0,useAudioClock=false;
  function initAudio(){
    if(audioCtx)return;
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    gainNode=audioCtx.createGain();gainNode.gain.value=0.28;
    mediaSource=audioCtx.createMediaElementSource(audioEl);
    mediaSource.connect(gainNode);gainNode.connect(audioCtx.destination);
    audioReady=true;
  }
  function startAudio(){
    if(!audioReady)initAudio();
    if(audioCtx.state==='suspended')audioCtx.resume();
    audioEl.currentTime=0;gameStartTime=performance.now();
    useAudioClock=audioEl.readyState>=2;
    audioEl.play().then(()=>{useAudioClock=true;}).catch(()=>{useAudioClock=false;});
    audioEl.onended=()=>{if(phase==='playing')phase='results';};
  }
  function stopAudio(){audioEl.pause();audioEl.currentTime=0;audioEl.onended=null;useAudioClock=false;gameStartTime=0;}
  function getSongTime(){
    if(useAudioClock&&audioEl.readyState>=2&&!audioEl.paused)return audioEl.currentTime;
    return(performance.now()-gameStartTime)/1000;
  }
  function blip(ok,dir){
    if(!audioCtx)return;
    const now=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    if(ok){

  const MAX_HP=10;
  let score,combo,hp,phase='idle',raf=null;
  let arrows=[],particles=[],beatmapIdx=0;

  function resetState(){
    score=0;combo=0;hp=MAX_HP;arrows=[];particles=[];beatmapIdx=0;
    shieldDir=0;prevDir=-1;prevAt=-999;gameStartTime=0;useAudioClock=false;
    updateHUD();feedback.textContent='';
  }
  function updateHUD(){
    hudScore.textContent=score;hudCombo.textContent=combo;
    const p=Math.max(0,hp/MAX_HP*100);hpFill.style.width=p+'%';
    hpFill.style.background=hp>MAX_HP*.5?'linear-gradient(90deg,#c4a882,#e8c49a)':hp>MAX_HP*.25?'linear-gradient(90deg,#c4a882,#e8b87a)':'linear-gradient(90deg,#c49bb8,#e87a7a)';
    hpLabel.textContent='hp  '+hp+'/'+MAX_HP;
  }

  function resizeCanvas(){
    const nw=window.innerWidth,nh=window.innerHeight;
    if(gc.width===Math.round(nw*DPR)&&gc.height===Math.round(nh*DPR))return;
    gc.width=Math.round(nw*DPR);gc.height=Math.round(nh*DPR);gc.style.width=nw+'px';gc.style.height=nh+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);W=nw;H=nh;calcSizes();
  }

  function spawnArrow(dir){
    const s=spawnFor(dir),spd=speedFor(dir);
    arrows.push({x:s.x,y:s.y,vx:s.nx*spd,vy:s.ny*spd,dir,color:ARROW_COLS[dir],label:DIR_LABEL[dir],pastShield:false,dead:false});
  }

  function checkCollisions(){
    for(const a of arrows){
      if(a.dead)continue;
      const dist=Math.hypot(a.x-CX,a.y-CY);
      if(!a.pastShield){
        if(dist<=SHIELD_R+1){
          if(shieldCovers(a.dir)){
            a.dead=true;combo++;score+=100+combo*10;burst(a.x,a.y,a.color,12);blip(true,a.dir);
            feedback.textContent=combo>=10?combo+'\u00d7 COMBO!! \u2615':combo>=5?combo+'\u00d7 combo!':'parried!';feedback.style.color='#b8c49b';
          }else{a.pastShield=true;}
        }
      }else{
        if(dist<=CUP_R){
          a.dead=true;hp=Math.max(0,hp-1);combo=0;burst(CX,CY,'#c49bb8',14);blip(false,a.dir);
          feedback.textContent=hp<=0?'the coffee!! \ud83d\ude31':hp<=2?'careful!!':'ouch!';feedback.style.color='#c49bb8';
          if(hp<=0){phase='results';stopAudio();}
        }
        if(dist>Math.hypot(W,H)/1.8)a.dead=true;
      }
      updateHUD();
    }
    arrows=arrows.filter(a=>!a.dead);
  }

  function drawBg(){
    ctx.clearRect(0,0,W,H);
    const rg=ctx.createRadialGradient(CX,CY,0,CX,CY,Math.hypot(W,H)/1.6);
    rg.addColorStop(0,'rgba(20,10,4,.96)');rg.addColorStop(1,'rgba(3,1,0,.99)');
    ctx.fillStyle=rg;ctx.fillRect(0,0,W,H);
    const S=Math.min(W,H);
    for(let r=S*.06;r<Math.max(W,H)*.8;r+=S*.065){
      const a=Math.max(0,.06-r/(Math.max(W,H)*1.4));
      ctx.strokeStyle='rgba(55,28,8,'+a+')';ctx.lineWidth=5;ctx.beginPath();ctx.arc(CX,CY,r,0,Math.PI*2);ctx.stroke();
    }
    ctx.strokeStyle='rgba(196,168,130,.035)';ctx.lineWidth=1;ctx.setLineDash([3,10]);
    ctx.beginPath();ctx.moveTo(CX,0);ctx.lineTo(CX,H);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,CY);ctx.lineTo(W,CY);ctx.stroke();
    ctx.setLineDash([]);
    ctx.strokeStyle='rgba(196,168,130,.07)';ctx.lineWidth=1;ctx.setLineDash([2,6]);
    ctx.beginPath();ctx.arc(CX,CY,SHIELD_R,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
  }

  function drawShield(nowSec){
    const S=Math.min(W,H),lw=S*.014;
    const[a0,a1]=SHIELD_ARC[shieldDir];
    ctx.save();ctx.strokeStyle='rgba(212,245,66,0.88)';ctx.lineWidth=lw;ctx.lineCap='round';
    ctx.shadowColor='#d4f542';ctx.shadowBlur=S*.028;
    ctx.beginPath();ctx.arc(CX,CY,SHIELD_R,a0,a1);ctx.stroke();
    ctx.strokeStyle='rgba(240,255,160,0.3)';ctx.lineWidth=lw*.35;ctx.shadowBlur=3;
    ctx.beginPath();ctx.arc(CX,CY,SHIELD_R*.92,a0,a1);ctx.stroke();
    ctx.restore();
    const grace=Math.max(0,1-(nowSec-prevAt)/GRACE);
    if(prevDir>=0&&grace>0){
      const[ga0,ga1]=SHIELD_ARC[prevDir];
      ctx.save();ctx.strokeStyle='rgba(212,245,66,'+(grace*.3)+')';ctx.lineWidth=lw*.6;ctx.lineCap='round';
      ctx.setLineDash([4,7]);ctx.beginPath();ctx.arc(CX,CY,SHIELD_R,ga0,ga1);ctx.stroke();ctx.setLineDash([]);ctx.restore();
    }
    const d=SHIELD_R*1.55,fs=Math.max(11,S*.018);
    const lp=[{dir:0,x:CX-d,y:CY},{dir:1,x:CX,y:CY-d},{dir:2,x:CX+d,y:CY},{dir:3,x:CX,y:CY+d}];
    lp.forEach(({dir,x,y})=>{
      const active=dir===shieldDir,graceOn=dir===prevDir&&grace>0;
      ctx.save();ctx.font='bold '+fs+'px "DM Mono",monospace';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle=active?ARROW_COLS[dir]:graceOn?ARROW_COLS[dir]+Math.round(grace*100).toString(16).padStart(2,'0'):ARROW_COLS[dir]+'22';
      if(active){ctx.shadowColor=ARROW_COLS[dir];ctx.shadowBlur=8;}
      ctx.fillText(DIR_LABEL[dir],x,y);ctx.restore();
    });
  }

  function drawCup(){
    const r=CUP_R,bw=r*2.6,bh=r*2.3,x=CX-bw/2,y=CY-bh/2;
    ctx.save();ctx.beginPath();ctx.ellipse(CX,CY+bh*.55,bw*.52,r*.32,0,0,Math.PI*2);ctx.fillStyle='#2a1808';ctx.fill();ctx.strokeStyle='#c4a882';ctx.lineWidth=.8;ctx.stroke();ctx.restore();
    ctx.save();ctx.beginPath();ctx.roundRect(x,y,bw,bh,r*.35);ctx.fillStyle='#1c0e07';ctx.fill();ctx.strokeStyle='#c4a882';ctx.lineWidth=1;ctx.stroke();ctx.restore();
    ctx.save();ctx.strokeStyle='#c4a882';ctx.lineWidth=.8;ctx.beginPath();ctx.arc(CX+bw/2+r*.38,CY,r*.42,-Math.PI*.42,Math.PI*.42);ctx.stroke();ctx.restore();
    ctx.save();ctx.beginPath();ctx.ellipse(CX,CY-bh*.14,bw*.32,bh*.09,0,0,Math.PI*2);ctx.fillStyle='#0d0702';ctx.fill();ctx.strokeStyle='#6b5a4e';ctx.lineWidth=.5;ctx.stroke();
    ctx.fillStyle='rgba(196,168,130,.48)';ctx.beginPath();
    const hx=CX,hy=CY-bh*.1,hr=r*.24;
    ctx.moveTo(hx,hy+hr);ctx.bezierCurveTo(hx,hy-hr*1.5,hx-hr*2.4,hy-hr*.75,hx-hr*2.4,hy+hr*.3);ctx.bezierCurveTo(hx-hr*2.4,hy+hr*2,hx,hy+hr*3.4,hx,hy+hr*3.4);ctx.bezierCurveTo(hx,hy+hr*3.4,hx+hr*2.4,hy+hr*2,hx+hr*2.4,hy+hr*.3);ctx.bezierCurveTo(hx+hr*2.4,hy-hr*.75,hx,hy-hr*1.5,hx,hy+hr);ctx.fill();ctx.restore();
    const t=performance.now()/1000;
    for(let i=0;i<2;i++){const sx=CX+(i===0?-r*.5:r*.42),wv=Math.sin(t*1.5+i*2)*r*.18;ctx.save();ctx.strokeStyle='rgba(107,90,78,.44)';ctx.lineWidth=1;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(sx,CY-bh*.52);ctx.quadraticCurveTo(sx+wv,CY-bh*.86,sx-wv,CY-bh*1.2);ctx.stroke();ctx.restore();}
  }

  function drawArrows(dt){
    const S=Math.min(W,H),sz=S*.018,trail=sz*3.5;
    for(const a of arrows){
      if(a.dead)continue;
      a.x+=a.vx*dt;a.y+=a.vy*dt;
      const dist=Math.hypot(a.x-CX,a.y-CY);
      const maxD=Math.hypot(W/2,H/2);
      const alpha=Math.min(1,.15+(maxD-dist)/(maxD-SHIELD_R)*1.1);
      const angle=Math.atan2(a.vy,a.vx);
      ctx.save();ctx.globalAlpha=Math.max(0,Math.min(1,alpha));ctx.translate(a.x,a.y);ctx.rotate(angle);
      const tg=ctx.createLinearGradient(-trail,0,0,0);tg.addColorStop(0,'transparent');tg.addColorStop(1,a.color+(a.pastShield?'cc':'55'));
      ctx.strokeStyle=tg;ctx.lineWidth=a.pastShield?sz*.5:sz*.35;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(-trail,0);ctx.lineTo(-sz*.1,0);ctx.stroke();
      ctx.fillStyle=a.color;ctx.shadowColor=a.pastShield?'#c49bb8':a.color;ctx.shadowBlur=a.pastShield?sz*1.3:sz*.7;
      ctx.beginPath();ctx.moveTo(sz,0);ctx.lineTo(-sz*.38,-sz*.6);ctx.lineTo(-sz*.1,0);ctx.lineTo(-sz*.38,sz*.6);ctx.closePath();ctx.fill();
      ctx.restore();
      ctx.save();ctx.globalAlpha=Math.max(0,Math.min(1,alpha))*.82;
      ctx.font='bold '+(sz*.85)+'px "DM Mono",monospace';ctx.fillStyle=a.color;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(a.label,a.x+Math.cos(angle+Math.PI/2)*sz*1.05,a.y+Math.sin(angle+Math.PI/2)*sz*1.05);ctx.restore();
    }
  }

  function drawParticles(nowSec){
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i],age=nowSec-p.born;
      if(age>.5){particles.splice(i,1);continue;}
      ctx.save();ctx.globalAlpha=1-age/.5;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x+p.vx*age*80,p.y+p.vy*age*80,p.r*(1-age*.5),0,Math.PI*2);ctx.fill();ctx.restore();
    }
  }
  function burst(x,y,color,n){
    const now=performance.now()/1000;
    for(let i=0;i<n;i++){const a=(Math.PI*2*i/n)+Math.random()*.4;particles.push({x,y,vx:Math.cos(a),vy:Math.sin(a),r:2+Math.random()*3,color,born:now});}
  }

  let lastT=null;
  function loop(){
    const nowMs=performance.now(),nowSec=nowMs/1000,dt=lastT!==null?Math.min(nowSec-lastT,.05):0;
    lastT=nowSec;resizeCanvas();
    if(phase==='playing'){
      const songT=getSongTime();
      while(beatmapIdx<BEATMAP.length){
        const note=BEATMAP[beatmapIdx];
        if(songT>=note.time-approachRate){spawnArrow(note.dir);beatmapIdx++;}else break;
      }
      drawBg();checkCollisions();drawShield(nowSec);drawArrows(dt);drawParticles(nowSec);drawCup();
      if(combo>=3){const S=Math.min(W,H);ctx.save();ctx.font='bold '+(12+Math.min(combo,18)*.35)+'px "DM Mono",monospace';ctx.fillStyle=combo>=10?'#d4f542':'#c4a882';ctx.textAlign='center';ctx.textBaseline='middle';ctx.globalAlpha=.42;ctx.fillText(combo+'\u00d7',CX,CY+SHIELD_R*1.55);ctx.restore();}
      if((audioEl.ended||(!useAudioClock&&getSongTime()>236))&&arrows.length===0)phase='results';
    }else if(phase==='results'){
      drawBg();drawCup();ctx.fillStyle='rgba(4,2,0,.88)';ctx.fillRect(0,0,W,H);
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle='#c4a882';ctx.font='600 30px Lora,serif';ctx.fillText('\u7d50\u679c',CX,CY-50);
      ctx.font='14px "DM Mono",monospace';ctx.fillStyle='#e8ddd0';ctx.fillText('score  '+score,CX,CY-12);
      ctx.fillStyle=hp>0?'#b8c49b':'#c49bb8';ctx.fillText(hp>0?'coffee safe! \u2615':'the coffee spilled~',CX,CY+14);
      ctx.fillStyle='#7a6355';ctx.font='11px "DM Mono",monospace';ctx.fillText('press any key \u00b7 tap to retry',CX,CY+46);
      if(!feedback.textContent){feedback.textContent=score>5000?'perfect guard! \u2736':score>2000?'well done~':'try again \u2661';feedback.style.color='#c4a882';}
    }else{
      drawBg();drawShield(nowSec);drawCup();ctx.fillStyle='rgba(4,2,0,.7)';ctx.fillRect(0,0,W,H);
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle='#c4a882';ctx.font='600 22px Lora,serif';ctx.fillText('\u52d8\u5180\u3048\u3066\u60b2\u3057\u3044\u308f',CX,CY-SHIELD_R*1.7);
      ctx.fillStyle='#7a6355';ctx.font='12px "DM Mono",monospace';ctx.fillText('press any arrow key to start',CX,CY-SHIELD_R*1.2);
      ctx.fillStyle='#4a3525';ctx.font='10px "DM Mono",monospace';ctx.fillText('rotate shield \u00b7 protect the coffee \u2615',CX,CY-SHIELD_R*.8);
    }
    raf=requestAnimationFrame(loop);
  }

  function onDir(dir){if(phase==='idle'||phase==='results'){startGame();return;}setShield(dir);}
  document.addEventListener('keydown',e=>{
    if(!modal.classList.contains('active'))return;if(e.target===arSlider)return;e.preventDefault();
    const k=e.key.toLowerCase();if(k in DIR_KEYS){onDir(DIR_KEYS[k]);return;}if(e.key==='Escape')closeGame();
  });
  function quadrant(x,y){const dx=x-CX,dy=y-CY;return Math.abs(dx)>Math.abs(dy)?(dx<0?0:2):(dy<0?1:3);}
  gc.addEventListener('touchstart',e=>{e.preventDefault();const r=gc.getBoundingClientRect();for(const t of e.changedTouches)onDir(quadrant(t.clientX-r.left,t.clientY-r.top));},{passive:false});
  gc.addEventListener('click',e=>{const r=gc.getBoundingClientRect();onDir(quadrant(e.clientX-r.left,e.clientY-r.top));});

  async function startGame(){
    initAudio();if(audioCtx.state==='suspended')await audioCtx.resume();
    resetState();phase='playing';lastT=null;startAudio();
  }
  function closeGame(){
    stopAudio();phase='idle';modal.classList.remove('active');
    if(raf){cancelAnimationFrame(raf);raf=null;}arrows=[];particles=[];feedback.textContent='';lastT=null;
  }
  window.addEventListener('resize',()=>{if(modal.classList.contains('active')){W=window.innerWidth;H=window.innerHeight;calcSizes();}});
  avatarBtn.addEventListener('click',()=>{
    modal.classList.add('active');W=window.innerWidth;H=window.innerHeight;
    resizeCanvas();calcSizes();initAudio();phase='idle';resetState();lastT=null;
    if(raf)cancelAnimationFrame(raf);raf=requestAnimationFrame(loop);
  });
  closeBtn.addEventListener('click',closeGame);
  modal.addEventListener('click',e=>{if(e.target===modal)closeGame();});
})();
</script>
</body>
</html>
