<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>drmy archive</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #100d0a;
    --surface: #1a1410;
    --border: #2e231a;
    --latte: #c4a882;
    --steam: #6b5a4e;
    --cream: #f0e8dc;
    --muted: #7a6355;
    --espresso: #e8ddd0;
  }

  body {
    background-color: var(--bg);
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(100,70,40,0.18) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 100%, rgba(60,35,15,0.25) 0%, transparent 50%);
    color: var(--cream);
    font-family: 'Lora', Georgia, serif;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(16,13,10,0.88);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
  }

  .header-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 22px 28px;
    display: flex;
    align-items: center;
    gap: 22px;
  }

  .avatar-wrap {
    position: relative;
    flex-shrink: 0;
  }

  .avatar {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    object-fit: cover;
    border: 2.5px solid var(--latte);
    display: block;
  }

  .avatar-ring {
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    border: 1px dashed var(--latte);
    opacity: 0.5;
    animation: spin 18s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .header-text h1 {
    font-family: 'Lora', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--cream);
    letter-spacing: 0.02em;
  }

  .header-text .tagline {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 300;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.12em;
    text-transform: lowercase;
  }

  .cup-icon {
    margin-left: auto;
    opacity: 0.35;
    font-size: 22px;
    line-height: 1;
  }

  /* ── DIVIDER ── */
  .divider {
    max-width: 960px;
    margin: 0 auto 32px;
    padding: 0 28px;
    display: flex;
    align-items: center;
    gap: 14px;
    padding-top: 36px;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .divider-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--latte);
    text-transform: lowercase;
  }

  /* ── GALLERY (js masonry) ── */
  .gallery {
    max-width: 960px;
    margin: 0 auto 60px;
    padding: 0 28px;
    position: relative;
  }

  .item {
    position: absolute;
    border-radius: 8px;
    overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: transform 0.22s ease, box-shadow 0.22s ease;
  }

  .item:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 28px rgba(0,0,0,0.45);
  }

  .item img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* ── LIGHTBOX ── */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(42,29,18,0.96);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .lightbox.active { display: flex; }

  .lightbox img {
    max-width: 88vw;
    max-height: 85vh;
    object-fit: contain;
    border-radius: 8px;
    border: 1px solid rgba(196,168,130,0.2);
    cursor: zoom-in;
    transition: transform 0.12s ease;
  }

  .lb-btn {
    position: absolute;
    background: rgba(245,240,232,0.08);
    border: 1px solid rgba(196,168,130,0.2);
    color: var(--cream);
    border-radius: 50%;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    transition: background 0.18s ease;
    user-select: none;
    top: 50%;
    transform: translateY(-50%);
  }

  .lb-btn:hover { background: rgba(245,240,232,0.16); }
  .lb-close { top: 24px; right: 24px; transform: none; font-size: 14px; }
  .lb-prev { left: 20px; }
  .lb-next { right: 20px; }

  .lb-counter {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--latte);
    letter-spacing: 0.14em;
    opacity: 0.75;
  }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 28px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--muted);
    border-top: 1px solid var(--border);
  }

  @media (max-width: 600px) {
    .gallery { padding: 0 14px; }
    .header-inner { padding: 16px 18px; }
    .divider { padding: 28px 16px 0; }
    .lb-btn.lb-prev { left: 8px; }
    .lb-btn.lb-next { right: 8px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="avatar-wrap">
      <div class="avatar-ring"></div>
      <img src="me.png" class="avatar" alt="drmy">
    </div>
    <div class="header-text">
      <h1>drmy</h1>
      <p class="tagline">archive · est. always</p>
    </div>
    <div class="cup-icon">☕</div>
  </div>
</header>

<div class="divider">
  <div class="divider-line"></div>
  <span class="divider-label">gallery</span>
  <div class="divider-line"></div>
</div>

<div class="gallery" id="gallery"></div>

<footer>brewed with care &nbsp;·&nbsp; drmy archive</footer>

<div class="lightbox" id="lightbox">
  <div class="lb-btn lb-close" id="lb-close">✕</div>
  <div class="lb-btn lb-prev" id="lb-prev">‹</div>
  <div class="lb-btn lb-next" id="lb-next">›</div>
  <img id="lightbox-img" alt="">
  <div class="lb-counter" id="lb-counter"></div>
</div>

<script>
  const galleryEl = document.getElementById("gallery");
  const lightbox  = document.getElementById("lightbox");
  const lbImg     = document.getElementById("lightbox-img");
  const lbCounter = document.getElementById("lb-counter");

  let images = [];
  let items  = [];
  let currentIndex = 0;
  let zoomed = false;

  const GAP = 10;

  function numCols() {
    const w = galleryEl.clientWidth;
    if (w < 480) return 2;
    if (w < 720) return 3;
    return 4;
  }

  function layout() {
    const totalW = galleryEl.clientWidth;
    const cols   = numCols();
    const colW   = (totalW - GAP * (cols - 1)) / cols;
    const heights = new Array(cols).fill(0);

    // Process images left-to-right: for each image pick the column
    // that currently has the minimum height, left-biased on ties.
    items.forEach(({ el, img }) => {
      const naturalH = img.naturalHeight || 0;
      const naturalW = img.naturalWidth  || 1;
      const itemH    = naturalH ? Math.round(colW * naturalH / naturalW) : colW;

      // Find shortest column (left-biased)
      let col = 0;
      for (let c = 1; c < cols; c++) {
        if (heights[c] < heights[col]) col = c;
      }

      const x = col * (colW + GAP);
      const y = heights[col];

      el.style.width  = colW + "px";
      el.style.left   = x + "px";
      el.style.top    = y + "px";

      heights[col] += itemH + GAP;
    });

    galleryEl.style.height = Math.max(...heights) - GAP + "px";
  }

  async function loadImages() {
    const res = await fetch("arch/images.json");
    images = await res.json();

    let loaded = 0;
    images.forEach((url, i) => {
      const el  = document.createElement("div");
      el.className = "item";
      const img = document.createElement("img");
      img.src     = url;
      img.loading = "lazy";
      img.alt     = "";
      img.onclick = () => openLB(i);

      img.onload = () => { loaded++; if (loaded === images.length) layout(); else layout(); };
      img.onerror = () => { loaded++; layout(); };

      el.appendChild(img);
      galleryEl.appendChild(el);
      items.push({ el, img });
    });

    layout();
  }

  window.addEventListener("resize", layout);

  /* ── LIGHTBOX ── */
  function openLB(i) {
    currentIndex = i;
    lbImg.src = images[i];
    lbCounter.textContent = (i + 1) + " / " + images.length;
    lightbox.classList.add("active");
    zoomed = false;
    lbImg.style.transform = "scale(1)";
    lbImg.style.cursor    = "zoom-in";
  }

  function closeLB() { lightbox.classList.remove("active"); }
  function prevLB()  { if (currentIndex > 0)               openLB(currentIndex - 1); }
  function nextLB()  { if (currentIndex < images.length-1) openLB(currentIndex + 1); }

  document.getElementById("lb-close").onclick = closeLB;
  document.getElementById("lb-prev").onclick  = prevLB;
  document.getElementById("lb-next").onclick  = nextLB;

  lbImg.addEventListener("click", () => {
    zoomed = !zoomed;
    lbImg.style.transform = zoomed ? "scale(1.9)" : "scale(1)";
    lbImg.style.cursor    = zoomed ? "zoom-out"   : "zoom-in";
  });

  lbImg.addEventListener("mousemove", e => {
    if (!zoomed) return;
    const rect = lbImg.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width  - 0.5) * 2;
    const y = ((e.clientY - rect.top)  / rect.height - 0.5) * 2;
    lbImg.style.transform = `scale(2) translate(${-x*45}%,${-y*45}%)`;
  });

  lbImg.addEventListener("mouseleave", () => { if (zoomed) lbImg.style.transform = "scale(1.9)"; });
  lightbox.addEventListener("click", e => { if (e.target === lightbox) closeLB(); });

  document.addEventListener("keydown", e => {
    if (!lightbox.classList.contains("active")) return;
    if (e.key === "ArrowRight") nextLB();
    if (e.key === "ArrowLeft")  prevLB();
    if (e.key === "Escape")     closeLB();
  });

  loadImages();
</script>
</body>
</html>
