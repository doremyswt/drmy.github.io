<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>drmy archive</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #2a1f1a, #0d0d0d);
  color: #eee;
}

/* HEADER */
.top {
  padding: 60px 20px 30px;
  background: rgba(40, 28, 22, 0.55);
  backdrop-filter: blur(12px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  position: sticky;
  top: 0;
  z-index: 10;
}
.profile { display: flex; align-items: center; gap: 25px; max-width:900px; margin:auto; }
.avatar { width: 90px; height: 90px; border-radius:50%; object-fit:cover; }
.info h1 { margin:0; font-size:24px; }
.info p { margin:6px 0 14px; opacity:0.7; color:#d6c2b8; }

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 10px;
  max-width:1200px;
  margin: 40px auto;
}
.item img {
  width:100%;
  height:auto;
  display:block;
  border-radius:6px;
  cursor:pointer;
}

/* LIGHTBOX */
.lightbox {
  position: fixed;
  inset:0;
  background: rgba(0,0,0,0.95);
  display: none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
.lightbox.active { display:flex; }
.lightbox img {
  max-width: 90vw;
  max-height: 90vh;
  object-fit:contain;
  transition: transform 0.1s;
  cursor: zoom-in;
}
.lightbox .nav {
  position:absolute;
  top:50%;
  transform: translateY(-50%);
  font-size:2rem;
  color:#fff;
  background: rgba(0,0,0,0.3);
  padding:10px 15px;
  border-radius:50%;
  cursor:pointer;
  user-select:none;
}
.lightbox .prev { left:20px; }
.lightbox .next { right:20px; }
.lightbox .close { top:20px; right:20px; transform:none; }

/* MOBILE */
@media(max-width:700px) {
  .lightbox img { max-width:95vw; max-height:80vh; }
}
</style>
</head>
<body>

<header class="top">
  <div class="profile">
    <img src="me.png" class="avatar">
    <div class="info">
      <h1>drmy</h1>
      <p>socials</p>
    </div>
  </div>
</header>

<div class="gallery" id="gallery"></div>

<div class="lightbox" id="lightbox">
  <div class="close nav">&#10005;</div>
  <div class="prev nav">&#10094;</div>
  <div class="next nav">&#10095;</div>
  <img id="lightbox-img">
</div>

<script>
const gallery = document.getElementById("gallery");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");
const closeBtn = lightbox.querySelector(".close");
const prevBtn = lightbox.querySelector(".prev");
const nextBtn = lightbox.querySelector(".next");

let images = [];
let currentIndex = 0;
let zoomed = false;

async function loadImages() {
  const res = await fetch("arch/images.json");
  images = await res.json();
  images.forEach((url,index)=>{
    const div=document.createElement("div");
    div.className="item";
    const img=document.createElement("img");
    img.src=url;
    img.onclick=()=>openLightbox(index);
    div.appendChild(img);
    gallery.appendChild(div);
  });
}

function openLightbox(index){
  currentIndex=index;
  lightboxImg.src=images[currentIndex];
  lightbox.classList.add("active");
  zoomed=false;
  lightboxImg.style.transform="translate(0px,0px) scale(1)";
}

function closeLightbox(){ lightbox.classList.remove("active"); }
function showPrev(){ if(currentIndex>0) openLightbox(currentIndex-1); }
function showNext(){ if(currentIndex<images.length-1) openLightbox(currentIndex+1); }

closeBtn.onclick=closeLightbox;
prevBtn.onclick=showPrev;
nextBtn.onclick=showNext;

// Arrow keys
document.addEventListener('keydown', e=>{
  if(!lightbox.classList.contains('active')) return;
  if(e.key==='ArrowRight') showNext();
  if(e.key==='ArrowLeft') showPrev();
  if(e.key==='Escape') closeLightbox();
});

// Zoom following cursor
lightboxImg.addEventListener('mousemove', e=>{
  if(!zoomed) return;
  const rect=lightboxImg.getBoundingClientRect();
  const x=((e.clientX-rect.left)/rect.width-0.5)*2;
  const y=((e.clientY-rect.top)/rect.height-0.5)*2;
  lightboxImg.style.transform=`scale(2) translate(${-x*50}%,${-y*50}%)`;
});
lightboxImg.addEventListener('mouseleave', ()=>{ if(zoomed) lightboxImg.style.transform="scale(1)"; });

// Toggle zoom
lightboxImg.addEventListener('click', ()=>{
  zoomed=!zoomed;
  lightboxImg.style.cursor = zoomed?'grab':'zoom-in';
  if(!zoomed) lightboxImg.style.transform="translate(0px,0px) scale(1)";
});
</script>
<script>loadImages();</script>

</body>
</html>
