<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>drmy archive</title>

<style>
/* BODY & BACKGROUND */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: #eee;
  background: radial-gradient(circle at top, #2a1f1a, #0d0d0d);
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  opacity: 0.035;
  background-image: url("https://grainy-gradients.vercel.app/noise.svg");
}

/* HEADER */
.top {
  padding: 60px 20px 30px;
  background: rgba(40, 28, 22, 0.55);
  backdrop-filter: blur(12px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.profile {
  max-width: 900px;
  margin: auto;
  display: flex;
  align-items: center;
  gap: 25px;
}
.avatar {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  object-fit: cover;
}

/* INFO & LINKS */
.info h1 { margin:0; font-size:24px; letter-spacing:1px; }
.info p { margin:6px 0 14px; opacity:0.7; color:#d6c2b8; }
.links a {
  margin-right: 15px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  color:#aaa;
  transition:0.2s;
  text-decoration:none;
}
.links a:hover { color:#f2d2b6; transform:scale(1.15); }
.links svg { width:20px; height:20px; fill:currentColor; }
.social-icon { width:20px; height:20px; object-fit:contain; transition:0.2s; }
.links a:hover .social-icon { transform:scale(1.15); }

/* GALLERY */
.gallery {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
  grid-auto-rows: 20px;
  gap: 10px;
}
.item { border-radius:6px; }
.gallery img {
  width:100%;
  height:auto;
  display:block;
  border-radius:6px;
  transition: transform 0.2s ease, opacity 0.2s;
  cursor:pointer;
}
.gallery img:hover {
  transform:scale(1.02);
  opacity:0.9;
  box-shadow:0 0 20px rgba(255,255,255,0.08);
}

/* LIGHTBOX */
.lightbox {
  position: fixed;
  inset:0;
  background: rgba(0,0,0,0.95);
  display: none;
  justify-content: start;
  align-items: center;
  z-index: 999;
  overflow-x: auto;
  padding: 40px;
  cursor: grab;
  scroll-behavior: smooth;
  white-space: nowrap;
}
.lightbox.active { display:flex; }
.lightbox img {
  border-radius:6px;
  max-height:90vh;
  height:auto;
  width:auto;
  display:inline-block;
  margin-right:20px;
  transition: transform 0.3s ease;
  cursor: zoom-in;
}
.lightbox img.zoomed { transform: scale(2); cursor: zoom-out; }

/* RESPONSIVE MASONRY */
@media (max-width: 1000px) { .gallery { grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); } }
@media (max-width: 700px)  { .gallery { grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); } }
@media (max-width: 400px)  { .gallery { grid-template-columns: repeat(auto-fill, minmax(100%,1fr)); } }
</style>
</head>

<body>
<header class="top">

<div class="gallery" id="gallery"></div>

<div class="lightbox" id="lightbox"></div>

<script>
const gallery = document.getElementById("gallery");
const lightbox = document.getElementById("lightbox");

async function loadImages() {
  const res = await fetch("arch/images.json");
  const images = await res.json();

  images.forEach(url => {
    // gallery
    const div = document.createElement("div");
    div.className = "item";
    const img = document.createElement("img");
    img.src = url;
    img.loading = "lazy";
    img.onclick = () => lightbox.classList.add("active");
    div.appendChild(img);
    gallery.appendChild(div);

    // lightbox
    const lbImg = document.createElement("img");
    lbImg.src = url;
    lbImg.addEventListener('click', e => {
      e.stopPropagation();
      lbImg.classList.toggle('zoomed');
    });
    lightbox.appendChild(lbImg);
  });

  // masonry adjustment
  const galleryItems = document.querySelectorAll('.gallery .item');
  galleryItems.forEach(item => {
    const img = item.querySelector('img');
    img.onload = () => {
      const rowHeight = parseInt(getComputedStyle(gallery).getPropertyValue('grid-auto-rows'));
      const rowGap = parseInt(getComputedStyle(gallery).getPropertyValue('gap'));
      const rowSpan = Math.ceil((img.getBoundingClientRect().height + rowGap) / (rowHeight + rowGap));
      item.style.gridRowEnd = `span ${rowSpan}`;
    };
  });
}

loadImages();

// lightbox drag scroll
let isDown = false, startX, scrollLeft;
lightbox.addEventListener('mousedown', e => { isDown=true; lightbox.style.cursor='grabbing'; startX=e.pageX-lightbox.offsetLeft; scrollLeft=lightbox.scrollLeft; });
lightbox.addEventListener('mouseleave', ()=>{isDown=false; lightbox.style.cursor='grab';});
lightbox.addEventListener('mouseup', ()=>{isDown=false; lightbox.style.cursor='grab';});
lightbox.addEventListener('mousemove', e => { if(!isDown) return; e.preventDefault(); const x=e.pageX-lightbox.offsetLeft; lightbox.scrollLeft=scrollLeft-(x-startX)*2; });

// arrow keys scroll
document.addEventListener('keydown', e => {
  if(!lightbox.classList.contains('active')) return;
  if(e.key==='ArrowRight') lightbox.scrollBy({left:300, behavior:'smooth'});
  if(e.key==='ArrowLeft')  lightbox.scrollBy({left:-300, behavior:'smooth'});
});

// click background to close
lightbox.addEventListener('click', e => { if(e.target===lightbox) lightbox.classList.remove('active'); });
</script>
