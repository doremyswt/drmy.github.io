<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>drmy archive</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #100d0a;
    --surface: #1a1410;
    --border: #2e231a;
    --latte: #c4a882;
    --steam: #6b5a4e;
    --cream: #f0e8dc;
    --muted: #7a6355;
    --espresso: #e8ddd0;
  }

  body {
    background-color: var(--bg);
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(100,70,40,0.18) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 100%, rgba(60,35,15,0.25) 0%, transparent 50%);
    color: var(--cream);
    font-family: 'Lora', Georgia, serif;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(16,13,10,0.88);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
  }

  .header-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 22px 28px;
    display: flex;
    align-items: center;
    gap: 22px;
  }

  .avatar-wrap {
    position: relative;
    flex-shrink: 0;
  }

  .avatar {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    object-fit: cover;
    border: 2.5px solid var(--latte);
    display: block;
  }

  .avatar-ring {
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    border: 1px dashed var(--latte);
    opacity: 0.5;
    animation: spin 18s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .header-text h1 {
    font-family: 'Lora', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--cream);
    letter-spacing: 0.02em;
  }

  .header-text .tagline {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 300;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.12em;
    text-transform: lowercase;
  }

  .cup-icon { display: none; }
  .socials { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .socials a { display: flex; align-items: center; justify-content: center; width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); transition: border-color .2s, transform .2s; text-decoration: none; color: var(--muted); flex-shrink: 0; }
  .socials a:hover { border-color: var(--latte); color: var(--latte); transform: translateY(-2px); }
  .socials a svg { width: 15px; height: 15px; fill: currentColor; display: block; }
  .socials a img { width: 17px; height: 17px; object-fit: contain; display: block; }
  .vgen-wrap { position: relative; display: flex; align-items: center; }
  .comm-callout {
    position: absolute;
    bottom: calc(100% + 6px);
    right: -4px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
    pointer-events: none;
    animation: bob 1.8s ease-in-out infinite;
    white-space: nowrap;
  }
  .comm-callout span {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.14em;
    color: #d4f542;
    text-shadow: 0 0 12px rgba(212,245,66,0.6);
  }
  .comm-arrow {
    width: 40px;
    height: 26px;
    color: #d4f542;
    filter: drop-shadow(0 0 4px rgba(212,245,66,0.5));
    transform: scaleX(-1);
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-4px); }
  }

  /* ── DIVIDER ── */
  .divider {
    max-width: 960px;
    margin: 0 auto 32px;
    padding: 0 28px;
    display: flex;
    align-items: center;
    gap: 14px;
    padding-top: 36px;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .divider-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--latte);
    text-transform: lowercase;
  }

  /* ── GALLERY (js masonry) ── */
  .gallery {
    max-width: 960px;
    margin: 0 auto 60px;
    padding: 0 28px;
    position: relative;
  }

  .item {
    position: absolute;
    border-radius: 8px;
    overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: transform 0.22s ease, box-shadow 0.22s ease;
  }

  .item:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 28px rgba(0,0,0,0.45);
  }

  .item img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* ── LIGHTBOX ── */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(42,29,18,0.96);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .lightbox.active { display: flex; }

  .lightbox img {
    max-width: 88vw;
    max-height: 85vh;
    object-fit: contain;
    border-radius: 8px;
    border: 1px solid rgba(196,168,130,0.2);
    cursor: zoom-in;
    transition: transform 0.12s ease;
  }

  .lb-btn {
    position: absolute;
    background: rgba(245,240,232,0.08);
    border: 1px solid rgba(196,168,130,0.2);
    color: var(--cream);
    border-radius: 50%;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    transition: background 0.18s ease;
    user-select: none;
    top: 50%;
    transform: translateY(-50%);
  }

  .lb-btn:hover { background: rgba(245,240,232,0.16); }
  .lb-close { top: 24px; right: 24px; transform: none; font-size: 14px; }
  .lb-prev { left: 20px; }
  .lb-next { right: 20px; }

  .lb-counter {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--latte);
    letter-spacing: 0.14em;
    opacity: 0.75;
  }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 28px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--muted);
    border-top: 1px solid var(--border);
  }

  @media (max-width: 600px) {
    .gallery { padding: 0 14px; }
    .header-inner { padding: 16px 18px; }
    .divider { padding: 28px 16px 0; }
    .lb-btn.lb-prev { left: 8px; }
    .lb-btn.lb-next { right: 8px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="avatar-wrap">
      <div class="avatar-ring"></div>
      <img src="me.png" class="avatar" alt="drmy">
    </div>
    <div class="header-text">
      <h1>drmy</h1>
      <p class="tagline">archive · est. always</p>
    </div>
    <div class="socials">
      <a href="https://twitter.com/doremyswt" target="_blank" title="Twitter / X">
        <svg viewBox="0 0 24 24"><path d="M22 5.8c-.7.3-1.5.6-2.3.7.8-.5 1.4-1.2 1.7-2.1-.8.5-1.7.8-2.6 1C18 4.5 17 4 16 4c-2 0-3.5 1.7-3.5 3.7 0 .3 0 .6.1.9-3-.2-5.6-1.6-7.3-3.8-.3.6-.5 1.2-.5 1.9 0 1.3.7 2.5 1.7 3.2-.6 0-1.2-.2-1.7-.5 0 1.8 1.3 3.3 3 3.6-.3.1-.7.1-1 .1-.2 0-.5 0-.7-.1.5 1.5 1.9 2.6 3.6 2.6-1.3 1-3 1.6-4.8 1.6H2c1.7 1.1 3.7 1.7 5.8 1.7 7 0 10.8-5.9 10.8-11v-.5c.7-.5 1.4-1.2 1.9-2z"/></svg>
      </a>
      <a href="https://www.pixiv.net/en/users/105940981" target="_blank" title="Pixiv">
        <svg viewBox="0 0 48 48"><path d="M 25 2 C 12.317 2 2 12.317 2 25 C 2 37.683 12.317 48 25 48 C 37.683 48 48 37.683 48 25 C 48 12.317 37.683 2 25 2 z M 26.300781 12.009766 C 35.827781 12.009766 39.291969 18.146531 39.292969 23.269531 C 39.292969 28.539531 34.961781 33.662109 26.300781 33.662109 C 23.332781 33.662109 20.992094 32.832375 19.371094 31.984375 L 19.371094 36.259766 L 20.238281 36.259766 L 20.238281 37.992188 L 15.041016 37.992188 L 15.041016 36.259766 L 15.90625 36.259766 L 15.90625 17.945312 C 14.85625 18.643313 13.308594 20.669922 13.308594 20.669922 L 13.308594 22.070312 L 12.443359 22.070312 L 10.710938 18.939453 C 10.710938 18.939453 16.773781 12.009766 26.300781 12.009766 z M 26.300781 14.164062 C 23.557781 14.164062 21.249094 14.824656 19.371094 15.722656 L 19.371094 29.779297 C 20.524094 30.293297 22.829781 31.064453 26.300781 31.064453 C 31.939781 31.064453 34.962891 26.733531 34.962891 23.269531 C 34.962891 18.920531 32.050781 14.164062 26.300781 14.164062 z"/></svg>
      </a>
      <a href="https://instagram.com/doremyswt" target="_blank" title="Instagram">
        <svg viewBox="0 0 24 24"><path d="M7 2h10a5 5 0 015 5v10a5 5 0 01-5 5H7a5 5 0 01-5-5V7a5 5 0 015-5zm5 5a5 5 0 100 10 5 5 0 000-10zm6.5-1.5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0z"/></svg>

      <div class="vgen-wrap">
        <div class="comm-callout">
          <span>COMMISSIONS</span>
          <svg class="comm-arrow" viewBox="0 0 40 26" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 5 C12 5 22 20 35 20" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M29 14 L35 20 L29 26" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <a href="https://vgen.co/doremy" target="_blank" title="VGen">
          <img src="vgen.png" alt="VGen" class="social-icon">
        </a>
      </div>
    </div>
  </div>
</header>

<div class="divider">
  <div class="divider-line"></div>
  <span class="divider-label">gallery</span>
  <div class="divider-line"></div>
</div>

<div class="gallery" id="gallery"></div>

<footer>brewed with care &nbsp;·&nbsp; drmy archive</footer>

<div class="lightbox" id="lightbox">
  <div class="lb-btn lb-close" id="lb-close">✕</div>
  <div class="lb-btn lb-prev" id="lb-prev">‹</div>
  <div class="lb-btn lb-next" id="lb-next">›</div>
  <img id="lightbox-img" alt="">
  <div class="lb-counter" id="lb-counter"></div>
</div>

<script>
  const galleryEl = document.getElementById("gallery");
  const lightbox  = document.getElementById("lightbox");
  const lbImg     = document.getElementById("lightbox-img");
  const lbCounter = document.getElementById("lb-counter");

  let images = [];
  let items  = [];
  let currentIndex = 0;
  let zoomed = false;

  const GAP = 10;

  function numCols() {
    const w = galleryEl.clientWidth;
    if (w < 480) return 2;
    if (w < 720) return 3;
    return 4;
  }

  function layout() {
    const totalW = galleryEl.clientWidth;
    const cols   = numCols();
    const colW   = (totalW - GAP * (cols - 1)) / cols;
    const heights = new Array(cols).fill(0);

    // Process images left-to-right: for each image pick the column
    // that currently has the minimum height, left-biased on ties.
    items.forEach(({ el, img }) => {
      const naturalH = img.naturalHeight || 0;
      const naturalW = img.naturalWidth  || 1;
      const itemH    = naturalH ? Math.round(colW * naturalH / naturalW) : colW;

      // Find shortest column (left-biased)
      let col = 0;
      for (let c = 1; c < cols; c++) {
        if (heights[c] < heights[col]) col = c;
      }

      const x = col * (colW + GAP);
      const y = heights[col];

      el.style.width  = colW + "px";
      el.style.left   = x + "px";
      el.style.top    = y + "px";

      heights[col] += itemH + GAP;
    });

    galleryEl.style.height = Math.max(...heights) - GAP + "px";
  }

  async function loadImages() {
    const res = await fetch("arch/images.json");
    images = await res.json();

    images.forEach((url, i) => {
      const el  = document.createElement("div");
      el.className = "item";
      const img = document.createElement("img");
      img.src     = url;
      img.loading = "lazy";
      img.alt     = "";
      img.onclick = () => openLB(i);
      img.onload  = () => layout();
      img.onerror = () => layout();

      el.appendChild(img);
      galleryEl.appendChild(el);
      items.push({ el, img });
    });
  }

  window.addEventListener("resize", layout);

  /* ── LIGHTBOX ── */
  function openLB(i) {
    currentIndex = i;
    lbImg.src = images[i];
    lbCounter.textContent = (i + 1) + " / " + images.length;
    lightbox.classList.add("active");
    zoomed = false;
    lbImg.style.transform = "scale(1)";
    lbImg.style.cursor    = "zoom-in";
  }

  function closeLB() { lightbox.classList.remove("active"); }
  function prevLB()  { if (currentIndex > 0)               openLB(currentIndex - 1); }
  function nextLB()  { if (currentIndex < images.length-1) openLB(currentIndex + 1); }

  document.getElementById("lb-close").onclick = closeLB;
  document.getElementById("lb-prev").onclick  = prevLB;
  document.getElementById("lb-next").onclick  = nextLB;

  lbImg.addEventListener("click", () => {
    zoomed = !zoomed;
    lbImg.style.transform = zoomed ? "scale(1.9)" : "scale(1)";
    lbImg.style.cursor    = zoomed ? "zoom-out"   : "zoom-in";
  });

  lbImg.addEventListener("mousemove", e => {
    if (!zoomed) return;
    const rect = lbImg.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width  - 0.5) * 2;
    const y = ((e.clientY - rect.top)  / rect.height - 0.5) * 2;
    lbImg.style.transform = `scale(2) translate(${-x*45}%,${-y*45}%)`;
  });

  lbImg.addEventListener("mouseleave", () => { if (zoomed) lbImg.style.transform = "scale(1.9)"; });
  lightbox.addEventListener("click", e => { if (e.target === lightbox) closeLB(); });

  document.addEventListener("keydown", e => {
    if (!lightbox.classList.contains("active")) return;
    if (e.key === "ArrowRight") nextLB();
    if (e.key === "ArrowLeft")  prevLB();
    if (e.key === "Escape")     closeLB();
  });

  loadImages();
</script>
</body>
</html>
