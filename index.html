<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>drmy archive</title>
<link rel="icon" type="image/png" href="icon.png">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: #eee;
  /* warm coffee gradient */
  background: radial-gradient(circle at top, #2a1f1a, #0d0d0d);
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;

  opacity: 0.035; /* adjust intensity */

  background-image: url("https://grainy-gradients.vercel.app/noise.svg");
}
/* HEADER */
.top {
  padding: 60px 20px 30px;
  background: rgba(40, 28, 22, 0.55); /* warm glass */
  backdrop-filter: blur(12px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.profile {
  max-width: 900px;
  margin: auto;
  display: flex;
  align-items: center;
  gap: 25px;
}
.gallery {
  column-count: 4;
  column-gap: 10px;
  padding: 10px;
}

.item {
  break-inside: avoid;
  margin-bottom: 10px;
}
  
/* ONLY gallery images */
.gallery img {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 6px;
  transition: transform 0.2s ease, opacity 0.2s;
  cursor: pointer;
}
.gallery img:hover {
  transform: scale(1.02);
  opacity: 0.9;
  box-shadow: 0 0 20px rgba(255,255,255,0.08);
}

/* ONLY avatar */
.avatar {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  object-fit: cover;
}
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
  cursor: zoom-out;
}

.lightbox.active {
  display: flex;
}

.lightbox img {
  border-radius: 6px;
  max-width: 90vw;
  max-height: 90vh;
  width: auto;
  height: auto;
  object-fit: contain;
}
  
/* TEXT */
.info h1 {
  margin: 0;
  font-size: 24px;
  letter-spacing: 1px;
}

.info p {
  margin: 6px 0 14px;
  opacity: 0.7;
  color: #d6c2b8;
}

/* ICON LINKS */
.links a {
  margin-right: 15px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: #aaa;
  transition: 0.2s;
  text-decoration: none;
}

.links a:hover {
  color: #f2d2b6;
  transform: scale(1.15);
}

.links svg {
  width: 20px;
  height: 20px;
  fill: currentColor;
}

/* MOBILE */
@media (max-width: 1000px) {
  .gallery { column-count: 3; }
}

@media (max-width: 700px) {
  .gallery { column-count: 2; }
}

@media (max-width: 600px) {
  .profile { 
    flex-direction: column; 
    text-align: center; 
  }
}

@media (max-width: 400px) {
  .gallery { column-count: 1; }
}
}
</style>
</head>

<body>

<header class="top">
  <div class="profile">
    
    <!-- YOUR IMAGE -->
    <img src="me.png" class="avatar">

    <div class="info">
      <h1>drmy</h1>
      <p>socials</p>

      <div class="links">
        
        <!-- TWITTER -->
        <a href="https://twitter.com/doremyswt" target="_blank">
          <svg viewBox="0 0 24 24">
            <path d="M22 5.8c-.7.3-1.5.6-2.3.7.8-.5 1.4-1.2 1.7-2.1-.8.5-1.7.8-2.6 1C18 4.5 17 4 16 4c-2 0-3.5 1.7-3.5 3.7 0 .3 0 .6.1.9-3-.2-5.6-1.6-7.3-3.8-.3.6-.5 1.2-.5 1.9 0 1.3.7 2.5 1.7 3.2-.6 0-1.2-.2-1.7-.5 0 1.8 1.3 3.3 3 3.6-.3.1-.7.1-1 .1-.2 0-.5 0-.7-.1.5 1.5 1.9 2.6 3.6 2.6-1.3 1-3 1.6-4.8 1.6H2c1.7 1.1 3.7 1.7 5.8 1.7 7 0 10.8-5.9 10.8-11v-.5c.7-.5 1.4-1.2 1.9-2z"/>
          </svg>
        </a>

        <!-- PIXIV (custom icon substitute) -->
        <a href="https://www.pixiv.net/en/users/105940981" target="_blank">
          <svg viewBox="0 0 48 48">
            <path d="M 25 2 C 12.317 2 2 12.317 2 25 C 2 37.683 12.317 48 25 48 C 37.683 48 48 37.683 48 25 C 48 12.317 37.683 2 25 2 z M 26.300781 12.009766 C 35.827781 12.009766 39.291969 18.146531 39.292969 23.269531 C 39.292969 28.539531 34.961781 33.662109 26.300781 33.662109 C 23.332781 33.662109 20.992094 32.832375 19.371094 31.984375 L 19.371094 36.259766 L 20.238281 36.259766 L 20.238281 37.992188 L 15.041016 37.992188 L 15.041016 36.259766 L 15.90625 36.259766 L 15.90625 17.945312 C 14.85625 18.643313 13.308594 20.669922 13.308594 20.669922 L 13.308594 22.070312 L 12.443359 22.070312 L 10.710938 18.939453 C 10.710938 18.939453 16.773781 12.009766 26.300781 12.009766 z M 26.300781 14.164062 C 23.557781 14.164062 21.249094 14.824656 19.371094 15.722656 L 19.371094 29.779297 C 20.524094 30.293297 22.829781 31.064453 26.300781 31.064453 C 31.939781 31.064453 34.962891 26.733531 34.962891 23.269531 C 34.962891 18.920531 32.050781 14.164062 26.300781 14.164062 z"/>

        </a>

        <!-- INSTAGRAM -->
        <a href="https://instagram.com/doremyswt" target="_blank">
          <svg viewBox="0 0 24 24">
            <path d="M7 2h10a5 5 0 015 5v10a5 5 0 01-5 5H7a5 5 0 01-5-5V7a5 5 0 015-5zm5 5a5 5 0 100 10 5 5 0 000-10zm6.5-1.5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0z"/>
          </svg>
        </a>

      </div>
    </div>

  </div>
</header>

<div class="gallery" id="gallery"></div>

<div class="lightbox" id="lightbox">
  <img id="lightbox-img">
</div>

<script>
const gallery = document.getElementById("gallery");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

// CHANGE THIS to your repo
const USER = "doremyswt";
const REPO = "drmy.github.io";
const FOLDER = "arch";

async function loadImages() {
  // get file list
  const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${FOLDER}`);
  const files = await res.json();

  // filter only images
  const images = files.filter(f =>
    f.name.endsWith(".png") ||
    f.name.endsWith(".jpg") ||
    f.name.endsWith(".jpeg") ||
    f.name.endsWith(".webp")
  );

  // get commit dates for each file
  const imagesWithDates = await Promise.all(images.map(async file => {
    const commitRes = await fetch(
      `https://api.github.com/repos/${USER}/${REPO}/commits?path=${FOLDER}/${file.name}&per_page=1`
    );
    const commitData = await commitRes.json();

    return {
      ...file,
      date: new Date(commitData[0].commit.committer.date)
    };
  }));

  // sort newest first
  imagesWithDates.sort((a, b) => b.date - a.date);

  // render
  imagesWithDates.forEach(file => {
    const div = document.createElement("div");
    div.className = "item";

    const img = document.createElement("img");
    img.src = file.download_url;
    img.loading = "lazy";

    img.onclick = () => {
      lightbox.classList.add("active");
      lightboxImg.src = img.src;
    };

    div.appendChild(img);
    gallery.appendChild(div);
  });
}

loadImages();

lightbox.onclick = () => {
  lightbox.classList.remove("active");
};
</script>

</body>
</html>
