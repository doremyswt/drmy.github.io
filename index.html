<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>drmy archive</title>
<link rel="icon" type="image/png" href="icon.png">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: #eee;
  /* warm coffee gradient */
  background: radial-gradient(circle at top, #2a1f1a, #0d0d0d);
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;

  opacity: 0.035; /* adjust intensity */

  background-image: url("https://grainy-gradients.vercel.app/noise.svg");
}
/* HEADER */
.top {
  padding: 60px 20px 30px;
  background: rgba(40, 28, 22, 0.55); /* warm glass */
  backdrop-filter: blur(12px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.profile {
  max-width: 900px;
  margin: auto;
  display: flex;
  align-items: center;
  gap: 25px;
}
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
  grid-auto-rows: 20px;  /* small base row height for JS calculation */
  gap: 10px;
}
.item {
  border-radius: 6px;
}
  
/* ONLY gallery images */
.gallery img {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 6px;
  transition: transform 0.2s ease, opacity 0.2s;
  cursor: pointer;
}
.gallery img:hover {
  transform: scale(1.02);
  opacity: 0.9;
  box-shadow: 0 0 20px rgba(255,255,255,0.08);
}

/* ONLY avatar */
.avatar {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  object-fit: cover;
}
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
  cursor: zoom-out;
}

.lightbox.active {
  display: flex;
}

.lightbox img {
  border-radius: 6px;
  max-width: 90vw;
  max-height: 90vh;
  width: auto;
  height: auto;
  object-fit: contain;
}
  
/* TEXT */
.info h1 {
  margin: 0;
  font-size: 24px;
  letter-spacing: 1px;
}

.info p {
  margin: 6px 0 14px;
  opacity: 0.7;
  color: #d6c2b8;
}

/* ICON LINKS */
.links a {
  margin-right: 15px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: #aaa;
  transition: 0.2s;
  text-decoration: none;
}

.links a:hover {
  color: #f2d2b6;
  transform: scale(1.15);
}

.links svg {
  width: 20px;
  height: 20px;
  fill: currentColor;
}

.social-icon {
  width: 20px;    /* match your SVG size */
  height: 20px;   /* keep square */
  object-fit: contain; /* ensures aspect ratio is preserved */
  transition: 0.2s;
}

.links a:hover .social-icon {
  transform: scale(1.15); /* match SVG hover scale */
}

</style>
</head>

<body>

<header class="top">
  <div class="profile">
    
    <!-- YOUR IMAGE -->

    <div class="info">

    </div>

  </div>
</header>

<div class="gallery" id="gallery"></div>

<div class="lightbox" id="lightbox">
  <img id="lightbox-img">
</div>

<script>
const gallery = document.getElementById("gallery");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

async function loadImages() {
  // Fetch the pre-generated JSON file
  const res = await fetch("arch/images.json");
  const images = await res.json(); // already sorted newest → oldest

  // render
  images.forEach(url => {
    const div = document.createElement("div");
    div.className = "item";

    const img = document.createElement("img");
    img.src = url;
    img.loading = "lazy";

    img.onclick = () => {
      lightbox.classList.add("active");
      lightboxImg.src = img.src;
    };

    div.appendChild(img);
    gallery.appendChild(div);
  });
  // <-- Paste it here, after the images exist
  const galleryItems = document.querySelectorAll('.gallery .item');
  galleryItems.forEach(item => {
    const img = item.querySelector('img');
    img.onload = () => {
      const rowHeight = parseInt(getComputedStyle(document.querySelector('.gallery')).getPropertyValue('grid-auto-rows'));
      const rowGap = parseInt(getComputedStyle(document.querySelector('.gallery')).getPropertyValue('gap'));
      const rowSpan = Math.ceil((img.getBoundingClientRect().height + rowGap) / (rowHeight + rowGap));
      item.style.gridRowEnd = `span ${rowSpan}`;
    };
  });
}

loadImages();

lightbox.onclick = () => {
  lightbox.classList.remove("active");
};
</script>

</body>
</html>
