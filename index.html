<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>drmy archive</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #100d0a; --surface: #1a1410; --border: #2e231a;
    --latte: #c4a882; --steam: #6b5a4e; --cream: #f0e8dc; --muted: #7a6355;
  }
  body { background-color: var(--bg); background-image: radial-gradient(ellipse at 20% 0%, rgba(100,70,40,0.18) 0%, transparent 55%), radial-gradient(ellipse at 80% 100%, rgba(60,35,15,0.25) 0%, transparent 50%); color: var(--cream); font-family: 'Lora', Georgia, serif; min-height: 100vh; }
  #vhs-canvas { position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 500; opacity: 0.55; mix-blend-mode: screen; }
  #vhs-scanlines { position: fixed; inset: 0; pointer-events: none; z-index: 501; background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.17) 3px, rgba(0,0,0,0.17) 4px); }
  #vhs-band { position: fixed; left: 0; right: 0; height: 4px; background: rgba(255,255,255,0.07); pointer-events: none; z-index: 502; top: -10px; }
  header { position: sticky; top: 0; z-index: 100; background: rgba(16,13,10,0.90); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border-bottom: 1px solid var(--border); overflow: visible; padding-top: 58px; }
  .header-inner { max-width: 960px; margin: 0 auto; padding: 0 28px 22px; display: flex; align-items: center; gap: 22px; overflow: visible; }
  .avatar-wrap { position: relative; flex-shrink: 0; cursor: pointer; }
  .avatar { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; border: 2.5px solid var(--latte); display: block; transition: transform 0.18s ease, box-shadow 0.18s ease; }
  .avatar-wrap:hover .avatar { transform: scale(1.07); box-shadow: 0 0 20px rgba(196,168,130,0.4); }
  .avatar-ring { position: absolute; inset: -5px; border-radius: 50%; border: 1px dashed var(--latte); opacity: 0.5; animation: spin 18s linear infinite; pointer-events: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .header-text { display: flex; flex-direction: column; gap: 5px; }
  .header-name-row { display: flex; align-items: center; gap: 9px; }
  .header-text h1 { font-family: 'Lora', serif; font-size: 22px; font-weight: 600; color: var(--cream); letter-spacing: 0.02em; line-height: 1; }
  .header-text .tagline { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 300; color: var(--muted); letter-spacing: 0.12em; text-transform: lowercase; }
  .socials { margin-left: auto; display: flex; align-items: center; gap: 8px; overflow: visible; }
  .socials a { display: flex; align-items: center; justify-content: center; width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); transition: border-color .2s, transform .2s; text-decoration: none; color: var(--muted); flex-shrink: 0; }
  .socials a:hover { border-color: var(--latte); color: var(--latte); transform: translateY(-2px); }
  .socials a svg { width: 15px; height: 15px; fill: currentColor; display: block; }
  .socials a img { width: 17px; height: 17px; object-fit: contain; display: block; }
  .vgen-wrap { position: relative; display: flex; align-items: center; }
  .comm-callout { position: absolute; bottom: calc(100% + 10px); left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 3px; pointer-events: none; animation: bob 1.9s ease-in-out infinite; white-space: nowrap; z-index: 200; }
  .comm-callout span { font-family: 'DM Mono', monospace; font-size: 10.5px; font-weight: 400; letter-spacing: 0.14em; color: #d4f542; text-shadow: 0 0 10px rgba(212,245,66,0.7); }
  .comm-arrow { width: 14px; height: 18px; color: #d4f542; filter: drop-shadow(0 0 4px rgba(212,245,66,0.6)); display: block; }
  @keyframes bob { 0%,100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-5px); } }
  .divider { max-width: 960px; margin: 0 auto 32px; padding: 36px 28px 0; display: flex; align-items: center; gap: 14px; }
  .divider-line { flex: 1; height: 1px; background: var(--border); }
  .divider-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.18em; color: var(--latte); text-transform: lowercase; }
  .gallery { max-width: 960px; margin: 0 auto 60px; padding: 0 28px; position: relative; }
  .item { position: absolute; border-radius: 8px; overflow: hidden; background: var(--surface); border: 1px solid var(--border); cursor: pointer; transition: transform 0.22s ease, box-shadow 0.22s ease; }
  .item:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(0,0,0,0.45); }
  .item img { width: 100%; height: auto; display: block; }

  /* LIGHTBOX */
  .lightbox { position: fixed; inset: 0; background: rgba(42,29,18,0.96); display: none; justify-content: center; align-items: center; z-index: 9999; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .lightbox.active { display: flex; }
  .lightbox img { max-width: 88vw; max-height: 85vh; object-fit: contain; border-radius: 8px; border: 1px solid rgba(196,168,130,0.2); cursor: zoom-in; transition: transform 0.12s ease; }
  .lb-btn { position: absolute; background: rgba(245,240,232,0.08); border: 1px solid rgba(196,168,130,0.2); color: var(--cream); border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; transition: background 0.18s ease; user-select: none; top: 50%; transform: translateY(-50%); }
  .lb-btn:hover { background: rgba(245,240,232,0.16); }
  .lb-close { top: 24px; right: 24px; transform: none; font-size: 14px; }
  .lb-prev { left: 20px; }
  .lb-next { right: 20px; }
  .lb-counter { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); font-family: 'DM Mono', monospace; font-size: 11px; color: var(--latte); letter-spacing: 0.14em; opacity: 0.75; }
  /* Hide prev/next on touch-only (mobile) devices */
  @media (hover: none) and (pointer: coarse) {
    .lb-prev, .lb-next { display: none; }
  }

  /* GAME MODAL */
  #game-modal { position: fixed; inset: 0; background: rgba(4,3,1,0.97); display: none; justify-content: center; align-items: center; z-index: 8000; animation: fadeIn 0.25s ease; }
  #game-modal.active { display: flex; }
  .game-box { background: transparent; border: 1px solid #2e231a; border-radius: 14px; padding: 16px 16px 12px; display: flex; flex-direction: column; align-items: center; gap: 8px; width: min(420px, 98vw); }
  .game-top-bar { width: 100%; display: flex; align-items: center; justify-content: space-between; }
  .game-title { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.18em; color: var(--latte); text-transform: lowercase; }
  .game-close { background: none; border: none; color: var(--muted); font-size: 12px; cursor: pointer; font-family: 'DM Mono', monospace; transition: color 0.15s; letter-spacing: 0.08em; padding: 0; }
  .game-close:hover { color: var(--cream); }
  .game-hud { width: 100%; display: flex; justify-content: space-between; align-items: center; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.12em; }
  .game-hud span { color: var(--latte); }
  #game-canvas { display: block; border-radius: 10px; border: 1px solid #1e150a; width: 100%; height: auto; }
  #game-feedback { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.14em; height: 16px; }
  .game-keys-hint { font-family: 'DM Mono', monospace; font-size: 9.5px; color: var(--muted); letter-spacing: 0.1em; text-align: center; line-height: 1.8; }
  .game-keys-hint b { color: var(--latte); font-weight: 400; }
  footer { text-align: center; padding: 28px; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--muted); border-top: 1px solid var(--border); }
  @media (max-width: 600px) { .gallery { padding: 0 14px; } .header-inner { padding: 0 18px 18px; } .divider { padding: 28px 16px 0; } }
</style>
</head>
<body>

<div class="divider"><div class="divider-line"></div><span class="divider-label">gallery</span><div class="divider-line"></div></div>

<!-- Lightbox -->

<script>
/* ── VHS GRAIN ── */
(function(){
  const cv=document.getElementById('vhs-canvas'),cx=cv.getContext('2d'),bd=document.getElementById('vhs-band');
  let by=-10,bs=0.7;
  function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  function tick(){
    const W=cv.width,H=cv.height,id=cx.createImageData(W,H),d=id.data;
    for(let i=0;i<d.length;i+=4)if(Math.random()<.10){const v=Math.random()*220|0;d[i]=v*.6|0;d[i+1]=v*.38|0;d[i+2]=v*.22|0;d[i+3]=Math.random()*55|0;}
    cx.putImageData(id,0,0);
    if(Math.random()<.06){const ly=Math.random()*H|0;cx.fillStyle=`rgba(255,240,210,${(Math.random()*.09).toFixed(3)})`;cx.fillRect(0,ly,W,Math.random()<.5?1:2);}
    by+=bs;if(by>window.innerHeight+12){by=-12;bs=.4+Math.random()*.9;}
    bd.style.top=by+'px';requestAnimationFrame(tick);
  }
  tick();
})();

/* ── GALLERY ── */
const galleryEl=document.getElementById('gallery'),lightbox=document.getElementById('lightbox'),lbImg=document.getElementById('lightbox-img'),lbCounter=document.getElementById('lb-counter');
let images=[],items=[],currentIndex=0,zoomed=false;
const GAP=10;
function numCols(){const w=galleryEl.clientWidth;return w<480?2:w<720?3:4;}
function layout(){
  const W=galleryEl.clientWidth,cols=numCols(),colW=(W-GAP*(cols-1))/cols,hs=new Array(cols).fill(0);
  items.forEach(({el,img})=>{
    const nH=img.naturalHeight||0,nW=img.naturalWidth||1,iH=nH?Math.round(colW*nH/nW):colW;
    let col=0;for(let c=1;c<cols;c++)if(hs[c]<hs[col])col=c;
    el.style.width=colW+'px';el.style.left=col*(colW+GAP)+'px';el.style.top=hs[col]+'px';hs[col]+=iH+GAP;
  });
  galleryEl.style.height=Math.max(...hs)-GAP+'px';
}
async function loadImages(){
  try{const r=await fetch('arch/images.json');images=await r.json();}catch{images=[];}
  images.forEach((url,i)=>{
    const el=document.createElement('div');el.className='item';
    const img=document.createElement('img');img.src=url;img.loading='lazy';img.alt='';
    img.onclick=()=>openLB(i);img.onload=layout;img.onerror=layout;
    el.appendChild(img);galleryEl.appendChild(el);items.push({el,img});
  });
}
window.addEventListener('resize',layout);
function openLB(i){currentIndex=i;lbImg.src=images[i];lbCounter.textContent=(i+1)+' / '+images.length;lightbox.classList.add('active');zoomed=false;lbImg.style.transform='scale(1)';lbImg.style.cursor='zoom-in';}
const closeLB=()=>lightbox.classList.remove('active');
const prevLB=()=>{if(currentIndex>0)openLB(currentIndex-1);};
const nextLB=()=>{if(currentIndex<images.length-1)openLB(currentIndex+1);};
document.getElementById('lb-close').onclick=closeLB;
document.getElementById('lb-prev').onclick=prevLB;
document.getElementById('lb-next').onclick=nextLB;
lbImg.addEventListener('click',()=>{zoomed=!zoomed;lbImg.style.transform=zoomed?'scale(1.9)':'scale(1)';lbImg.style.cursor=zoomed?'zoom-out':'zoom-in';});
lbImg.addEventListener('mousemove',e=>{if(!zoomed)return;const r=lbImg.getBoundingClientRect();const x=((e.clientX-r.left)/r.width-.5)*2,y=((e.clientY-r.top)/r.height-.5)*2;lbImg.style.transform=`scale(2) translate(${-x*45}%,${-y*45}%)`;});
lbImg.addEventListener('mouseleave',()=>{if(zoomed)lbImg.style.transform='scale(1.9)';});
lightbox.addEventListener('click',e=>{if(e.target===lightbox)closeLB();});
let lbTX=null,lbTY=null;
lightbox.addEventListener('touchstart',e=>{lbTX=e.touches[0].clientX;lbTY=e.touches[0].clientY;},{passive:true});
lightbox.addEventListener('touchend',e=>{if(lbTX===null)return;const dx=e.changedTouches[0].clientX-lbTX,dy=e.changedTouches[0].clientY-lbTY;if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){dx<0?nextLB():prevLB();}lbTX=null;lbTY=null;},{passive:true});
document.addEventListener('keydown',e=>{if(!lightbox.classList.contains('active'))return;if(e.key==='ArrowRight')nextLB();if(e.key==='ArrowLeft')prevLB();if(e.key==='Escape')closeLB();});
loadImages();


/* ══════════════════════════════════════════════════════════
   SHIELD GAME
   ══════════════════════════════════════════════════════════ */
(function(){
  const modal    =document.getElementById('game-modal');
  const gc       =document.getElementById('game-canvas');
  const ctx      =gc.getContext('2d');
  const avatarBtn=document.getElementById('avatar-btn');
  const closeBtn =document.getElementById('game-close-btn');
  const hudScore =document.getElementById('hud-score');
  const hudCombo =document.getElementById('hud-combo');
  const hudHP    =document.getElementById('hud-hp');
  const feedback =document.getElementById('game-feedback');

  const W=gc.width,H=gc.height,CX=W/2,CY=H/2;
  const COL={left:'#e8c49a',right:'#9ab8c4',up:'#c4b89a',down:'#b8907a',shield:'#d4f542',miss:'#c49bb8',hit:'#b8c49b',latte:'#c4a882'};

  /* 0=left 1=up 2=right 3=down */
  const DIRS=[
    {id:0,label:'←',spawnX:()=>-30,           spawnY:()=>CY+(Math.random()-.5)*60,color:COL.left },
    {id:1,label:'↑',spawnX:()=>CX+(Math.random()-.5)*60,spawnY:()=>-30,           color:COL.up   },
    {id:2,label:'→',spawnX:()=>W+30,           spawnY:()=>CY+(Math.random()-.5)*60,color:COL.right},
    {id:3,label:'↓',spawnX:()=>CX+(Math.random()-.5)*60,spawnY:()=>H+30,           color:COL.down },
  ];
  const DIR_KEYS={'arrowleft':0,'a':0,'arrowup':1,'w':1,'arrowright':2,'d':2,'arrowdown':3,'s':3};
  const ARROW_SPEED=128; // px/s — travels from edge to center in ~1.5s
  const HIT_R=44,SHIELD_R=72;
  const BPM=138;
  const HALF_BEAT_MS=(60/BPM/2)*1000; // ~217 ms minimum between spawns

  /* ── Audio ── */
  let audioCtx=null,sourceNode=null,analyser=null,audioBuffer=null;
  let audioLoaded=false,audioLoading=false;

  async function loadAudio(){
    if(audioLoaded||audioLoading)return;
    audioLoading=true;
    try{
      initAudioCtx();
      const resp=await fetch('kan_saete.mp3');
      const ab=await resp.arrayBuffer();
      audioBuffer=await audioCtx.decodeAudioData(ab);
      audioLoaded=true;
    }catch(e){console.warn('Audio load failed',e);}
    audioLoading=false;
  }

  function initAudioCtx(){
    if(audioCtx)return;
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  }

  function startAudio(){
    if(!audioCtx||!audioBuffer)return;
    stopAudio();
    sourceNode=audioCtx.createBufferSource();
    sourceNode.buffer=audioBuffer;
    sourceNode.loop=false;

    analyser=audioCtx.createAnalyser();
    analyser.fftSize=1024;
    analyser.smoothingTimeConstant=0.75;

    sourceNode.connect(analyser);
    analyser.connect(audioCtx.destination);
    sourceNode.start(0);
    sourceNode.onended=()=>{
      if(phase==='playing'){phase='results';}
      sourceNode=null;
    };
  }

  function stopAudio(){
    /* fully kill source and analyser so no audio continues after modal close */
    if(sourceNode){
      sourceNode.onended=null;
      try{sourceNode.stop();}catch{}
      try{sourceNode.disconnect();}catch{}
      sourceNode=null;
    }
    if(analyser){
      try{analyser.disconnect();}catch{}
      analyser=null;
    }
  }

  /* ── Beat detection ── */
  let beatDataBuf=null;
  let lastBeatMs=-99999;
  let energyHistory=[];
  const ENERGY_HISTORY=43; // ~700ms at 60fps
  const BEAT_THRESHOLD=1.30; // must be 30% above local average

  function detectBeat(nowMs){
    if(!analyser)return false;
    const binCount=analyser.frequencyBinCount;
    if(!beatDataBuf||beatDataBuf.length!==binCount)beatDataBuf=new Uint8Array(binCount);
    analyser.getByteFrequencyData(beatDataBuf);

    // Bass bins only (roughly 0–250 Hz)
    const bassEnd=Math.max(4,Math.floor(binCount/12));
    let sum=0;
    for(let i=2;i<bassEnd;i++)sum+=beatDataBuf[i]*beatDataBuf[i]; // skip DC bin
    const energy=Math.sqrt(sum/bassEnd);

    energyHistory.push(energy);
    if(energyHistory.length>ENERGY_HISTORY)energyHistory.shift();
    const avg=energyHistory.reduce((a,b)=>a+b,0)/energyHistory.length||1;

    const cooldownOk=(nowMs-lastBeatMs)>=HALF_BEAT_MS;
    const isBeat=(energy/avg)>BEAT_THRESHOLD&&cooldownOk&&energy>4;
    if(isBeat)lastBeatMs=nowMs;
    return isBeat;
  }

  /* ── Game state ── */
  let score,combo,hp,phase='idle',raf=null;
  let arrows=[],particles=[];
  let shieldDir=-1,shieldFlash=0;
  let dirCycle=0;
  const DIR_SEQ=[0,2,1,3,0,3,2,1,1,0,3,2,2,1,0,3];
  function nextDir(){const d=DIR_SEQ[dirCycle%DIR_SEQ.length];dirCycle++;return d;}

  function resetState(){
    score=0;combo=0;hp=3;
    arrows=[];particles=[];
    shieldDir=-1;shieldFlash=0;
    dirCycle=0;energyHistory=[];lastBeatMs=-99999;
    updateHUD();feedback.textContent='';
  }
  function updateHUD(){
    hudScore.textContent=score;
    hudCombo.textContent=combo;
    hudHP.textContent='❤'.repeat(Math.max(0,hp))+'♡'.repeat(Math.max(0,3-hp));
  }

  function spawnArrow(){
    const did=nextDir(),d=DIRS[did];
    const ax=d.spawnX(),ay=d.spawnY();
    const len=Math.hypot(CX-ax,CY-ay)||1;
    arrows.push({x:ax,y:ay,vx:(CX-ax)/len*ARROW_SPEED,vy:(CY-ay)/len*ARROW_SPEED,dir:did,color:d.color,label:d.label,dead:false,age:0});
  }

  /* ── Draw ── */
  function drawBg(){
    ctx.clearRect(0,0,W,H);
    for(let r=28;r<220;r+=20){ctx.strokeStyle=`rgba(55,28,8,${Math.max(0,.07-r*.00025)})`;ctx.lineWidth=7;ctx.beginPath();ctx.arc(CX,CY,r,0,Math.PI*2);ctx.stroke();}
    const ag=ctx.createRadialGradient(CX,CY,0,CX,CY,155);
    ag.addColorStop(0,'rgba(28,14,5,0.75)');ag.addColorStop(1,'rgba(8,4,1,0.15)');
    ctx.beginPath();ctx.arc(CX,CY,155,0,Math.PI*2);ctx.fillStyle=ag;ctx.fill();
    ctx.save();ctx.strokeStyle='rgba(196,168,130,0.11)';ctx.lineWidth=1;ctx.setLineDash([5,9]);
    ctx.beginPath();ctx.arc(CX,CY,SHIELD_R+12,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);ctx.restore();
  }

  function drawShield(nowSec){
    if(shieldDir<0)return;
    const age=nowSec-shieldFlash;if(age>0.4)return;
    const alpha=(1-age/0.4)*.8;
    const arcs=[[Math.PI*.58,Math.PI*1.42],[Math.PI*1.08,Math.PI*1.92],[-Math.PI*.42,Math.PI*.42],[Math.PI*.08,Math.PI*.92]];
    const[a0,a1]=arcs[shieldDir];
    ctx.save();ctx.strokeStyle=`rgba(212,245,66,${alpha})`;ctx.lineWidth=9;ctx.shadowColor='#d4f542';ctx.shadowBlur=22;
    ctx.beginPath();ctx.arc(CX,CY,SHIELD_R,a0,a1);ctx.stroke();ctx.restore();
  }

  function drawCup(){
    // saucer
    ctx.save();ctx.beginPath();ctx.ellipse(CX,CY+19,27,6.5,0,0,Math.PI*2);ctx.fillStyle='#2a1808';ctx.fill();ctx.strokeStyle='#c4a882';ctx.lineWidth=1.2;ctx.stroke();ctx.restore();
    // body
    ctx.save();ctx.beginPath();ctx.roundRect(CX-19,CY-19,38,35,5);ctx.fillStyle='#1c0e07';ctx.fill();ctx.strokeStyle='#c4a882';ctx.lineWidth=1.5;ctx.stroke();ctx.restore();
    // handle
    ctx.save();ctx.strokeStyle='#c4a882';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(CX+23,CY,9.5,-Math.PI*.45,Math.PI*.45);ctx.stroke();ctx.restore();
    // coffee surface
    ctx.save();ctx.beginPath();ctx.ellipse(CX,CY-13,13,3.8,0,0,Math.PI*2);ctx.fillStyle='#0d0702';ctx.fill();ctx.strokeStyle='#6b5a4e';ctx.lineWidth=.8;ctx.stroke();
    // latte heart
    ctx.fillStyle='rgba(196,168,130,0.48)';ctx.beginPath();
    ctx.moveTo(CX,CY-9);ctx.bezierCurveTo(CX,CY-14,CX-6,CY-15,CX-6,CY-11);ctx.bezierCurveTo(CX-6,CY-8,CX,CY-6,CX,CY-6);
    ctx.bezierCurveTo(CX,CY-6,CX+6,CY-8,CX+6,CY-11);ctx.bezierCurveTo(CX+6,CY-15,CX,CY-14,CX,CY-9);ctx.fill();ctx.restore();
    // steam
    const t=performance.now()/1000;
    for(let i=0;i<2;i++){const sx=CX+(i===0?-6:5),wv=Math.sin(t*1.5+i*2)*3;ctx.save();ctx.strokeStyle='rgba(107,90,78,0.48)';ctx.lineWidth=1.5;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(sx,CY-21);ctx.quadraticCurveTo(sx+wv,CY-31,sx-wv,CY-41);ctx.stroke();ctx.restore();}
  }

  function drawArrows(dt){
    for(const a of arrows){
      if(a.dead)continue;
      a.x+=a.vx*dt;a.y+=a.vy*dt;a.age+=dt;
      if(Math.hypot(a.x-CX,a.y-CY)>Math.max(W,H)+50){a.dead=true;continue;}
      const angle=Math.atan2(a.vy,a.vx);
      ctx.save();ctx.translate(a.x,a.y);ctx.rotate(angle);
      const tg=ctx.createLinearGradient(-32,0,0,0);tg.addColorStop(0,'transparent');tg.addColorStop(1,a.color+'99');
      ctx.strokeStyle=tg;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(-32,0);ctx.lineTo(-4,0);ctx.stroke();
      ctx.fillStyle=a.color;ctx.shadowColor=a.color;ctx.shadowBlur=10;
      ctx.beginPath();ctx.moveTo(14,0);ctx.lineTo(-2,-8);ctx.lineTo(2,0);ctx.lineTo(-2,8);ctx.closePath();ctx.fill();
      ctx.restore();
      ctx.save();ctx.font='bold 12px "DM Mono",monospace';ctx.fillStyle=a.color+'bb';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(a.label,a.x+Math.cos(angle+Math.PI/2)*14,a.y+Math.sin(angle+Math.PI/2)*14);ctx.restore();
    }
  }

  function drawParticles(nowSec){
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i],age=nowSec-p.born;
      if(age>.5){particles.splice(i,1);continue;}
      const alpha=1-age/.5;
      ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x+p.vx*age*80,p.y+p.vy*age*80,p.r*(1-age*.5),0,Math.PI*2);ctx.fill();ctx.restore();
    }
  }

  function burst(x,y,color,n=8){
    const now=performance.now()/1000;
    for(let i=0;i<n;i++){const a=(Math.PI*2*i/n)+Math.random()*.4;particles.push({x,y,vx:Math.cos(a),vy:Math.sin(a),r:3+Math.random()*3,color,born:now});}
  }

  /* tiny blip sound on block/miss */
  function blip(ok,dir){
    if(!audioCtx)return;
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.type=ok?'sine':'sawtooth';
    o.frequency.value=ok?[523,659,784,698][dir]:190;
    g.gain.setValueAtTime(ok?.08:.05,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+.1);
    o.start();o.stop(audioCtx.currentTime+.11);
  }

  /* ── Hit checking ── */
  function checkHits(){
    for(const a of arrows){
      if(a.dead)continue;
      if(Math.hypot(a.x-CX,a.y-CY)<=HIT_R){
        a.dead=true;
        if(shieldDir===a.dir){
          combo++;score+=100+combo*10;burst(a.x,a.y,a.color,10);blip(true,a.dir);
          feedback.textContent=combo>=5?combo+'x combo!! ☕':'blocked!';feedback.style.color='#b8c49b';
        } else {
          hp=Math.max(0,hp-1);combo=0;burst(CX,CY,'#c49bb8',12);blip(false,a.dir);
          feedback.textContent=hp<=0?'the coffee!! 😱':'ouch!';feedback.style.color='#c49bb8';
          if(hp<=0){phase='results';stopAudio();}
        }
        updateHUD();
      }
    }
    arrows=arrows.filter(a=>!a.dead);
  }

  /* ── Loop ── */
  let lastT=null;
  function loop(){
    const nowMs=performance.now(),nowSec=nowMs/1000;
    const dt=lastT!==null?Math.min(nowSec-lastT,.05):0;
    lastT=nowSec;

    if(phase==='playing'){
      drawBg();
      if(detectBeat(nowMs))spawnArrow();
      checkHits();
      drawShield(nowSec);drawArrows(dt);drawParticles(nowSec);drawCup();
      if(combo>=3){ctx.save();ctx.font=`bold ${10+Math.min(combo,18)}px "DM Mono",monospace`;ctx.fillStyle=combo>=10?COL.shield:COL.latte;ctx.textAlign='center';ctx.textBaseline='middle';ctx.globalAlpha=.45;ctx.fillText(combo+'x',CX,CY+44);ctx.restore();}

    } else if(phase==='results'){
      drawBg();drawCup();
      ctx.fillStyle='rgba(4,2,0,0.82)';ctx.fillRect(0,0,W,H);
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle='#c4a882';ctx.font='600 20px Lora,serif';ctx.fillText('結果',CX,CY-52);
      ctx.font='13px "DM Mono",monospace';ctx.fillStyle='#e8ddd0';ctx.fillText('score  '+score,CX,CY-16);
      ctx.fillStyle=hp>0?'#b8c49b':'#c49bb8';ctx.fillText(hp>0?'coffee safe! ☕':'the coffee spilled~',CX,CY+10);
      ctx.fillStyle='#7a6355';ctx.font='10px "DM Mono",monospace';ctx.fillText('press any key · tap to retry',CX,CY+48);
      if(!feedback.textContent){feedback.textContent=score>3000?'perfect guard! ✦':score>1000?'well done~':'try again ♡';feedback.style.color='#c4a882';}

    } else {
      // idle
      drawBg();drawCup();
      ctx.fillStyle='rgba(6,3,1,0.65)';ctx.fillRect(0,0,W,H);
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle='#c4a882';ctx.font='600 16px Lora,serif';ctx.fillText('勘冴えて悔しいわ',CX,CY-30);
      ctx.fillStyle='#7a6355';ctx.font='11px "DM Mono",monospace';ctx.fillText('press any arrow key · tap to start',CX,CY+4);
      ctx.fillStyle='#4a3525';ctx.font='9px "DM Mono",monospace';ctx.fillText('block the arrows — protect the coffee ☕',CX,CY+22);
    }
    raf=requestAnimationFrame(loop);
  }

  /* ── Controls ── */
  function onDir(dir){
    if(phase==='idle'||phase==='results'){startGame();return;}
    shieldDir=dir;shieldFlash=performance.now()/1000;
  }
  function offDir(dir){if(shieldDir===dir)shieldDir=-1;}

  document.addEventListener('keydown',e=>{
    if(!modal.classList.contains('active'))return;
    e.preventDefault();
    const k=e.key.toLowerCase();
    if(k in DIR_KEYS){onDir(DIR_KEYS[k]);return;}
    if(e.key==='Escape')closeGame();
  });
  document.addEventListener('keyup',e=>{
    if(!modal.classList.contains('active'))return;
    const k=e.key.toLowerCase();
    if(k in DIR_KEYS)offDir(DIR_KEYS[k]);
  });

  function tapDir(x,y){const dx=x-CX,dy=y-CY;return Math.abs(dx)>Math.abs(dy)?(dx<0?0:2):(dy<0?1:3);}
  gc.addEventListener('touchstart',e=>{
    e.preventDefault();
    const r=gc.getBoundingClientRect(),sx=W/r.width,sy=H/r.height;
    for(const t of e.changedTouches)onDir(tapDir((t.clientX-r.left)*sx,(t.clientY-r.top)*sy));
  },{passive:false});
  gc.addEventListener('touchend',e=>{e.preventDefault();shieldDir=-1;},{passive:false});
  gc.addEventListener('click',e=>{
    const r=gc.getBoundingClientRect();
    onDir(tapDir((e.clientX-r.left)*W/r.width,(e.clientY-r.top)*H/r.height));
  });

  /* ── Start / stop ── */
  async function startGame(){
    initAudioCtx();
    if(audioCtx.state==='suspended')await audioCtx.resume();
    if(!audioLoaded)await loadAudio();
    resetState();phase='playing';lastT=null;
    startAudio();
  }

  function closeGame(){
    /* stop everything — audio MUST die here */
    stopAudio();
    phase='idle';
    modal.classList.remove('active');
    if(raf){cancelAnimationFrame(raf);raf=null;}
    arrows=[];particles=[];feedback.textContent='';lastT=null;
  }

  avatarBtn.addEventListener('click',()=>{
    modal.classList.add('active');
    initAudioCtx();
    loadAudio(); // preload in background
    phase='idle';resetState();lastT=null;
    if(raf)cancelAnimationFrame(raf);
    raf=requestAnimationFrame(loop);
  });
  closeBtn.addEventListener('click',closeGame);
  modal.addEventListener('click',e=>{if(e.target===modal)closeGame();});
})();
</script>
</body>
</html>
