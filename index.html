<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>drmy</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080604;
  --surface:#0f0a06;
  --border:#1e1208;
  --border2:#2e1c0c;
  --latte:#c4a882;
  --latte2:#d8c4a0;
  --cream:#f4ede2;
  --muted:#6e5540;
  --muted2:#3e2812;
  --gold:#ddb84a;
  --sage:#7ab88a;
  --rose:#c08898;
  --sky:#7aaccA;
  --accent:#cfe03c;
}
html{scroll-behavior:smooth}
body{
  background-color:var(--bg);
  background-image:
    radial-gradient(ellipse 110% 60% at 8% -5%, rgba(110,68,26,.22) 0%,transparent 52%),
    radial-gradient(ellipse 80% 55% at 92% 105%,rgba(72,40,10,.28) 0%,transparent 48%),
    radial-gradient(ellipse 50% 40% at 50% 50%,rgba(30,16,4,.15) 0%,transparent 100%);
  color:var(--cream);
  font-family:'Cormorant Garamond','Georgia',serif;
  min-height:100vh;overflow-x:hidden;
  cursor:default;
}

/* ── VHS / GRAIN ── */
#vhs-canvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:500;opacity:.38;mix-blend-mode:screen}
#vhs-scanlines{position:fixed;inset:0;pointer-events:none;z-index:501;background:repeating-linear-gradient(to bottom,transparent 0,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 3px)}
#vhs-band{position:fixed;left:0;right:0;height:2px;background:rgba(255,255,255,.04);pointer-events:none;z-index:502;top:-6px}

/* ── HEADER ── */
header{
  position:sticky;top:0;z-index:100;
  background:rgba(8,6,4,.9);
  backdrop-filter:blur(28px) saturate(140%);-webkit-backdrop-filter:blur(28px) saturate(140%);
  border-bottom:1px solid rgba(48,28,10,.8);
  overflow:visible;
}
/* decorative top accent line */
header::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 0%,rgba(196,168,130,.25) 20%,rgba(196,168,130,.45) 50%,rgba(196,168,130,.25) 80%,transparent 100%);
}
.header-inner{
  max-width:1020px;margin:0 auto;
  padding:20px 40px 20px;
  display:flex;align-items:center;gap:20px;overflow:visible;
}

/* avatar */
.avatar-wrap{position:relative;flex-shrink:0;cursor:pointer;user-select:none}
.avatar{
  width:60px;height:60px;border-radius:50%;object-fit:cover;
  border:1px solid rgba(196,168,130,.35);display:block;
  transition:transform .3s cubic-bezier(.22,1,.36,1),box-shadow .3s,filter .3s;
  filter:sepia(.12) brightness(.95);
}
.avatar-wrap:hover .avatar{
  transform:scale(1.08) rotate(-1deg);
  filter:sepia(.05) brightness(1.05);
  box-shadow:0 0 0 2px rgba(196,168,130,.15),0 6px 32px rgba(0,0,0,.7),0 0 40px rgba(196,168,130,.18);
}
.avatar-ring{
  position:absolute;inset:-5px;border-radius:50%;
  border:1px solid transparent;
  background:linear-gradient(var(--bg),var(--bg)) padding-box,
             conic-gradient(from 0deg,transparent 20%,rgba(196,168,130,.7) 40%,rgba(221,184,74,.6) 55%,transparent 75%) border-box;
  animation:spin 9s linear infinite;pointer-events:none;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* text block */
.header-text{display:flex;flex-direction:column;gap:2px}
.header-name-row{display:flex;align-items:center;gap:10px}
.header-text h1{
  font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;
  letter-spacing:.06em;line-height:1;
  background:linear-gradient(125deg,var(--cream) 0%,var(--latte2) 50%,var(--latte) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.header-text .tagline{
  font-family:'DM Mono',monospace;font-size:8.5px;font-weight:300;
  color:var(--muted);letter-spacing:.22em;text-transform:lowercase;
  opacity:.75;
}

/* socials */
.socials{margin-left:auto;display:flex;align-items:center;gap:6px;overflow:visible}
.socials a{
  display:flex;align-items:center;justify-content:center;
  width:30px;height:30px;border-radius:50%;
  border:1px solid var(--border2);background:rgba(20,12,6,.8);
  transition:border-color .22s,color .22s,transform .22s,background .22s,box-shadow .22s;
  text-decoration:none;color:var(--muted);flex-shrink:0;
}
.socials a:hover{
  border-color:rgba(196,168,130,.5);color:var(--latte2);
  transform:translateY(-4px) scale(1.08);
  background:rgba(196,168,130,.07);
  box-shadow:0 6px 20px rgba(0,0,0,.5);
}
.socials a svg{width:12px;height:12px;fill:currentColor;display:block}
.socials a img{width:13px;height:13px;object-fit:contain;display:block;filter:brightness(.7);transition:filter .22s}
.socials a:hover img{filter:brightness(.95)}
.vgen-wrap{position:relative;display:flex;align-items:center}
.comm-callout{
  position:absolute;bottom:calc(100% + 14px);left:50%;
  transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:2px;
  pointer-events:none;animation:bob 2.4s ease-in-out infinite;white-space:nowrap;z-index:200;
}
.comm-callout span{
  font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:.2em;
  color:var(--accent);text-shadow:0 0 12px rgba(207,224,60,.8),0 0 30px rgba(207,224,60,.25);
}
.comm-arrow{width:9px;height:13px;color:var(--accent);filter:drop-shadow(0 0 5px rgba(207,224,60,.7));display:block}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-7px)}}

/* ── INTRO / PAGE HERO ── */
.page-intro{
  max-width:1020px;margin:0 auto;
  padding:52px 40px 0;
  display:flex;flex-direction:column;gap:6px;
}
.page-intro-title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(36px,6vw,72px);font-weight:300;font-style:italic;
  letter-spacing:-.01em;line-height:1;
  color:rgba(244,237,226,.08);
  user-select:none;pointer-events:none;
  white-space:nowrap;overflow:hidden;
}
.page-intro-line{
  height:1px;
  background:linear-gradient(90deg,transparent,var(--border2) 30%,var(--border2) 70%,transparent);
  margin:14px 0 0;
}

/* ── DIVIDER ── */
.section-divider{
  max-width:1020px;margin:0 auto 44px;padding:48px 40px 0;
  display:flex;align-items:center;gap:20px;
}
.divider-line{
  flex:1;height:1px;
  background:linear-gradient(90deg,transparent,var(--border2) 20%,rgba(196,168,130,.2) 50%,var(--border2) 80%,transparent);
}
.divider-label{
  font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:.28em;
  color:rgba(110,85,64,.7);text-transform:lowercase;
  padding:3px 12px;border:1px solid var(--border2);border-radius:20px;
  background:rgba(20,12,6,.6);
}

/* ── GALLERY ── */
.gallery{max-width:1020px;margin:0 auto 100px;padding:0 40px;position:relative}
.item{
  position:absolute;border-radius:6px;overflow:hidden;
  background:var(--surface);
  border:1px solid var(--border);
  cursor:pointer;
  transition:transform .35s cubic-bezier(.22,1,.36,1),box-shadow .35s,border-color .35s,filter .35s;
  filter:brightness(.92) saturate(.88);
}
.item::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 55%,rgba(8,5,2,.55) 100%);
  pointer-events:none;opacity:0;transition:opacity .35s;
}
.item:hover{
  transform:translateY(-8px) scale(1.018);
  box-shadow:0 24px 60px rgba(0,0,0,.75),0 0 0 1px rgba(196,168,130,.15);
  border-color:rgba(196,168,130,.18);
  filter:brightness(1.04) saturate(1.05);
}
.item:hover::after{opacity:1}
.item img{width:100%;height:auto;display:block}

/* ── LIGHTBOX ── */
.lightbox{
  position:fixed;inset:0;
  background:rgba(4,2,1,.97);
  display:none;justify-content:center;align-items:center;
  z-index:9999;animation:fadeIn .25s ease;
  backdrop-filter:blur(4px);
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.lightbox.active{display:flex}
.lightbox img{
  max-width:86vw;max-height:84vh;object-fit:contain;
  border-radius:6px;border:1px solid rgba(196,168,130,.1);cursor:zoom-in;
  transition:transform .14s;box-shadow:0 50px 120px rgba(0,0,0,.95);
}
.lb-btn{
  position:absolute;background:rgba(244,237,226,.05);border:1px solid rgba(196,168,130,.12);
  color:rgba(244,237,226,.6);border-radius:50%;width:38px;height:38px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  font-size:14px;transition:all .2s;
  user-select:none;top:50%;transform:translateY(-50%);backdrop-filter:blur(10px);
}
.lb-btn:hover{background:rgba(244,237,226,.1);border-color:rgba(196,168,130,.4);color:var(--cream)}
.lb-close{top:18px;right:18px;transform:none;font-size:11px}
.lb-prev{left:12px}.lb-next{right:12px}
.lb-counter{
  position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  font-family:'DM Mono',monospace;font-size:8px;color:var(--latte);
  letter-spacing:.2em;background:rgba(4,2,1,.7);
  padding:3px 14px;border-radius:20px;border:1px solid var(--border2);
}
@media(hover:none)and(pointer:coarse){.lb-prev,.lb-next{display:none}}

/* ── FOOTER ── */
footer{
  text-align:center;padding:40px;
  font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.22em;
  color:var(--muted2);border-top:1px solid var(--border);
  position:relative;
}
footer::before{
  content:'';position:absolute;top:-1px;left:20%;right:20%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(196,168,130,.15),transparent);
}

/* ── GAME MODAL ── */
#game-modal{position:fixed;inset:0;background:rgba(2,1,0,.99);display:none;z-index:8000}
#game-modal.active{display:block}
#game-canvas{position:absolute;inset:0;width:100%;height:100%;display:block}

.game-topbar{
  position:absolute;top:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;
  background:linear-gradient(to bottom,rgba(2,1,0,.9) 0%,rgba(2,1,0,.15) 80%,transparent 100%);
  pointer-events:none;
}
.game-topbar>*{pointer-events:all}
.game-title{
  font-family:'DM Mono',monospace;font-size:8.5px;letter-spacing:.22em;
  color:rgba(196,168,130,.55);text-transform:lowercase;
}
.game-topbar-right{display:flex;align-items:center;gap:6px}
.game-close,.game-credits{
  background:rgba(6,3,1,.88);border:1px solid rgba(46,28,12,.9);
  font-family:'DM Mono',monospace;font-size:8.5px;letter-spacing:.1em;
  padding:5px 12px;border-radius:4px;cursor:pointer;
  transition:border-color .15s,color .15s,background .15s;
  text-decoration:none;display:inline-flex;align-items:center;backdrop-filter:blur(8px);
}
.game-close{color:var(--muted)}.game-close:hover{color:var(--cream);border-color:rgba(110,85,64,.6)}
.game-credits{color:rgba(122,172,202,.7);border-color:rgba(122,172,202,.15)}.game-credits:hover{color:#b8e0f0;border-color:rgba(122,172,202,.4)}

.game-bottom{
  position:absolute;bottom:0;left:0;right:0;z-index:10;
  padding:8px 24px 16px;
  background:linear-gradient(to top,rgba(2,1,0,.92) 0%,rgba(2,1,0,.25) 70%,transparent 100%);
  pointer-events:none;display:flex;flex-direction:column;gap:5px;align-items:center;
}
.game-bottom>*{pointer-events:all}
.hp-bar-wrap{display:flex;align-items:center;gap:8px;width:100%;max-width:300px}
.hp-bar-bg{flex:1;height:2px;background:rgba(255,255,255,.04);border-radius:1px;overflow:hidden}
.hp-bar-fill{height:100%;border-radius:1px;transition:width .2s,background .35s;background:linear-gradient(90deg,var(--latte),var(--gold))}
.hp-label{font-family:'DM Mono',monospace;font-size:7px;color:rgba(110,85,64,.6);letter-spacing:.12em;white-space:nowrap;min-width:44px}
.game-hud-row{display:flex;justify-content:space-between;align-items:center;font-family:'DM Mono',monospace;font-size:9.5px;color:rgba(110,85,64,.55);letter-spacing:.12em;width:100%;max-width:300px}
.game-hud-row span{color:var(--latte2)}
#game-feedback{font-family:'DM Mono',monospace;font-size:8.5px;color:rgba(110,85,64,.6);letter-spacing:.16em;text-align:center;height:12px}
.bottom-row{display:flex;align-items:center;gap:18px;flex-wrap:wrap;justify-content:center}
.ar-row{display:flex;align-items:center;gap:7px;font-family:'DM Mono',monospace;font-size:7.5px;color:rgba(110,85,64,.5);letter-spacing:.1em}
.ar-row input[type=range]{-webkit-appearance:none;appearance:none;width:72px;height:2px;border-radius:1px;background:rgba(255,255,255,.06);outline:none;cursor:pointer}
.ar-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:8px;height:8px;border-radius:50%;background:var(--latte);cursor:pointer;box-shadow:0 0 6px rgba(196,168,130,.5)}
.ar-val{color:rgba(244,237,226,.65);min-width:28px;text-align:right}
.hint{font-family:'DM Mono',monospace;font-size:7.5px;color:rgba(62,40,18,.8);letter-spacing:.09em}
.hint b{color:rgba(196,168,130,.55);font-weight:500}

/* loading overlay */
#game-loading{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;z-index:20;
  background:rgba(2,1,0,.98);pointer-events:none;
  transition:opacity .6s;
}
#game-loading.hidden{opacity:0;pointer-events:none}
.loading-dots{display:flex;gap:8px}
.loading-dots span{width:4px;height:4px;border-radius:50%;background:var(--latte);opacity:.2;animation:ldot 1.1s ease-in-out infinite}
.loading-dots span:nth-child(2){animation-delay:.2s}
.loading-dots span:nth-child(3){animation-delay:.4s}
@keyframes ldot{0%,80%,100%{opacity:.2;transform:scale(.7)}40%{opacity:.9;transform:scale(1)}}
.loading-text{font-family:'DM Mono',monospace;font-size:8.5px;color:rgba(110,85,64,.55);letter-spacing:.22em}

@media(max-width:680px){
  .gallery,.page-intro{padding-left:20px;padding-right:20px}
  .header-inner{padding:16px 20px}
  .section-divider{padding:36px 20px 0}
  .page-intro{padding-top:36px}
}
</style>
</head>

  <div class="game-bottom">
    <div class="hp-bar-wrap">
      <span class="hp-label" id="hud-hp-label">hp 10/10</span>
      <div class="hp-bar-bg"><div class="hp-bar-fill" id="hp-bar-fill" style="width:100%"></div></div>
    </div>
    <div class="game-hud-row">
      <div>score &nbsp;<span id="hud-score">0</span></div>
      <div id="game-feedback"></div>
      <div>combo &nbsp;<span id="hud-combo">0</span></div>
    </div>
    <div class="bottom-row">
      <div class="ar-row">
        <span>AR</span>
        <input type="range" id="ar-slider" min="0.2" max="4" step="0.05" value="0.4">
        <span class="ar-val" id="ar-val">0.40s</span>
      </div>
      <div class="hint"><b>&#x2190;&#x2191;&#x2192;&#x2193;</b> / <b>AWDS</b> &#x2014; rotate shield</div>
    </div>
  </div>
</div>

<script>
/* ═══ VHS GRAIN ═══ */
(function(){
  const cv=document.getElementById('vhs-canvas'),cx=cv.getContext('2d'),bd=document.getElementById('vhs-band');
  let by=-10,bs=0.6;
  function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  function tick(){
    const W=cv.width,H=cv.height,id=cx.createImageData(W,H),d=id.data;
    for(let i=0;i<d.length;i+=4)if(Math.random()<.07){const v=Math.random()*200|0;d[i]=v*.65|0;d[i+1]=v*.38|0;d[i+2]=v*.18|0;d[i+3]=Math.random()*40|0;}
    cx.putImageData(id,0,0);
    if(Math.random()<.04){const ly=Math.random()*H|0;cx.fillStyle='rgba(255,240,200,'+(Math.random()*.06).toFixed(3)+')';cx.fillRect(0,ly,W,1);}
    by+=bs;if(by>window.innerHeight+10){by=-10;bs=.35+Math.random()*.7;}
    bd.style.top=by+'px';requestAnimationFrame(tick);
  }
  tick();
})();

/* ═══ GALLERY ═══ */
(function(){
  const galleryEl=document.getElementById('gallery'),lightbox=document.getElementById('lightbox'),lbImg=document.getElementById('lightbox-img'),lbCounter=document.getElementById('lb-counter');
  let images=[],items=[],currentIndex=0,zoomed=false;
  const GAP=12;
  function numCols(){const w=galleryEl.clientWidth;return w<480?2:w<720?3:4;}
  function layout(){
    const W=galleryEl.clientWidth,cols=numCols(),colW=(W-GAP*(cols-1))/cols,hs=new Array(cols).fill(0);
    items.forEach(({el,img})=>{const nH=img.naturalHeight||0,nW=img.naturalWidth||1,iH=nH?Math.round(colW*nH/nW):colW;let col=0;for(let c=1;c<cols;c++)if(hs[c]<hs[col])col=c;el.style.width=colW+'px';el.style.left=col*(colW+GAP)+'px';el.style.top=hs[col]+'px';hs[col]+=iH+GAP;});
    galleryEl.style.height=Math.max(...hs)-GAP+'px';
  }
  async function loadImages(){
    try{const r=await fetch('arch/images.json');images=await r.json();}catch{images=[];}
    images.forEach((url,i)=>{const el=document.createElement('div');el.className='item';const img=document.createElement('img');img.src=url;img.loading='lazy';img.alt='';img.onclick=()=>openLB(i);img.onload=layout;img.onerror=layout;el.appendChild(img);galleryEl.appendChild(el);items.push({el,img});});
  }
  window.addEventListener('resize',layout);
  function openLB(i){currentIndex=i;lbImg.src=images[i];lbCounter.textContent=(i+1)+' / '+images.length;lightbox.classList.add('active');zoomed=false;lbImg.style.transform='scale(1)';lbImg.style.cursor='zoom-in';}
  const closeLB=()=>lightbox.classList.remove('active');
  const prevLB=()=>{if(currentIndex>0)openLB(currentIndex-1);};
  const nextLB=()=>{if(currentIndex<images.length-1)openLB(currentIndex+1);};
  document.getElementById('lb-close').onclick=closeLB;
  document.getElementById('lb-prev').onclick=prevLB;
  document.getElementById('lb-next').onclick=nextLB;
  lbImg.addEventListener('click',()=>{zoomed=!zoomed;lbImg.style.transform=zoomed?'scale(1.85)':'scale(1)';lbImg.style.cursor=zoomed?'zoom-out':'zoom-in';});
  lbImg.addEventListener('mousemove',e=>{if(!zoomed)return;const r=lbImg.getBoundingClientRect();const x=((e.clientX-r.left)/r.width-.5)*2,y=((e.clientY-r.top)/r.height-.5)*2;lbImg.style.transform='scale(1.85) translate('+(-x*30)+'%,'+(-y*30)+'%)';});
  lbImg.addEventListener('mouseleave',()=>{if(zoomed)lbImg.style.transform='scale(1.85)';});
  lightbox.addEventListener('click',e=>{if(e.target===lightbox)closeLB();});
  let lbTX=null,lbTY=null;
  lightbox.addEventListener('touchstart',e=>{lbTX=e.touches[0].clientX;lbTY=e.touches[0].clientY;},{passive:true});
  lightbox.addEventListener('touchend',e=>{if(lbTX===null)return;const dx=e.changedTouches[0].clientX-lbTX,dy=e.changedTouches[0].clientY-lbTY;if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){dx<0?nextLB():prevLB();}lbTX=null;},{passive:true});
  document.addEventListener('keydown',e=>{if(!lightbox.classList.contains('active'))return;if(e.key==='ArrowRight')nextLB();if(e.key==='ArrowLeft')prevLB();if(e.key==='Escape')closeLB();});
  loadImages();
})();


/* ══════════════════════════════════════════════════════
   SHIELD GAME
   ══════════════════════════════════════════════════════ */
(function(){
  const modal    = document.getElementById('game-modal');
  const gc       = document.getElementById('game-canvas');
  const ctx      = gc.getContext('2d');
  const avatarBtn= document.getElementById('avatar-btn');
  const closeBtn = document.getElementById('game-close-btn');
  const hudScore = document.getElementById('hud-score');
  const hudCombo = document.getElementById('hud-combo');
  const hpLabel  = document.getElementById('hud-hp-label');
  const hpFill   = document.getElementById('hp-bar-fill');
  const feedback = document.getElementById('game-feedback');
  const arSlider = document.getElementById('ar-slider');
  const arVal    = document.getElementById('ar-val');
  const loadingEl= document.getElementById('game-loading');

  /* ─────────────────────────────────────────────────
     AUDIO
     Song starts AFTER leadIn seconds of silence.
     Game clock starts at t=0 when startGame() runs.
     The song's internal time is: gameTime - leadIn (when >= 0).
     Beatmap note times are in game-clock space (include lead_in).
  ───────────────────────────────────────────────── */
  const audioEl = document.getElementById('game-audio');
  let audioCtx=null, gainNode=null, audioReady=false;
  let leadIn = 3;          // read from beatmap header (# lead_in: N)
  let gameStartWall = 0;   // performance.now() at t=0
  let songStartWall = 0;   // performance.now() when song actually started
  let songStarted   = false;

  function initAudio(){
    if(audioCtx) return;
    audioCtx = new(window.AudioContext||window.webkitAudioContext)();
    gainNode  = audioCtx.createGain();
    gainNode.gain.value = 0.28;
    const src = audioCtx.createMediaElementSource(audioEl);
    src.connect(gainNode); gainNode.connect(audioCtx.destination);
    audioReady = true;
  }

  function startAudio(){
    if(!audioReady) initAudio();
    if(audioCtx.state==='suspended') audioCtx.resume();
    audioEl.pause(); audioEl.currentTime = 0;
    songStarted = false;
    /* Mark game-clock t=0 RIGHT NOW */
    gameStartWall = performance.now();
    /* Schedule song to play at game-clock t=leadIn.
       We use AudioContext clock for precision: schedule via setTimeout
       but correct for any drift using AudioContext.currentTime. */
    const acStart = audioCtx.currentTime; // AudioContext time at game t=0
    const playAt  = acStart + leadIn;     // AudioContext time to start song
    /* Use a precise AudioContext-based delay */
    function tryPlay(){
      const now = audioCtx.currentTime;
      if(now >= playAt - 0.004){ // within 4ms → play now
        if(phase==='playing' && !songStarted){
          songStarted = true;
          songStartWall = performance.now();
          audioEl.play().catch(()=>{});
        }
      } else {
        const remaining = (playAt - now) * 1000;
        setTimeout(tryPlay, Math.max(4, remaining - 8));
      }
    }
    if(leadIn <= 0.01){
      songStarted = true;
      songStartWall = performance.now();
      audioEl.play().catch(()=>{});
    } else {
      setTimeout(tryPlay, Math.max(4, leadIn * 1000 - 16));
    }
    audioEl.onended = ()=>{ if(phase==='playing') phase='results'; };
  }

  function stopAudio(){
    audioEl.pause(); audioEl.currentTime=0;
    audioEl.onended=null;
    gameStartWall=0; songStartWall=0; songStarted=false;
  }

  /* Returns seconds since game start (t=0).
     Song plays from t=leadIn onward, so song position = gameTime()-leadIn. */
  function gameTime(){
    if(!gameStartWall) return 0;
    const wall = (performance.now()-gameStartWall)/1000;
    /* If song is playing, use audioEl.currentTime + leadIn for precision */
    if(songStarted && audioEl.readyState>=2 && !audioEl.paused){
      return audioEl.currentTime + leadIn;
    }
    return wall;
  }

  /* ── Blips ── */
  function blip(ok,dir){
    if(!audioCtx) return;
    const t=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    if(ok){
      const o2=audioCtx.createOscillator(),g2=audioCtx.createGain();
      o2.connect(g2);g2.connect(audioCtx.destination);
      const f=[[523,659],[659,784],[784,987],[698,880]];
      o.type='sine';o.frequency.value=f[dir][0];o2.type='sine';o2.frequency.value=f[dir][1];
      g.gain.setValueAtTime(.72,t);g.gain.exponentialRampToValueAtTime(.0001,t+.26);
      g2.gain.setValueAtTime(.52,t);g2.gain.exponentialRampToValueAtTime(.0001,t+.3);
      o.start();o.stop(t+.28);o2.start();o2.stop(t+.32);
    } else {
      o.type='sawtooth';o.frequency.value=90;
      g.gain.setValueAtTime(.35,t);g.gain.exponentialRampToValueAtTime(.0001,t+.18);
      o.start();o.stop(t+.2);
    }
  }

  /* ── Canvas ── */
  const DPR = window.devicePixelRatio||1;
  let W=window.innerWidth, H=window.innerHeight, CX, CY, SHIELD_R, CUP_R;
  let approachRate = 0.4;

  function calcSizes(){
    CX=W/2; CY=H/2;
    const S=Math.min(W,H);
    SHIELD_R = S*0.105;
    CUP_R    = S*0.019;
  }
  function resizeCanvas(){
    const nw=window.innerWidth,nh=window.innerHeight;
    if(gc.width===Math.round(nw*DPR)&&gc.height===Math.round(nh*DPR)) return;
    gc.width=Math.round(nw*DPR); gc.height=Math.round(nh*DPR);
    gc.style.width=nw+'px'; gc.style.height=nh+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
    W=nw; H=nh; calcSizes();
  }

  arSlider.addEventListener('input',()=>{
    approachRate=parseFloat(arSlider.value);
    arVal.textContent=approachRate.toFixed(2)+'s';
  });

  /* ── Direction system ── */
  /* dir 0=left-incoming, 1=top-incoming, 2=right-incoming, 3=bottom-incoming */
  const COLS = ['#e8c49a','#9ab8e8','#c498a8','#8ac49a'];
  const LABELS = ['\u2190','\u2191','\u2192','\u2193'];
  const DIR_KEYS = {'arrowleft':0,'a':0,'arrowup':1,'w':1,'arrowright':2,'d':2,'arrowdown':3,'s':3};

  /* Spawn exactly at viewport edge along cardinal axis */
  function spawnPos(dir){
    switch(dir){
      case 0: return {x:0,   y:CY,  nx: 1, ny: 0};
      case 1: return {x:CX,  y:0,   nx: 0, ny: 1};
      case 2: return {x:W,   y:CY,  nx:-1, ny: 0};
      case 3: return {x:CX,  y:H,   nx: 0, ny:-1};
    }
  }
  /* Speed so arrow travels from edge to shield ring in approachRate seconds */
  function arrowSpeed(dir){
    const p=spawnPos(dir);
    return Math.hypot(p.x-CX,p.y-CY)/approachRate;
  }

  /* ── Shield ──
     Always active. Rotates with keypress.
     Grace window: old direction still parries for GRACE seconds after rotation. */
  const GRACE = 0.13;
  let shieldDir=0, prevDir=-1, prevAt=-999;

  /* Arc angle ranges — arc faces the incoming side */
  const SHIELD_ARC=[
    [Math.PI*0.58, Math.PI*1.42],  // left
    [Math.PI*1.08, Math.PI*1.92],  // up
    [-Math.PI*0.42,Math.PI*0.42],  // right
    [Math.PI*0.08, Math.PI*0.92],  // down
  ];

  function rotateShield(dir){
    if(dir===shieldDir) return;
    prevDir=shieldDir; prevAt=performance.now()/1000;
    shieldDir=dir;
  }
  function shieldCovers(dir){
    if(shieldDir===dir) return true;
    if(prevDir===dir && (performance.now()/1000-prevAt)<GRACE) return true;
    return false;
  }

  /* ── Beatmap — fetched from beatmap.txt ──
     Format: "time_seconds direction" per line
     Headers: "# lead_in: N" and "# approach_rate: N"
     Note times are in GAME CLOCK space (i.e. first note at ~3.1s means
     the arrow arrives 3.1s after game start, while song starts at leadIn=3s). */
  let BEATMAP = [];
  let beatmapLoaded = false;

  async function loadBeatmap(){
    try {
      const res = await fetch('beatmap.txt?nc='+Date.now());
      if(!res.ok) throw new Error(res.status);
      const text = await res.text();
      const notes = [];
      for(const raw of text.split('\n')){
        const line = raw.split('#')[0].trim(); // strip inline comments
        if(!line) continue;
        /* header lines look like "# key: val" — but we stripped # above,
           so re-check the raw line */
        const rawTrim = raw.trim();
        if(rawTrim.startsWith('# lead_in:')){
          const v=parseFloat(rawTrim.replace(/.*lead_in:/,''));
          if(!isNaN(v)) leadIn=v;
          continue;
        }
        if(rawTrim.startsWith('# approach_rate:')){
          const v=parseFloat(rawTrim.replace(/.*approach_rate:/,''));
          if(!isNaN(v)&&v>0){
            approachRate=v;
            arSlider.value=v;
            arVal.textContent=v.toFixed(2)+'s';
          }
          continue;
        }
        const parts=line.split(/\s+/);
        if(parts.length<2) continue;
        const t=parseFloat(parts[0]),d=parseInt(parts[1]);
        if(!isNaN(t)&&d>=0&&d<=3) notes.push({time:t,dir:d});
      }
      notes.sort((a,b)=>a.time-b.time);
      BEATMAP=notes;
    } catch(e){
      console.warn('beatmap.txt load failed:',e);
    }
    beatmapLoaded=true;
  }

  /* ── State ── */
  const MAX_HP=10;
  let score,combo,hp,phase='idle',raf=null;
  let arrows=[],particles=[],bmIdx=0;

  function resetState(){
    score=0;combo=0;hp=MAX_HP;arrows=[];particles=[];bmIdx=0;
    shieldDir=0;prevDir=-1;prevAt=-999;
    gameStartWall=0; songStartWall=0; songStarted=false;
    updateHUD();feedback.textContent='';
  }
  function updateHUD(){
    hudScore.textContent=score; hudCombo.textContent=combo;
    const p=Math.max(0,hp/MAX_HP*100);
    hpFill.style.width=p+'%';
    hpFill.style.background = hp>MAX_HP*.5
      ? 'linear-gradient(90deg,#c4a882,#e8c870)'
      : hp>MAX_HP*.25
        ? 'linear-gradient(90deg,#c4a882,#e8a040)'
        : 'linear-gradient(90deg,#c498a8,#e87878)';
    hpLabel.textContent='hp '+hp+'/'+MAX_HP;
  }

  /* ── Spawn ── */
  function spawnArrow(dir){
    const p=spawnPos(dir), spd=arrowSpeed(dir);
    arrows.push({x:p.x,y:p.y,vx:p.nx*spd,vy:p.ny*spd,dir,color:COLS[dir],label:LABELS[dir],pastShield:false,dead:false});
  }

  /* ── Collision ── */
  function checkCollisions(){
    for(const a of arrows){
      if(a.dead) continue;
      const dist=Math.hypot(a.x-CX,a.y-CY);
      if(!a.pastShield){
        if(dist<=SHIELD_R+1){
          if(shieldCovers(a.dir)){
            a.dead=true; combo++; score+=100+combo*10;
            burst(a.x,a.y,a.color,12); blip(true,a.dir);
            feedback.textContent = combo>=10 ? combo+'\u00d7 COMBO!! \u2615'
                                 : combo>=5  ? combo+'\u00d7 combo!'
                                 : 'parried!';
            feedback.style.color='#8ac49a';
          } else { a.pastShield=true; }
        }
      } else {
        if(dist<=CUP_R){
          a.dead=true; hp=Math.max(0,hp-1); combo=0;
          burst(CX,CY,'#c498a8',14); blip(false,a.dir);
          feedback.textContent = hp<=0 ? 'the coffee!! \ud83d\ude31'
                               : hp<=2 ? 'careful!!'
                               : 'ouch!';
          feedback.style.color='#c498a8';
          if(hp<=0){ phase='results'; stopAudio(); }
        }
        if(dist>Math.hypot(W,H)/1.6) a.dead=true;
      }
      updateHUD();
    }
    arrows=arrows.filter(a=>!a.dead);
  }

  /* ── Draw: background ── */
  function drawBg(){
    ctx.clearRect(0,0,W,H);
    const rg=ctx.createRadialGradient(CX,CY,0,CX,CY,Math.hypot(W,H)/1.5);
    rg.addColorStop(0,'rgba(24,13,5,.97)'); rg.addColorStop(1,'rgba(3,1,0,1)');
    ctx.fillStyle=rg; ctx.fillRect(0,0,W,H);

    /* coffee-wood concentric rings — slightly richer */
    const S=Math.min(W,H), maxR=Math.max(W,H)*.9;
    for(let r=S*.045; r<maxR; r+=S*.055){
      const frac=r/maxR;
      const alpha=Math.max(0, .065*(1-frac*1.05));
      ctx.strokeStyle=`rgba(52,24,6,${alpha})`;
      ctx.lineWidth=4+frac*5;
      ctx.beginPath(); ctx.arc(CX,CY,r,0,Math.PI*2); ctx.stroke();
    }

    /* deep vignette */
    const vg=ctx.createRadialGradient(CX,CY,Math.min(W,H)*.22,CX,CY,Math.max(W,H)*.78);
    vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,.72)');
    ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);

    /* faint axis threads */
    ctx.strokeStyle='rgba(196,168,130,.015)'; ctx.lineWidth=1; ctx.setLineDash([2,18]);
    ctx.beginPath(); ctx.moveTo(CX,0); ctx.lineTo(CX,H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,CY); ctx.lineTo(W,CY); ctx.stroke();
    ctx.setLineDash([]);

    /* shield ring guide */
    ctx.strokeStyle='rgba(196,168,130,.04)'; ctx.lineWidth=1; ctx.setLineDash([2,9]);
    ctx.beginPath(); ctx.arc(CX,CY,SHIELD_R,0,Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
  }

  /* ── Draw: shield ── */
  function drawShield(nowSec){
    const S=Math.min(W,H), lw=S*.013;
    const[a0,a1]=SHIELD_ARC[shieldDir];
    const col=COLS[shieldDir];

    /* bloom */
    ctx.save();
    ctx.strokeStyle=col+'28'; ctx.lineWidth=lw*4; ctx.lineCap='round';
    ctx.shadowColor=col; ctx.shadowBlur=S*.06;
    ctx.beginPath(); ctx.arc(CX,CY,SHIELD_R,a0,a1); ctx.stroke();

    /* main arc */
    ctx.strokeStyle=col+'d0'; ctx.lineWidth=lw; ctx.shadowBlur=S*.022;
    ctx.beginPath(); ctx.arc(CX,CY,SHIELD_R,a0,a1); ctx.stroke();

    /* inner highlight */
    ctx.strokeStyle='rgba(255,255,220,.18)'; ctx.lineWidth=lw*.3; ctx.shadowBlur=2;
    ctx.beginPath(); ctx.arc(CX,CY,SHIELD_R*.9,a0,a1); ctx.stroke();
    ctx.restore();

    /* grace ghost */
    const grace=Math.max(0,1-(nowSec-prevAt)/GRACE);
    if(prevDir>=0&&grace>0){
      const[ga0,ga1]=SHIELD_ARC[prevDir];
      ctx.save();
      ctx.strokeStyle=COLS[prevDir]+(Math.round(grace*42).toString(16).padStart(2,'0'));
      ctx.lineWidth=lw*.5; ctx.lineCap='round'; ctx.setLineDash([3,7]);
      ctx.beginPath(); ctx.arc(CX,CY,SHIELD_R,ga0,ga1); ctx.stroke();
      ctx.setLineDash([]); ctx.restore();
    }

    /* direction labels outside ring */
    const D=SHIELD_R*1.54, fs=Math.max(10,S*.017);
    [{dir:0,x:CX-D,y:CY},{dir:1,x:CX,y:CY-D},{dir:2,x:CX+D,y:CY},{dir:3,x:CX,y:CY+D}]
    .forEach(({dir,x,y})=>{
      const active=dir===shieldDir;
      const inGrace=dir===prevDir&&grace>0;
      ctx.save();
      ctx.font=`bold ${fs}px "DM Mono",monospace`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      if(active){
        ctx.fillStyle=COLS[dir]; ctx.shadowColor=COLS[dir]; ctx.shadowBlur=12;
      } else if(inGrace){
        ctx.fillStyle=COLS[dir]+(Math.round(grace*70).toString(16).padStart(2,'0'));
      } else {
        ctx.fillStyle=COLS[dir]+'1a';
      }
      ctx.fillText(LABELS[dir],x,y);
      ctx.restore();
    });
  }

  /* ── Draw: coffee cup ── */
  function drawCup(){
    const r=CUP_R, bw=r*2.5, bh=r*2.2;
    /* saucer */
    ctx.save();
    ctx.shadowColor='rgba(196,168,130,.25)'; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.ellipse(CX,CY+bh*.55,bw*.5,r*.3,0,0,Math.PI*2);
    ctx.fillStyle='#201008'; ctx.fill();
    ctx.strokeStyle='rgba(196,168,130,.55)'; ctx.lineWidth=.7; ctx.stroke();
    ctx.restore();
    /* body */
    ctx.save();
    ctx.shadowColor='rgba(196,168,130,.12)'; ctx.shadowBlur=14;
    ctx.beginPath(); ctx.roundRect(CX-bw/2,CY-bh/2,bw,bh,r*.32);
    ctx.fillStyle='#140a04'; ctx.fill();
    ctx.strokeStyle='rgba(196,168,130,.6)'; ctx.lineWidth=.85; ctx.stroke();
    ctx.restore();
    /* handle */
    ctx.save(); ctx.strokeStyle='rgba(196,168,130,.55)'; ctx.lineWidth=.75;
    ctx.beginPath(); ctx.arc(CX+bw/2+r*.36,CY,r*.4,-Math.PI*.42,Math.PI*.42); ctx.stroke();
    ctx.restore();
    /* coffee surface */
    ctx.save();
    ctx.beginPath(); ctx.ellipse(CX,CY-bh*.14,bw*.31,bh*.09,0,0,Math.PI*2);
    ctx.fillStyle='#090401'; ctx.fill();
    ctx.strokeStyle='rgba(90,64,40,.6)'; ctx.lineWidth=.5; ctx.stroke();
    /* latte heart */
    ctx.fillStyle='rgba(196,168,130,.4)'; ctx.beginPath();
    const hx=CX,hy=CY-bh*.1,hr=r*.22;
    ctx.moveTo(hx,hy+hr);
    ctx.bezierCurveTo(hx,hy-hr*1.5,hx-hr*2.4,hy-hr*.75,hx-hr*2.4,hy+hr*.3);
    ctx.bezierCurveTo(hx-hr*2.4,hy+hr*2,hx,hy+hr*3.3,hx,hy+hr*3.3);
    ctx.bezierCurveTo(hx,hy+hr*3.3,hx+hr*2.4,hy+hr*2,hx+hr*2.4,hy+hr*.3);
    ctx.bezierCurveTo(hx+hr*2.4,hy-hr*.75,hx,hy-hr*1.5,hx,hy+hr);
    ctx.fill(); ctx.restore();
    /* steam */
    const t=performance.now()/1000;
    for(let i=0;i<2;i++){
      const sx=CX+(i===0?-r*.48:r*.4), wv=Math.sin(t*1.4+i*2)*r*.17;
      ctx.save(); ctx.strokeStyle='rgba(107,86,68,.38)'; ctx.lineWidth=.85; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(sx,CY-bh*.52);
      ctx.quadraticCurveTo(sx+wv,CY-bh*.85,sx-wv,CY-bh*1.18);
      ctx.stroke(); ctx.restore();
    }
  }

  /* ── Draw: arrows ── */
  function drawArrows(dt){
    const S=Math.min(W,H), sz=S*.016, trail=sz*3.8;
    for(const a of arrows){
      if(a.dead) continue;
      a.x+=a.vx*dt; a.y+=a.vy*dt;
      const dist=Math.hypot(a.x-CX,a.y-CY);
      const maxD=Math.hypot(W/2,H/2);
      const alpha=Math.min(1, .08+(maxD-dist)/(maxD-SHIELD_R)*1.1);
      const angle=Math.atan2(a.vy,a.vx);

      ctx.save(); ctx.globalAlpha=Math.max(0,Math.min(1,alpha));
      ctx.translate(a.x,a.y); ctx.rotate(angle);

      /* glow */
      ctx.shadowColor=a.pastShield?'#c498a8':a.color;
      ctx.shadowBlur=a.pastShield?sz*2:sz*.7;

      /* trail */
      const tg=ctx.createLinearGradient(-trail,0,0,0);
      tg.addColorStop(0,'transparent');
      tg.addColorStop(1,a.color+(a.pastShield?'aa':'3a'));
      ctx.strokeStyle=tg; ctx.lineWidth=a.pastShield?sz*.52:sz*.36; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(-trail,0); ctx.lineTo(-sz*.1,0); ctx.stroke();

      /* head */
      ctx.fillStyle=a.color;
      ctx.beginPath(); ctx.moveTo(sz,0); ctx.lineTo(-sz*.4,-sz*.58); ctx.lineTo(-sz*.1,0); ctx.lineTo(-sz*.4,sz*.58); ctx.closePath(); ctx.fill();
      ctx.restore();

      /* label */
      ctx.save(); ctx.globalAlpha=Math.max(0,Math.min(1,alpha))*.72;
      ctx.font=`bold ${sz*.8}px "DM Mono",monospace`;
      ctx.fillStyle=a.color; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(a.label, a.x+Math.cos(angle+Math.PI/2)*sz, a.y+Math.sin(angle+Math.PI/2)*sz);
      ctx.restore();
    }
  }

  /* ── Particles ── */
  function drawParticles(nowSec){
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i], age=nowSec-p.born;
      if(age>.52){ particles.splice(i,1); continue; }
      ctx.save(); ctx.globalAlpha=(1-age/.52)*.88;
      ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=4;
      ctx.beginPath(); ctx.arc(p.x+p.vx*age*80,p.y+p.vy*age*80,p.r*(1-age*.55),0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }
  function burst(x,y,color,n){
    const now=performance.now()/1000;
    for(let i=0;i<n;i++){
      const a=(Math.PI*2*i/n)+Math.random()*.4;
      particles.push({x,y,vx:Math.cos(a),vy:Math.sin(a),r:1.5+Math.random()*2.8,color,born:now});
    }
  }

  /* ── Overlay helpers ── */
  function overlayDark(alpha){
    const vg=ctx.createRadialGradient(CX,CY,0,CX,CY,Math.max(W,H)*.65);
    vg.addColorStop(0,`rgba(10,5,2,${alpha*.85})`);
    vg.addColorStop(1,`rgba(2,1,0,${alpha})`);
    ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
  }
  function txt(str,x,y,font,color,blur){
    ctx.save(); ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle=color; ctx.font=font;
    if(blur){ctx.shadowColor=color;ctx.shadowBlur=blur;}
    ctx.fillText(str,x,y); ctx.restore();
  }

  /* ── Main loop ── */
  let lastT=null;
  function loop(){
    const nowMs=performance.now(), nowSec=nowMs/1000;
    const dt=lastT!==null ? Math.min(nowSec-lastT,.05) : 0;
    lastT=nowSec;
    resizeCanvas();

    if(phase==='playing'){
      const gt=gameTime();
      /*
        Note times are in game-clock space. An arrow for note at time T should
        arrive at the shield ring at game-clock T. So we spawn it approachRate
        seconds before that: spawn when gt >= T - approachRate.
      */
      while(bmIdx<BEATMAP.length && gt>=BEATMAP[bmIdx].time-approachRate){
        spawnArrow(BEATMAP[bmIdx].dir);
        bmIdx++;
      }
      drawBg();
      checkCollisions();
      drawShield(nowSec);
      drawArrows(dt);
      drawParticles(nowSec);
      drawCup();

      /* combo badge */
      if(combo>=3){
        const S=Math.min(W,H);
        ctx.save();
        ctx.font=`bold ${10+Math.min(combo,20)*.28}px "DM Mono",monospace`;
        ctx.fillStyle=combo>=10?'#d4f030':'#c4a882';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.globalAlpha=.36; ctx.shadowColor=ctx.fillStyle; ctx.shadowBlur=10;
        ctx.fillText(combo+'\u00d7',CX,CY+SHIELD_R*1.55);
        ctx.restore();
      }

      /* end condition: song ended, or timeout, and no arrows in flight */
      if((audioEl.ended||(gt>leadIn+240))&&arrows.length===0) phase='results';

    } else if(phase==='results'){
      drawBg(); drawCup(); overlayDark(.88);
      txt('\u7d50\u679c',CX,CY-54,'300 30px "Cormorant Garamond",serif','#c4a882',22);
      txt('score  '+score,CX,CY-14,'13px "DM Mono",monospace','#d4be98',0);
      txt(hp>0?'coffee safe \u2615':'the coffee spilled\u2026',CX,CY+13,'11px "DM Mono",monospace',hp>0?'#8ac49a':'#c498a8',0);
      txt('press any key \u00b7 tap to retry',CX,CY+44,'10px "DM Mono",monospace','#503c2c',0);
      if(!feedback.textContent){
        feedback.textContent = score>5000?'perfect guard \u2736':score>2000?'well done~':'try again \u2661';
        feedback.style.color='#c4a882';
      }

    } else { /* idle */
      drawBg(); drawShield(nowSec); drawCup(); overlayDark(.72);
      txt('\u52d8\u5180\u3048\u3066\u60b2\u3057\u3044\u308f',CX,CY-SHIELD_R*1.65,'300 22px "Cormorant Garamond",serif','#c4a882',18);
      if(beatmapLoaded){
        txt('press any arrow key to start',CX,CY-SHIELD_R*1.12,'11px "DM Mono",monospace','#7a6050',0);
        txt('rotate shield \u00b7 protect the coffee \u2615',CX,CY-SHIELD_R*.72,'9.5px "DM Mono",monospace','#3a2818',0);
      } else {
        txt('loading beatmap\u2026',CX,CY-SHIELD_R*.5,'9px "DM Mono",monospace','#503c2c',0);
      }
    }

    raf=requestAnimationFrame(loop);
  }

  /* ── Input ── */
  function onDir(dir){
    if(phase==='idle'||phase==='results'){ if(beatmapLoaded) startGame(); return; }
    rotateShield(dir);
  }
  document.addEventListener('keydown',e=>{
    if(!modal.classList.contains('active')) return;
    if(e.target===arSlider) return;
    e.preventDefault();
    const k=e.key.toLowerCase();
    if(k in DIR_KEYS){ onDir(DIR_KEYS[k]); return; }
    if(e.key==='Escape') closeGame();
  });
  /* Touch / click: tap quadrant of viewport */
  function quadrant(x,y){ const dx=x-CX,dy=y-CY; return Math.abs(dx)>Math.abs(dy)?(dx<0?0:2):(dy<0?1:3); }
  gc.addEventListener('touchstart',e=>{
    e.preventDefault(); const r=gc.getBoundingClientRect();
    for(const t of e.changedTouches) onDir(quadrant(t.clientX-r.left,t.clientY-r.top));
  },{passive:false});
  gc.addEventListener('click',e=>{
    const r=gc.getBoundingClientRect(); onDir(quadrant(e.clientX-r.left,e.clientY-r.top));
  });

  /* ── Start / close ── */
  async function startGame(){
    if(!beatmapLoaded) return;
    initAudio();
    if(audioCtx.state==='suspended') await audioCtx.resume();
    resetState(); phase='playing'; lastT=null;
    startAudio(); /* sets gameStartWall=now, schedules song after leadIn ms */
  }
  function closeGame(){
    stopAudio(); phase='idle'; modal.classList.remove('active');
    if(raf){ cancelAnimationFrame(raf); raf=null; }
    arrows=[]; particles=[]; feedback.textContent=''; lastT=null;
  }

  window.addEventListener('resize',()=>{
    if(modal.classList.contains('active')){ W=window.innerWidth; H=window.innerHeight; calcSizes(); }
  });

  /* Open modal */
  avatarBtn.addEventListener('click', async ()=>{
    modal.classList.add('active');
    W=window.innerWidth; H=window.innerHeight;
    resizeCanvas(); calcSizes();
    initAudio();
    phase='idle'; resetState(); lastT=null;
    if(raf) cancelAnimationFrame(raf);
    raf=requestAnimationFrame(loop);
    /* load if not already done */
    if(!beatmapLoaded){
      loadingEl.classList.remove('hidden');
      await loadBeatmap();
      loadingEl.classList.add('hidden');
    }
  });
  closeBtn.addEventListener('click',closeGame);
  modal.addEventListener('click',e=>{ if(e.target===modal) closeGame(); });

  /* Preload in background */
  loadBeatmap();
})();
</script>
</body>
</html>
