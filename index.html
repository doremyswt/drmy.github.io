<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>drmy archive</title>

<style>
  body {
    margin: 0;
    background: #0d0d0d;
    color: #eee;
    font-family: Arial, sans-serif;
  }

  header {
    text-align: center;
    padding: 40px 20px 10px;
    font-size: 20px;
    letter-spacing: 2px;
    opacity: 0.7;
  }

  .gallery {
    column-count: 4;
    column-gap: 10px;
    padding: 10px;
  }

  .item {
    break-inside: avoid;
    margin-bottom: 10px;
  }

  img {
    width: 100%;
    display: block;
    border-radius: 6px;
    transition: transform 0.2s ease, opacity 0.2s;
    cursor: pointer;
  }

  img:hover {
    transform: scale(1.02);
    opacity: 0.9;
  }

  /* Lightbox */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
  }

  .lightbox.active {
    display: flex;
  }

  .lightbox img {
    max-width: 90%;
    max-height: 90%;
  }

  /* Responsive */
  @media (max-width: 1000px) {
    .gallery { column-count: 3; }
  }

  @media (max-width: 700px) {
    .gallery { column-count: 2; }
  }

  @media (max-width: 400px) {
    .gallery { column-count: 1; }
  }
</style>
</head>

<body>

<header>drmy archive</header>

<div class="gallery" id="gallery"></div>

<div class="lightbox" id="lightbox">
  <img id="lightbox-img">
</div>

<script>
const gallery = document.getElementById("gallery");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

// CHANGE THIS to your repo
const USER = "doremyswt";
const REPO = "drmy.github.io";
const FOLDER = "arch";

async function loadImages() {
  // get file list
  const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${FOLDER}`);
  const files = await res.json();

  // filter only images
  const images = files.filter(f =>
    f.name.endsWith(".png") ||
    f.name.endsWith(".jpg") ||
    f.name.endsWith(".jpeg") ||
    f.name.endsWith(".webp")
  );

  // get commit dates for each file
  const imagesWithDates = await Promise.all(images.map(async file => {
    const commitRes = await fetch(
      `https://api.github.com/repos/${USER}/${REPO}/commits?path=${FOLDER}/${file.name}&per_page=1`
    );
    const commitData = await commitRes.json();

    return {
      ...file,
      date: new Date(commitData[0].commit.committer.date)
    };
  }));

  // sort newest first
  imagesWithDates.sort((a, b) => b.date - a.date);

  // render
  imagesWithDates.forEach(file => {
    const div = document.createElement("div");
    div.className = "item";

    const img = document.createElement("img");
    img.src = file.download_url;

    img.onclick = () => {
      lightbox.classList.add("active");
      lightboxImg.src = img.src;
    };

    div.appendChild(img);
    gallery.appendChild(div);
  });
}

loadImages();

lightbox.onclick = () => {
  lightbox.classList.remove("active");
};
</script>

</body>
</html>
