<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>drmy archive</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #100d0a;
    --surface: #1a1410;
    --border: #2e231a;
    --latte: #c4a882;
    --steam: #6b5a4e;
    --cream: #f0e8dc;
    --muted: #7a6355;
    --espresso: #e8ddd0;
  }

  body {
    background-color: var(--bg);
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(100,70,40,0.18) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 100%, rgba(60,35,15,0.25) 0%, transparent 50%);
    color: var(--cream);
    font-family: 'Lora', Georgia, serif;
    min-height: 100vh;
  }

  /* ── VHS LAYERS ── */
  #vhs-canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 500;
    opacity: 0.55;
    mix-blend-mode: screen;
  }

  #vhs-scanlines {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 501;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.17) 3px,
      rgba(0,0,0,0.17) 4px
    );
  }

  #vhs-band {
    position: fixed;
    left: 0; right: 0;
    height: 4px;
    background: rgba(255,255,255,0.07);
    pointer-events: none;
    z-index: 502;
    top: -10px;
  }

  /* ── HEADER ──
     padding-top: 58px gives the floating callout (~48px tall)
     room to breathe above the icon without clipping.
  */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(16,13,10,0.90);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
    overflow: visible;
    padding-top: 58px;
  }

  .header-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 28px 22px;
    display: flex;
    align-items: center;
    gap: 22px;
    overflow: visible;
  }

  /* ── AVATAR ── */
  .avatar-wrap {
    position: relative;
    flex-shrink: 0;
    cursor: pointer;
  }

  .avatar {
    width: 72px; height: 72px;
    border-radius: 50%;
    object-fit: cover;
    border: 2.5px solid var(--latte);
    display: block;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }

  .avatar-wrap:hover .avatar {
    transform: scale(1.07);
    box-shadow: 0 0 20px rgba(196,168,130,0.4);
  }

  .avatar-ring {
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    border: 1px dashed var(--latte);
    opacity: 0.5;
    animation: spin 18s linear infinite;
    pointer-events: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── HEADER TEXT ── */
  .header-text { display: flex; flex-direction: column; gap: 5px; }

  .header-name-row {
    display: flex;
    align-items: center;
    gap: 9px;
  }

  .header-text h1 {
    font-family: 'Lora', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--cream);
    letter-spacing: 0.02em;
    line-height: 1;
  }

  .header-text .tagline {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: lowercase;
  }

  /* ── SOCIALS ── */
  .socials {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    overflow: visible;
  }

  .socials a {
    display: flex; align-items: center; justify-content: center;
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    transition: border-color .2s, transform .2s;
    text-decoration: none;
    color: var(--muted);
    flex-shrink: 0;
  }

  .socials a:hover { border-color: var(--latte); color: var(--latte); transform: translateY(-2px); }
  .socials a svg { width: 15px; height: 15px; fill: currentColor; display: block; }
  .socials a img { width: 17px; height: 17px; object-fit: contain; display: block; }

  /* ── COMMISSION CALLOUT ──
     Absolutely positioned from .vgen-wrap.
     bottom: calc(100% + 10px)  →  floats above the icon.
     left: 50% + translateX(-50%)  →  horizontally centred on icon.
     The header's padding-top (58px) ensures it never clips.
  */
  .vgen-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .comm-callout {
    position: absolute;
    bottom: calc(100% + 10px);
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    pointer-events: none;
    animation: bob 1.9s ease-in-out infinite;
    white-space: nowrap;
    z-index: 200;
  }

  .comm-callout span {
    font-family: 'DM Mono', monospace;
    font-size: 10.5px;
    font-weight: 400;
    letter-spacing: 0.14em;
    color: #d4f542;
    text-shadow: 0 0 10px rgba(212,245,66,0.7);
  }

  .comm-arrow {
    width: 14px; height: 18px;
    color: #d4f542;
    filter: drop-shadow(0 0 4px rgba(212,245,66,0.6));
    display: block;
  }

  @keyframes bob {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50%       { transform: translateX(-50%) translateY(-5px); }
  }

  /* ── DIVIDER ── */
  .divider {
    max-width: 960px;
    margin: 0 auto 32px;
    padding: 36px 28px 0;
    display: flex; align-items: center; gap: 14px;
  }

  .divider-line { flex: 1; height: 1px; background: var(--border); }

  .divider-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--latte);
    text-transform: lowercase;
  }

  /* ── GALLERY ── */
  .gallery {
    max-width: 960px;
    margin: 0 auto 60px;
    padding: 0 28px;
    position: relative;
  }

  .item {
    position: absolute;
    border-radius: 8px;
    overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: transform 0.22s ease, box-shadow 0.22s ease;
  }

  .item:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(0,0,0,0.45); }
  .item img { width: 100%; height: auto; display: block; }

  /* ── LIGHTBOX z:9999 > VHS z:500 ── */
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(42,29,18,0.96);
    display: none; justify-content: center; align-items: center;
    z-index: 9999;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .lightbox.active { display: flex; }

  .lightbox img {
    max-width: 88vw; max-height: 85vh;
    object-fit: contain;
    border-radius: 8px;
    border: 1px solid rgba(196,168,130,0.2);
    cursor: zoom-in;
    transition: transform 0.12s ease;
  }

  .lb-btn {
    position: absolute;
    background: rgba(245,240,232,0.08);
    border: 1px solid rgba(196,168,130,0.2);
    color: var(--cream);
    border-radius: 50%;
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 16px;
    transition: background 0.18s ease;
    user-select: none;
    top: 50%; transform: translateY(-50%);
  }

  .lb-btn:hover { background: rgba(245,240,232,0.16); }
  .lb-close { top: 24px; right: 24px; transform: none; font-size: 14px; }
  .lb-prev  { left: 20px; }
  .lb-next  { right: 20px; }

  .lb-counter {
    position: absolute;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    font-family: 'DM Mono', monospace;
    font-size: 11px; color: var(--latte);
    letter-spacing: 0.14em; opacity: 0.75;
  }

  /* ── MINI-GAME MODAL z:8000 ── */
  #game-modal {
    position: fixed; inset: 0;
    background: rgba(10,7,4,0.92);
    display: none; justify-content: center; align-items: center;
    z-index: 8000;
    animation: fadeIn 0.2s ease;
  }

  #game-modal.active { display: flex; }

  .game-box {
    background: #0d0a07;
    border: 1.5px solid var(--latte);
    border-radius: 10px;
    padding: 20px;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    position: relative;
    box-shadow: 0 0 50px rgba(196,168,130,0.10);
  }

  .game-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 0.2em;
    color: var(--latte); text-transform: lowercase;
  }

  #game-canvas {
    display: block;
    border-radius: 6px;
    border: 1px solid var(--border);
    image-rendering: pixelated;
  }

  .game-hint {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: var(--muted);
    letter-spacing: 0.1em; text-align: center;
  }

  .game-close {
    position: absolute; top: 12px; right: 14px;
    background: none; border: none;
    color: var(--muted); font-size: 13px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    transition: color 0.15s;
    letter-spacing: 0.08em;
  }

  .game-close:hover { color: var(--cream); }

  #game-score-display {
    font-family: 'DM Mono', monospace;
    font-size: 12px; color: var(--latte);
    letter-spacing: 0.15em;
  }

  /* ── FOOTER ── */
  footer {
    text-align: center; padding: 28px;
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 0.14em;
    color: var(--muted);
    border-top: 1px solid var(--border);
  }

  @media (max-width: 600px) {
    .gallery { padding: 0 14px; }
    .header-inner { padding: 0 18px 18px; }
    .divider { padding: 28px 16px 0; }
    .lb-btn.lb-prev { left: 8px; }
    .lb-btn.lb-next { right: 8px; }
  }
</style>
</head>

<script>
/* ─────────────────────────────────
   VHS GRAIN  (canvas noise)
───────────────────────────────── */
(function () {
  const canvas = document.getElementById('vhs-canvas');
  const ctx    = canvas.getContext('2d');
  const band   = document.getElementById('vhs-band');
  let bandY    = -10;
  let bandSpd  = 0.7;

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function tick() {
    const W = canvas.width, H = canvas.height;
    const id = ctx.createImageData(W, H);
    const d  = id.data;

    for (let i = 0; i < d.length; i += 4) {
      if (Math.random() < 0.10) {
        const v = Math.random() * 220 | 0;
        d[i]   = v * 0.6 | 0;   // warm tint
        d[i+1] = v * 0.38 | 0;
        d[i+2] = v * 0.22 | 0;
        d[i+3] = Math.random() * 55 | 0;
      }
    }
    ctx.putImageData(id, 0, 0);

    // occasional horizontal static streak
    if (Math.random() < 0.06) {
      const ly = Math.random() * H | 0;
      ctx.fillStyle = `rgba(255,240,210,${(Math.random() * 0.09).toFixed(3)})`;
      ctx.fillRect(0, ly, W, Math.random() < 0.5 ? 1 : 2);
    }

    // glitch band drift
    bandY += bandSpd;
    if (bandY > window.innerHeight + 12) {
      bandY   = -12;
      bandSpd = 0.4 + Math.random() * 0.9;
    }
    band.style.top = bandY + 'px';

    requestAnimationFrame(tick);
  }
  tick();
})();


/* ─────────────────────────────────
   GALLERY MASONRY
───────────────────────────────── */
const galleryEl = document.getElementById('gallery');
const lightbox  = document.getElementById('lightbox');
const lbImg     = document.getElementById('lightbox-img');
const lbCounter = document.getElementById('lb-counter');

let images = [], items = [], currentIndex = 0, zoomed = false;
const GAP = 10;

function numCols() {
  const w = galleryEl.clientWidth;
  if (w < 480) return 2;
  if (w < 720) return 3;
  return 4;
}

function layout() {
  const W = galleryEl.clientWidth;
  const cols = numCols();
  const colW = (W - GAP * (cols - 1)) / cols;
  const hs   = new Array(cols).fill(0);

  items.forEach(({ el, img }) => {
    const nH   = img.naturalHeight || 0;
    const nW   = img.naturalWidth  || 1;
    const itemH = nH ? Math.round(colW * nH / nW) : colW;

    let col = 0;
    for (let c = 1; c < cols; c++) if (hs[c] < hs[col]) col = c;

    el.style.width = colW + 'px';
    el.style.left  = col * (colW + GAP) + 'px';
    el.style.top   = hs[col] + 'px';
    hs[col] += itemH + GAP;
  });

  galleryEl.style.height = Math.max(...hs) - GAP + 'px';
}

async function loadImages() {
  try {
    const res = await fetch('arch/images.json');
    images = await res.json();
  } catch { images = []; }

  images.forEach((url, i) => {
    const el  = document.createElement('div');
    el.className = 'item';
    const img = document.createElement('img');
    img.src     = url;
    img.loading = 'lazy';
    img.alt     = '';
    img.onclick  = () => openLB(i);
    img.onload   = layout;
    img.onerror  = layout;
    el.appendChild(img);
    galleryEl.appendChild(el);
    items.push({ el, img });
  });
}

window.addEventListener('resize', layout);


/* ─────────────────────────────────
   LIGHTBOX
───────────────────────────────── */
function openLB(i) {
  currentIndex = i;
  lbImg.src = images[i];
  lbCounter.textContent = (i + 1) + ' / ' + images.length;
  lightbox.classList.add('active');
  zoomed = false;
  lbImg.style.transform = 'scale(1)';
  lbImg.style.cursor    = 'zoom-in';
}

const closeLB = () => lightbox.classList.remove('active');
const prevLB  = () => { if (currentIndex > 0)               openLB(currentIndex - 1); };
const nextLB  = () => { if (currentIndex < images.length-1) openLB(currentIndex + 1); };

document.getElementById('lb-close').onclick = closeLB;
document.getElementById('lb-prev').onclick  = prevLB;
document.getElementById('lb-next').onclick  = nextLB;

lbImg.addEventListener('click', () => {
  zoomed = !zoomed;
  lbImg.style.transform = zoomed ? 'scale(1.9)' : 'scale(1)';
  lbImg.style.cursor    = zoomed ? 'zoom-out'   : 'zoom-in';
});

lbImg.addEventListener('mousemove', e => {
  if (!zoomed) return;
  const r = lbImg.getBoundingClientRect();
  const x = ((e.clientX - r.left) / r.width  - 0.5) * 2;
  const y = ((e.clientY - r.top)  / r.height - 0.5) * 2;
  lbImg.style.transform = `scale(2) translate(${-x*45}%,${-y*45}%)`;
});

lbImg.addEventListener('mouseleave', () => { if (zoomed) lbImg.style.transform = 'scale(1.9)'; });
lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLB(); });

/* touch swipe for mobile lightbox */
let lbTouchStartX = null, lbTouchStartY = null;
lightbox.addEventListener('touchstart', e => {
  lbTouchStartX = e.touches[0].clientX;
  lbTouchStartY = e.touches[0].clientY;
}, { passive: true });
lightbox.addEventListener('touchend', e => {
  if (lbTouchStartX === null) return;
  const dx = e.changedTouches[0].clientX - lbTouchStartX;
  const dy = e.changedTouches[0].clientY - lbTouchStartY;
  // only register as a swipe if horizontal movement dominates
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    if (dx < 0) nextLB();
    else         prevLB();
  }
  lbTouchStartX = null;
  lbTouchStartY = null;
}, { passive: true });

document.addEventListener('keydown', e => {
  if (!lightbox.classList.contains('active')) return;
  if (e.key === 'ArrowRight') nextLB();
  if (e.key === 'ArrowLeft')  prevLB();
  if (e.key === 'Escape')     closeLB();
});

loadImages();


/* ─────────────────────────────────
   BEAN CATCHER MINI-GAME
───────────────────────────────── */
(function () {
  const modal     = document.getElementById('game-modal');
  const gc        = document.getElementById('game-canvas');
  const ctx       = gc.getContext('2d');
  const scoreEl   = document.getElementById('game-score-display');
  const avatarBtn = document.getElementById('avatar-btn');
  const closeBtn  = document.getElementById('game-close-btn');

  const W = gc.width, H = gc.height;
  let score, lives, falling, player, raf, running, spawnT, speed, keys;

  const heart = n => '♥'.repeat(n) + '♡'.repeat(3 - n);

  function updateHUD() {
    scoreEl.textContent = `score: ${score}  |  lives: ${heart(lives)}`;
  }

  function init() {
    score   = 0;
    lives   = 3;
    speed   = 1.5;
    running = true;
    spawnT  = 0;
    player  = { x: W / 2 - 20, y: H - 38, w: 40, h: 22 };
    falling = [];
    keys    = {};
    updateHUD();
    if (raf) cancelAnimationFrame(raf);
    gc.onclick = null;
    loop();
  }

  // keyboard
  document.addEventListener('keydown', e => {
    if (!modal.classList.contains('active')) return;
    keys[e.key] = true;
    if (['ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  });
  document.addEventListener('keyup', e => { keys[e.key] = false; });

  // touch drag
  let tx = null;
  gc.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
  gc.addEventListener('touchmove', e => {
    if (tx === null) return;
    const dx = e.touches[0].clientX - tx;
    player.x = Math.max(0, Math.min(W - player.w, player.x + dx));
    tx = e.touches[0].clientX;
  }, { passive: true });

  function spawn() {
    const bad = Math.random() < 0.24;
    falling.push({
      x:   8 + Math.random() * (W - 16) | 0,
      y:   -18,
      r:   bad ? 11 : 8,
      bad,
      vy:  speed * (0.75 + Math.random() * 0.7),
      rot: Math.random() * Math.PI * 2,
    });
  }

  function drawBg() {
    ctx.fillStyle = '#0d0a07';
    ctx.fillRect(0, 0, W, H);
    // floor
    ctx.strokeStyle = '#2e231a';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, H - 10); ctx.lineTo(W, H - 10); ctx.stroke();
    // scattered pixels (stars)
    ctx.fillStyle = '#221810';
    for (let i = 0; i < 22; i++) {
      ctx.fillRect(((i * 57 + 13) % (W - 4)), ((i * 41 + 9) % (H - 60)), 1, 1);
    }
  }

  function drawCup() {
    // cup body
    ctx.fillStyle   = '#221810';
    ctx.strokeStyle = '#c4a882';
    ctx.lineWidth   = 1.5;
    ctx.beginPath();
    ctx.roundRect(player.x, player.y, player.w, player.h, 4);
    ctx.fill(); ctx.stroke();
    // handle
    ctx.beginPath();
    ctx.arc(player.x + player.w + 7, player.y + player.h / 2, 7, -1.2, 1.2);
    ctx.stroke();
    // latte surface inside
    ctx.fillStyle = '#6b5a4e';
    ctx.fillRect(player.x + 5, player.y + 5, player.w - 10, 5);
    // tiny heart in the surface
    ctx.fillStyle = 'rgba(196,168,130,0.5)';
    ctx.font = '7px serif';
    ctx.textAlign = 'center';
    ctx.fillText('♥', player.x + player.w / 2, player.y + 10);
  }

  function drawItem(it) {
    ctx.save();
    ctx.translate(it.x, it.y);
    ctx.rotate(it.rot);

    if (it.bad) {
      ctx.font = '20px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('💀', 0, 0);
    } else {
      // coffee bean
      ctx.fillStyle = '#7a4a1e';
      ctx.beginPath();
      ctx.ellipse(0, 0, it.r, it.r * 1.45, 0, 0, Math.PI * 2);
      ctx.fill();
      // crease
      ctx.strokeStyle = '#3e1e06';
      ctx.lineWidth = 1.3;
      ctx.beginPath();
      ctx.moveTo(0, -it.r * 1.3);
      ctx.bezierCurveTo(it.r * 0.6, 0, -it.r * 0.6, 0, 0, it.r * 1.3);
      ctx.stroke();
    }

    ctx.restore();
  }

  function gameOver() {
    running = false;
    ctx.fillStyle = 'rgba(13,10,7,0.80)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#c4a882';
    ctx.font = '600 22px Lora, serif';
    ctx.fillText('game over', W / 2, H / 2 - 16);
    ctx.font = '13px "DM Mono", monospace';
    ctx.fillStyle = '#7a6355';
    ctx.fillText('final score: ' + score, W / 2, H / 2 + 12);
    ctx.fillText('click to restart', W / 2, H / 2 + 36);
    gc.onclick = () => init();
  }

  function loop() {
    if (!running) return;
    drawBg();

    // player movement
    const spd = 5;
    if (keys['ArrowLeft']  || keys['a']) player.x -= spd;
    if (keys['ArrowRight'] || keys['d']) player.x += spd;
    player.x = Math.max(0, Math.min(W - player.w, player.x));

    // spawn
    spawnT++;
    const interval = Math.max(25, 62 - score * 0.5);
    if (spawnT >= interval) { spawnT = 0; spawn(); }
    speed = 1.5 + score * 0.03;

    // update items
    for (let i = falling.length - 1; i >= 0; i--) {
      const it = falling[i];
      it.y   += it.vy;
      it.rot += 0.05;

      drawItem(it);

      // catch (cup rim)
      if (
        it.y + it.r > player.y &&
        it.y - it.r < player.y + 10 &&
        it.x > player.x - 4 &&
        it.x < player.x + player.w + 4
      ) {
        falling.splice(i, 1);
        if (it.bad) {
          lives--;
          updateHUD();
          ctx.fillStyle = 'rgba(160,20,20,0.20)';
          ctx.fillRect(0, 0, W, H);
          if (lives <= 0) { gameOver(); return; }
        } else {
          score++;
          updateHUD();
        }
        continue;
      }

      // missed (fell off)
      if (it.y > H + 20) {
        falling.splice(i, 1);
        if (!it.bad) {
          lives--;
          updateHUD();
          if (lives <= 0) { gameOver(); return; }
        }
      }
    }

    drawCup();
    raf = requestAnimationFrame(loop);
  }

  // open
  avatarBtn.addEventListener('click', () => {
    modal.classList.add('active');
    init();
  });

  // close
  function closeGame() {
    modal.classList.remove('active');
    running = false;
    if (raf) cancelAnimationFrame(raf);
  }

  closeBtn.addEventListener('click', closeGame);
  modal.addEventListener('click', e => { if (e.target === modal) closeGame(); });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && modal.classList.contains('active')) closeGame();
  });
})();
</script>
</body>
</html>
