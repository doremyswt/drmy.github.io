<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>drmy</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080604;--surface:#0f0a06;--border:#1e1208;--border2:#2e1c0c;
  --latte:#c4a882;--latte2:#d8c4a0;--cream:#f4ede2;
  --muted:#6e5540;--muted2:#3e2812;--gold:#ddb84a;
  --sage:#7ab88a;--rose:#c08898;--sky:#7aaccA;--accent:#cfe03c;
}
html{scroll-behavior:smooth}
body{background-color:var(--bg);background-image:radial-gradient(ellipse 110% 60% at 8% -5%,rgba(110,68,26,.22) 0%,transparent 52%),radial-gradient(ellipse 80% 55% at 92% 105%,rgba(72,40,10,.28) 0%,transparent 48%);color:var(--cream);font-family:'Cormorant Garamond','Georgia',serif;min-height:100vh;overflow-x:hidden;}
#vhs-canvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:500;opacity:.28;mix-blend-mode:screen;will-change:contents;}
#vhs-scanlines{position:fixed;inset:0;pointer-events:none;z-index:501;background:repeating-linear-gradient(to bottom,transparent 0,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 3px)}
#vhs-band{position:fixed;left:0;right:0;height:2px;background:rgba(255,255,255,.04);pointer-events:none;z-index:502;top:-6px}
header{position:sticky;top:0;z-index:100;background:rgba(8,6,4,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(48,28,10,.8);overflow:visible;}
header::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(196,168,130,.3) 50%,transparent);}
.header-inner{max-width:1020px;margin:0 auto;padding:18px 40px;display:flex;align-items:center;gap:20px;overflow:visible;}
.avatar-wrap{position:relative;flex-shrink:0;cursor:pointer;user-select:none}
.avatar{width:58px;height:58px;border-radius:50%;object-fit:cover;border:1px solid rgba(196,168,130,.3);display:block;transition:transform .3s cubic-bezier(.22,1,.36,1),box-shadow .3s,filter .3s;filter:sepia(.1) brightness(.95);}
.avatar-wrap:hover .avatar{transform:scale(1.08) rotate(-1deg);filter:sepia(.04) brightness(1.05);box-shadow:0 0 0 2px rgba(196,168,130,.12),0 6px 28px rgba(0,0,0,.7);}
.avatar-ring{position:absolute;inset:-5px;border-radius:50%;border:1px solid transparent;background:linear-gradient(var(--bg),var(--bg)) padding-box,conic-gradient(from 0deg,transparent 20%,rgba(196,168,130,.7) 40%,rgba(221,184,74,.6) 55%,transparent 75%) border-box;animation:spin 9s linear infinite;pointer-events:none;}
@keyframes spin{to{transform:rotate(360deg)}}
.header-text{display:flex;flex-direction:column;gap:2px}
.header-name-row{display:flex;align-items:center;gap:10px}
.header-text h1{font-family:'Cormorant Garamond',serif;font-size:27px;font-weight:600;letter-spacing:.06em;line-height:1;background:linear-gradient(125deg,var(--cream) 0%,var(--latte2) 50%,var(--latte) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.header-text .tagline{font-family:'DM Mono',monospace;font-size:8px;font-weight:300;color:var(--muted);letter-spacing:.22em;text-transform:lowercase;opacity:.7;}
.socials{margin-left:auto;display:flex;align-items:center;gap:6px;overflow:visible}
.socials a{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;border:1px solid var(--border2);background:rgba(20,12,6,.8);transition:border-color .2s,color .2s,transform .2s,box-shadow .2s;text-decoration:none;color:var(--muted);flex-shrink:0;}
.socials a:hover{border-color:rgba(196,168,130,.45);color:var(--latte2);transform:translateY(-4px) scale(1.08);box-shadow:0 6px 18px rgba(0,0,0,.5);}
.socials a svg{width:12px;height:12px;fill:currentColor;display:block}
.socials a img{width:13px;height:13px;object-fit:contain;display:block;filter:brightness(.7);transition:filter .2s}
.socials a:hover img{filter:brightness(.95)}
.vgen-wrap{position:relative;display:flex;align-items:center}
.comm-callout{position:absolute;bottom:calc(100% + 14px);left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:2px;pointer-events:none;animation:bob 2.4s ease-in-out infinite;white-space:nowrap;z-index:200;}
.comm-callout span{font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:.2em;color:var(--accent);text-shadow:0 0 12px rgba(207,224,60,.8);}
.comm-arrow{width:9px;height:13px;color:var(--accent);filter:drop-shadow(0 0 5px rgba(207,224,60,.7));display:block}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-7px)}}
.zt-egg{position:fixed;pointer-events:none;z-index:2;user-select:none;opacity:0;animation:egg-float linear infinite;}
@keyframes egg-float{0%{opacity:0;transform:translateY(0) rotate(0deg);}8%{opacity:.55;}92%{opacity:.55;}100%{opacity:0;transform:translateY(-120px) rotate(var(--rot,8deg));}}
.kanji-stamp{position:absolute;font-family:'Cormorant Garamond',serif;pointer-events:none;user-select:none;color:rgba(196,168,130,.045);font-weight:600;letter-spacing:.05em;line-height:1;z-index:1;}
.section-divider{max-width:1020px;margin:0 auto 40px;padding:44px 40px 0;display:flex;align-items:center;gap:18px;}
.divider-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border2) 20%,rgba(196,168,130,.18) 50%,var(--border2) 80%,transparent);}
.divider-label{font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:.28em;color:rgba(110,85,64,.65);text-transform:lowercase;padding:3px 12px;border:1px solid var(--border2);border-radius:20px;background:rgba(20,12,6,.6);}
.gallery{max-width:1020px;margin:0 auto 100px;padding:0 40px;position:relative}
.item{position:absolute;border-radius:5px;overflow:hidden;background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:transform .32s cubic-bezier(.22,1,.36,1),box-shadow .32s,border-color .32s,filter .32s;filter:brightness(.9) saturate(.85);}
.item:hover{transform:translateY(-7px) scale(1.016);box-shadow:0 22px 55px rgba(0,0,0,.72),0 0 0 1px rgba(196,168,130,.12);border-color:rgba(196,168,130,.16);filter:brightness(1.04) saturate(1.04);}
.item img{width:100%;height:auto;display:block}
.lightbox{position:fixed;inset:0;background:rgba(4,2,1,.97);display:none;justify-content:center;align-items:center;z-index:9999;animation:fadeIn .22s ease;backdrop-filter:blur(4px);}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.lightbox.active{display:flex}
.lightbox img{max-width:86vw;max-height:84vh;object-fit:contain;border-radius:5px;border:1px solid rgba(196,168,130,.1);cursor:zoom-in;transition:transform .14s;box-shadow:0 50px 120px rgba(0,0,0,.95);}
.lb-btn{position:absolute;background:rgba(244,237,226,.05);border:1px solid rgba(196,168,130,.12);color:rgba(244,237,226,.55);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;transition:all .18s;user-select:none;top:50%;transform:translateY(-50%);backdrop-filter:blur(8px);}
.lb-btn:hover{background:rgba(244,237,226,.1);border-color:rgba(196,168,130,.38);color:var(--cream)}
.lb-close{top:16px;right:16px;transform:none;font-size:10px}.lb-prev{left:10px}.lb-next{right:10px}
.lb-counter{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-family:'DM Mono',monospace;font-size:7.5px;color:var(--latte);letter-spacing:.2em;background:rgba(4,2,1,.7);padding:3px 12px;border-radius:20px;border:1px solid var(--border2);}
@media(hover:none)and(pointer:coarse){.lb-prev,.lb-next{display:none}}
footer{text-align:center;padding:38px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.22em;color:var(--muted2);border-top:1px solid var(--border);position:relative;}
footer::before{content:'';position:absolute;top:-1px;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,rgba(196,168,130,.12),transparent);}
#game-modal{position:fixed;inset:0;background:rgba(2,1,0,.99);display:none;z-index:8000}
#game-modal.active{display:block}
#game-canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
.game-topbar{position:absolute;top:0;left:0;right:0;z-index:30;display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:linear-gradient(to bottom,rgba(2,1,0,.88) 0%,transparent 100%);pointer-events:none;}
.game-topbar>*{pointer-events:all}
.game-title{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.22em;color:rgba(196,168,130,.5);text-transform:lowercase;}
.game-topbar-right{display:flex;align-items:center;gap:6px}
.game-close,.game-credits{background:rgba(6,3,1,.88);border:1px solid rgba(46,28,12,.9);font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.1em;padding:4px 11px;border-radius:4px;cursor:pointer;transition:border-color .15s,color .15s;text-decoration:none;display:inline-flex;align-items:center;backdrop-filter:blur(8px);}
.game-close{color:var(--muted)}.game-close:hover{color:var(--cream);border-color:rgba(110,85,64,.6)}
.game-credits{color:rgba(122,172,202,.65);border-color:rgba(122,172,202,.14)}.game-credits:hover{color:#b8e0f0;border-color:rgba(122,172,202,.38)}
.game-bottom{position:absolute;bottom:0;left:0;right:0;z-index:30;padding:6px 22px 14px;background:linear-gradient(to top,rgba(2,1,0,.9) 0%,transparent 100%);pointer-events:none;display:flex;flex-direction:column;gap:4px;align-items:center;}
.game-bottom>*{pointer-events:all}
.hp-bar-wrap{display:flex;align-items:center;gap:8px;width:100%;max-width:280px}
.hp-bar-bg{flex:1;height:2px;background:rgba(255,255,255,.04);border-radius:1px;overflow:hidden}
.hp-bar-fill{height:100%;border-radius:1px;transition:width .18s,background .32s;background:linear-gradient(90deg,var(--latte),var(--gold))}
.hp-label{font-family:'DM Mono',monospace;font-size:7px;color:rgba(110,85,64,.55);letter-spacing:.12em;white-space:nowrap;min-width:40px}
.game-hud-row{display:flex;justify-content:space-between;align-items:center;font-family:'DM Mono',monospace;font-size:9px;color:rgba(110,85,64,.5);letter-spacing:.12em;width:100%;max-width:280px}
.game-hud-row span{color:var(--latte2)}
#game-feedback{font-family:'DM Mono',monospace;font-size:8px;color:rgba(110,85,64,.55);letter-spacing:.16em;text-align:center;height:11px}
.hint{font-family:'DM Mono',monospace;font-size:7px;color:rgba(62,40,18,.75);letter-spacing:.09em}
.hint b{color:rgba(196,168,130,.5);font-weight:500}
/* MENU OVERLAY */
#game-menu{position:absolute;inset:0;z-index:25;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;transition:opacity .22s;}
#game-menu.hidden{opacity:0;pointer-events:none;}
.menu-card{background:rgba(8,4,1,.94);border:1px solid rgba(46,28,12,.9);border-radius:12px;padding:26px 28px 22px;display:flex;flex-direction:column;align-items:center;gap:16px;width:min(320px,86vw);backdrop-filter:blur(20px);pointer-events:all;box-shadow:0 30px 80px rgba(0,0,0,.9),0 0 0 1px rgba(196,168,130,.04);}
.menu-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;color:var(--latte2);letter-spacing:.08em;text-align:center;line-height:1.3;}
.menu-sub{font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:.18em;color:var(--muted);margin-top:-8px;}
.menu-result-box{width:100%;padding:9px 12px;border-radius:6px;border:1px solid rgba(196,168,130,.14);background:rgba(196,168,130,.04);display:flex;flex-direction:column;gap:4px;align-items:center;}
.menu-result-title{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:300;color:var(--latte);}
.menu-result-score{font-family:'DM Mono',monospace;font-size:10px;color:var(--cream);letter-spacing:.1em;}
.menu-result-box.fail{border-color:rgba(196,152,168,.2);}.menu-result-box.fail .menu-result-title{color:#c498a8;}
.menu-settings{width:100%;display:flex;flex-direction:column;gap:10px;}
.setting-row{display:flex;align-items:center;gap:10px;}
.setting-lbl{font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:.13em;color:var(--muted);text-transform:lowercase;min-width:54px;}
.setting-row input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:2px;border-radius:1px;background:rgba(255,255,255,.07);outline:none;cursor:pointer;}
.setting-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:var(--latte);cursor:pointer;border:2px solid rgba(8,4,1,.8);}
.setting-val{font-family:'DM Mono',monospace;font-size:9px;color:var(--cream);min-width:40px;text-align:right;}
.btn-play{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.2em;color:#080401;background:linear-gradient(135deg,#d8c4a0,#c4a882);border:none;border-radius:7px;padding:13px 0;cursor:pointer;transition:transform .14s,box-shadow .14s,filter .14s;text-transform:lowercase;width:100%;box-shadow:0 4px 22px rgba(196,168,130,.3);font-weight:500;}
.btn-play:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(196,168,130,.45);filter:brightness(1.07);}
.btn-play:active{transform:none;box-shadow:0 2px 10px rgba(196,168,130,.2);}
.btn-retry{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.16em;color:var(--latte);background:rgba(196,168,130,.07);border:1px solid rgba(196,168,130,.22);border-radius:7px;padding:10px 0;cursor:pointer;transition:all .14s;text-transform:lowercase;width:100%;}
.btn-retry:hover{background:rgba(196,168,130,.14);border-color:rgba(196,168,130,.42);}
.menu-hint{font-family:'DM Mono',monospace;font-size:7px;color:rgba(62,40,18,.55);letter-spacing:.08em;text-align:center;}
@media(max-width:680px){.gallery,.section-divider{padding-left:18px;padding-right:18px}.header-inner{padding:14px 18px}}
</style>
</head>

<!-- GAME -->
<div id="game-modal">
  <canvas id="game-canvas"></canvas>

  <!-- MENU OVERLAY: shown when idle or after results -->
  <div id="game-menu">
    <div class="menu-card" id="menu-card">
      <!-- idle title / result summary injected by JS -->
      <div id="menu-header">
        <div class="menu-title">勘冴えて悔しいわ</div>
        <div class="menu-sub">shield</div>
      </div>
      <div id="menu-result-box" class="menu-result-box" style="display:none"></div>

        <div class="setting-row">
          <span class="setting-lbl">approach</span>
          <input type="range" id="ar-slider" min="0.2" max="3" step="0.05" value="0.5">
          <span class="setting-val" id="ar-val">0.50s</span>

        <div class="setting-row">
          <span class="setting-lbl">offset</span>
          <input type="range" id="offset-slider" min="-0.5" max="0.5" step="0.01" value="0">

/* VHS */
(function(){
  const cv=document.getElementById('vhs-canvas'),cx=cv.getContext('2d'),bd=document.getElementById('vhs-band');
  let by=-10,bs=0.55,lastGrain=0;
  function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize,{passive:true});
  function tick(ts){
    requestAnimationFrame(tick);
    if(document.hidden)return;
    if(ts-lastGrain<48)return;
    lastGrain=ts;
    const W=cv.width,H=cv.height,id=cx.createImageData(W,H),d=id.data;
    for(let i=0;i<d.length;i+=4)if(Math.random()<.05){const v=Math.random()*180|0;d[i]=v*.65|0;d[i+1]=v*.38|0;d[i+2]=v*.18|0;d[i+3]=Math.random()*32|0;}
    cx.putImageData(id,0,0);
    if(Math.random()<.03){const ly=Math.random()*H|0;cx.fillStyle='rgba(255,238,190,'+(Math.random()*.05).toFixed(3)+')';cx.fillRect(0,ly,W,1);}
    by+=bs;if(by>window.innerHeight+10){by=-10;bs=.3+Math.random()*.65;}
    bd.style.top=by+'px';
  }
  requestAnimationFrame(tick);
})();

/* GALLERY */
(function(){
  const galleryEl=document.getElementById('gallery'),lightbox=document.getElementById('lightbox'),lbImg=document.getElementById('lightbox-img'),lbCounter=document.getElementById('lb-counter');
  let images=[],items=[],currentIndex=0,zoomed=false;
  const GAP=10;
  function numCols(){const w=galleryEl.clientWidth;return w<480?2:w<720?3:4;}
  function layout(){
    const W=galleryEl.clientWidth,cols=numCols(),colW=(W-GAP*(cols-1))/cols,hs=new Array(cols).fill(0);
    items.forEach(({el,img})=>{const nH=img.naturalHeight||0,nW=img.naturalWidth||1,iH=nH?Math.round(colW*nH/nW):colW;let col=0;for(let c=1;c<cols;c++)if(hs[c]<hs[col])col=c;el.style.width=colW+'px';el.style.left=col*(colW+GAP)+'px';el.style.top=hs[col]+'px';hs[col]+=iH+GAP;});
    galleryEl.style.height=Math.max(...hs)-GAP+'px';
  }
  async function loadImages(){try{const r=await fetch('arch/images.json');images=await r.json();}catch{images=[];}images.forEach((url,i)=>{const el=document.createElement('div');el.className='item';const img=document.createElement('img');img.src=url;img.loading='lazy';img.alt='';img.onclick=()=>openLB(i);img.onload=layout;img.onerror=layout;el.appendChild(img);galleryEl.appendChild(el);items.push({el,img});});}
  window.addEventListener('resize',layout,{passive:true});
  function openLB(i){currentIndex=i;lbImg.src=images[i];lbCounter.textContent=(i+1)+' / '+images.length;lightbox.classList.add('active');zoomed=false;lbImg.style.transform='scale(1)';lbImg.style.cursor='zoom-in';}
  const closeLB=()=>lightbox.classList.remove('active');
  const prevLB=()=>{if(currentIndex>0)openLB(currentIndex-1);};
  const nextLB=()=>{if(currentIndex<images.length-1)openLB(currentIndex+1);};
  document.getElementById('lb-close').onclick=closeLB;
  document.getElementById('lb-prev').onclick=prevLB;
  document.getElementById('lb-next').onclick=nextLB;
  lbImg.addEventListener('click',()=>{zoomed=!zoomed;lbImg.style.transform=zoomed?'scale(1.85)':'scale(1)';lbImg.style.cursor=zoomed?'zoom-out':'zoom-in';});
  lbImg.addEventListener('mousemove',e=>{if(!zoomed)return;const r=lbImg.getBoundingClientRect();const x=((e.clientX-r.left)/r.width-.5)*2,y=((e.clientY-r.top)/r.height-.5)*2;lbImg.style.transform='scale(1.85) translate('+(-x*28)+'%,'+(-y*28)+'%)';});
  lbImg.addEventListener('mouseleave',()=>{if(zoomed)lbImg.style.transform='scale(1.85)';});
  lightbox.addEventListener('click',e=>{if(e.target===lightbox)closeLB();});
  let lbTX=null;lightbox.addEventListener('touchstart',e=>{lbTX=e.touches[0].clientX;},{passive:true});
  lightbox.addEventListener('touchend',e=>{if(lbTX===null)return;const dx=e.changedTouches[0].clientX-lbTX;if(Math.abs(dx)>40){dx<0?nextLB():prevLB();}lbTX=null;},{passive:true});
  document.addEventListener('keydown',e=>{if(!lightbox.classList.contains('active'))return;if(e.key==='ArrowRight')nextLB();if(e.key==='ArrowLeft')prevLB();if(e.key==='Escape')closeLB();});
  loadImages();
})();

/* EASTER EGGS */
(function(){
  const chars=['⚗','☽','✦','勘','冴','悔','♩','☕','✧','⌖','彡','幻','夜'];
  const cols=['#c4a882','#9ab8c4','#c49bb8','#b8c49b','#ddb84a','#cfe03c'];
  let pool=[];
  function spawn(){
    if(document.hidden)return;
    const el=document.createElement('div');el.className='zt-egg';
    el.textContent=chars[Math.random()*chars.length|0];
    const dur=8+Math.random()*14,x=5+Math.random()*90,rot=(Math.random()*30-15).toFixed(1)+'deg';
    el.style.cssText=`left:${x}vw;top:${20+Math.random()*65}vh;font-family:'Cormorant Garamond',serif;font-size:${10+Math.random()*16}px;color:${cols[Math.random()*cols.length|0]};--rot:${rot};animation-duration:${dur}s;animation-delay:${Math.random()*4}s;text-shadow:0 0 8px currentColor;`;
    document.body.appendChild(el);pool.push(el);
    setTimeout(()=>{el.remove();pool=pool.filter(e=>e!==el);},(dur+4)*1000);
  }
  for(let i=0;i<4;i++) setTimeout(spawn,i*1800);
  setInterval(()=>{if(pool.length<8)spawn();},3200);
})();

    if(sourceNode){sourceNode.onended=null;try{sourceNode.stop();}catch{}try{sourceNode.disconnect();}catch{}sourceNode=null;}
  }
  /* gameTime: song time in seconds, offset by leadIn so first note at leadIn=3s */
  function gameTime(){
    if(!audioCtx||!sourceNode)return 0;
    return (audioCtx.currentTime-songStartAudioTime) + leadIn + userOffset;
  }

  /* SETTINGS */
  let approachRate = 0.5;
  let userOffset   = 0.0; // seconds — positive = notes come earlier

  arSlider.value = approachRate;
  arSlider.addEventListener('input',()=>{
    approachRate=parseFloat(arSlider.value);
    arVal.textContent=approachRate.toFixed(2)+'s';
  });
  offsetSlider.addEventListener('input',()=>{
    userOffset=parseFloat(offsetSlider.value);
    offsetVal.textContent=(userOffset>=0?'+':'')+userOffset.toFixed(2)+'s';
  });

  /* HITSOUND */
  function blip(ok){
    if(!audioCtx)return;
    const t=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain();
    const ws=audioCtx.createWaveShaper();
    ws.curve=(()=>{const c=new Float32Array(256);for(let i=0;i<128;i++){c[i]=-1;c[i+128]=1;}return c;})();
    o.connect(ws);ws.connect(g);g.connect(audioCtx.destination);o.type='square';
    if(ok){o.frequency.setValueAtTime(1047,t);o.frequency.setValueAtTime(1319,t+.025);g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.0001,t+.065);o.start(t);o.stop(t+.07);}
    else{o.frequency.setValueAtTime(196,t);o.frequency.setValueAtTime(147,t+.03);g.gain.setValueAtTime(.08,t);g.gain.exponentialRampToValueAtTime(.0001,t+.08);o.start(t);o.stop(t+.09);}
    const blen=audioCtx.sampleRate*.022,nb=audioCtx.createBuffer(1,blen,audioCtx.sampleRate),nd=nb.getChannelData(0);
    for(let i=0;i<blen;i++)nd[i]=Math.random()*2-1;
    const ns=audioCtx.createBufferSource(),ng2=audioCtx.createGain();
    ns.buffer=nb;ns.connect(ng2);ng2.connect(audioCtx.destination);
    ng2.gain.setValueAtTime(ok?.055:.04,t);ng2.gain.exponentialRampToValueAtTime(.0001,t+.02);
    ns.start(t);ns.stop(t+.025);
  }

  /* CANVAS */
  const DPR=Math.min(window.devicePixelRatio||1,2);
  let W=0,H=0,CX=0,CY=0,SHIELD_R=0,CUP_R=0;
  function calcSizes(){CX=W/2;CY=H/2;const S=Math.min(W,H);SHIELD_R=S*.108;CUP_R=S*.02;}
  function resizeCanvas(){
    const nw=window.innerWidth,nh=window.innerHeight;
    if(gc.width===Math.round(nw*DPR)&&gc.height===Math.round(nh*DPR))return;
    gc.width=Math.round(nw*DPR);gc.height=Math.round(nh*DPR);
    gc.style.width=nw+'px';gc.style.height=nh+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);W=nw;H=nh;calcSizes();
  }

  /* SHIELD */
  const GRACE=0.12;
  const COLS=['#e8c49a','#9ab8e8','#c498a8','#8ac49a'];
  const LABELS=['\u2190','\u2191','\u2192','\u2193'];
  const DIR_KEYS={'arrowleft':0,'a':0,'arrowup':1,'w':1,'arrowright':2,'d':2,'arrowdown':3,'s':3};
  const SHIELD_ARC=[[Math.PI*.58,Math.PI*1.42],[Math.PI*1.08,Math.PI*1.92],[-Math.PI*.42,Math.PI*.42],[Math.PI*.08,Math.PI*.92]];
  let shieldDir=0,prevDir=-1,prevAt=-999;
  function rotateShield(dir){if(dir===shieldDir)return;prevDir=shieldDir;prevAt=performance.now()/1000;shieldDir=dir;}
  function shieldCovers(dir){return shieldDir===dir||(prevDir===dir&&(performance.now()/1000-prevAt)<GRACE);}

  /* STATE */
  const MAX_HP=10;
  let score,combo,hp,phase='idle',raf=null,arrows=[],particles=[],bmIdx=0;

  function resetState(){
    score=0;combo=0;hp=MAX_HP;arrows=[];particles=[];
    bmIdx=0;shieldDir=0;prevDir=-1;prevAt=-999;songStartAudioTime=0;
    updateHUD();feedback.textContent='';
  }
  function updateHUD(){
    hudScore.textContent=score;hudCombo.textContent=combo;
    const p=Math.max(0,hp/MAX_HP*100);hpFill.style.width=p+'%';
    hpFill.style.background=hp>MAX_HP*.5?'linear-gradient(90deg,#c4a882,#e8c870)':hp>MAX_HP*.25?'linear-gradient(90deg,#c4a882,#e8a040)':'linear-gradient(90deg,#c498a8,#e87878)';
    hpLabel.textContent='hp '+hp+'/'+MAX_HP;
  }

  /* MENU SHOW/HIDE */
  function showMenu(isResult){
    gameMenu.classList.remove('hidden');
    if(isResult){
      const won=hp>0;
      menuResultBox.className='menu-result-box'+(won?'':' fail');
      menuResultBox.innerHTML=
        '<div class="menu-result-title">'+(won?'coffee safe \u2615':'the coffee spilled\u2026')+'</div>'+
        '<div class="menu-result-score">score '+score+'&nbsp;&nbsp;&middot;&nbsp;&nbsp;'+(score>5000?'perfect guard \u2726':score>2000?'well done~':'try again \u2661')+'</div>';
      menuResultBox.style.display='flex';
      btnRetry.style.display='block';
      btnPlay.textContent='\u25b6 play again';
    } else {
      menuResultBox.style.display='none';
      btnRetry.style.display='none';
      btnPlay.textContent='\u25b6 play';
    }
  }
  function hideMenu(){
    gameMenu.classList.add('hidden');
  }

  /* SPAWN — arrow reaches SHIELD_R in exactly approachRate seconds */
  function spawnPos(dir){
    switch(dir){
      case 0:return{x:0,   y:CY, nx:1, ny:0};
      case 1:return{x:CX,  y:0,  nx:0, ny:1};
      case 2:return{x:W,   y:CY, nx:-1,ny:0};
      case 3:return{x:CX,  y:H,  nx:0, ny:-1};
    }
  }
  function spawnArrow(dir){
    const p=spawnPos(dir);
    const distToShield=Math.hypot(p.x-CX,p.y-CY)-SHIELD_R;
    const spd=distToShield/approachRate;
    arrows.push({x:p.x,y:p.y,vx:p.nx*spd,vy:p.ny*spd,dir,color:COLS[dir],label:LABELS[dir],pastShield:false,dead:false});
  }

  /* COLLISION */
  function checkCollisions(){
    for(const a of arrows){
      if(a.dead)continue;
      const dist=Math.hypot(a.x-CX,a.y-CY);
      if(!a.pastShield){
        if(dist<=SHIELD_R+1){
          if(shieldCovers(a.dir)){
            a.dead=true;combo++;score+=100+combo*10;burst(a.x,a.y,a.color,10);blip(true);
            feedback.textContent=combo>=10?combo+'\xd7 COMBO!! \u2615':combo>=5?combo+'\xd7 combo!':'parried!';
            feedback.style.color='#8ac49a';updateHUD();
          } else {a.pastShield=true;}
        }
      } else {
        if(dist<=SHIELD_R-16){
          a.dead=true;hp=Math.max(0,hp-1);combo=0;burst(a.x,a.y,'#c498a8',10);blip(false);
          feedback.textContent=hp<=0?'the coffee!! \ud83d\ude31':hp<=2?'careful!!':'ouch!';
          feedback.style.color='#c498a8';
          if(hp<=0){phase='results';stopAudio();showMenu(true);}
          updateHUD();
        }
        if(dist>Math.hypot(W,H))a.dead=true;
      }
    }
    arrows=arrows.filter(a=>!a.dead);
  }

  /* DRAW */
  let _bgGrad=null,_bgGradW=0,_bgGradH=0;
  function drawBg(){
    ctx.clearRect(0,0,W,H);
    if(_bgGradW!==W||_bgGradH!==H){_bgGrad=ctx.createRadialGradient(CX,CY,0,CX,CY,Math.hypot(W,H)/1.5);_bgGrad.addColorStop(0,'rgba(22,12,4,.97)');_bgGrad.addColorStop(1,'rgba(3,1,0,1)');_bgGradW=W;_bgGradH=H;}
    ctx.fillStyle=_bgGrad;ctx.fillRect(0,0,W,H);
    const S=Math.min(W,H),maxR=Math.max(W,H)*.9;
    for(let r=S*.05;r<maxR;r+=S*.07){const a=Math.max(0,.06*(1-r/maxR));ctx.strokeStyle='rgba(50,22,5,'+a+')';ctx.lineWidth=4+r/maxR*5;ctx.beginPath();ctx.arc(CX,CY,r,0,Math.PI*2);ctx.stroke();}
    const vg=ctx.createRadialGradient(CX,CY,Math.min(W,H)*.22,CX,CY,Math.max(W,H)*.78);vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.68)');ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(196,168,130,.04)';ctx.lineWidth=1;ctx.setLineDash([2,9]);ctx.beginPath();ctx.arc(CX,CY,SHIELD_R,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
  }
  function drawShield(nowSec){
    const S=Math.min(W,H),lw=S*.013;
    const[a0,a1]=SHIELD_ARC[shieldDir],col=COLS[shieldDir];
    ctx.save();ctx.strokeStyle=col+'22';ctx.lineWidth=lw*3.5;ctx.lineCap='round';ctx.shadowColor=col;ctx.shadowBlur=S*.05;ctx.beginPath();ctx.arc(CX,CY,SHIELD_R,a0,a1);ctx.stroke();
    ctx.strokeStyle=col+'cc';ctx.lineWidth=lw;ctx.shadowBlur=S*.02;ctx.beginPath();ctx.arc(CX,CY,SHIELD_R,a0,a1);ctx.stroke();ctx.restore();
    const grace=Math.max(0,1-(nowSec-prevAt)/GRACE);
    if(prevDir>=0&&grace>0){const[ga0,ga1]=SHIELD_ARC[prevDir];ctx.save();ctx.strokeStyle=COLS[prevDir]+(Math.round(grace*40).toString(16).padStart(2,'0'));ctx.lineWidth=lw*.45;ctx.lineCap='round';ctx.setLineDash([3,7]);ctx.beginPath();ctx.arc(CX,CY,SHIELD_R,ga0,ga1);ctx.stroke();ctx.setLineDash([]);ctx.restore();}
    const D=SHIELD_R*1.52,fs=Math.max(10,Math.min(W,H)*.016);
    [{dir:0,x:CX-D,y:CY},{dir:1,x:CX,y:CY-D},{dir:2,x:CX+D,y:CY},{dir:3,x:CX,y:CY+D}].forEach(({dir,x,y})=>{
      const active=dir===shieldDir,inGrace=dir===prevDir&&grace>0;
      ctx.save();ctx.font='bold '+fs+'px "DM Mono",monospace';ctx.textAlign='center';ctx.textBaseline='middle';
      if(active){ctx.fillStyle=COLS[dir];ctx.shadowColor=COLS[dir];ctx.shadowBlur=10;}
      else if(inGrace){ctx.fillStyle=COLS[dir]+(Math.round(grace*60).toString(16).padStart(2,'0'));}
      else{ctx.fillStyle=COLS[dir]+'18';}
      ctx.fillText(LABELS[dir],x,y);ctx.restore();
    });
  }
  function drawCup(){
    const r=CUP_R,bw=r*2.5,bh=r*2.2;
    ctx.save();ctx.shadowColor='rgba(196,168,130,.2)';ctx.shadowBlur=8;
    ctx.beginPath();ctx.ellipse(CX,CY+bh*.55,bw*.5,r*.3,0,0,Math.PI*2);ctx.fillStyle='#201008';ctx.fill();ctx.strokeStyle='rgba(196,168,130,.5)';ctx.lineWidth=.65;ctx.stroke();
    ctx.beginPath();ctx.roundRect(CX-bw/2,CY-bh/2,bw,bh,r*.3);ctx.fillStyle='#140a04';ctx.fill();ctx.strokeStyle='rgba(196,168,130,.58)';ctx.lineWidth=.8;ctx.stroke();
    ctx.strokeStyle='rgba(196,168,130,.5)';ctx.lineWidth=.7;ctx.beginPath();ctx.arc(CX+bw/2+r*.35,CY,r*.38,-Math.PI*.42,Math.PI*.42);ctx.stroke();
    ctx.beginPath();ctx.ellipse(CX,CY-bh*.14,bw*.3,bh*.09,0,0,Math.PI*2);ctx.fillStyle='#090401';ctx.fill();ctx.strokeStyle='rgba(88,62,38,.55)';ctx.lineWidth=.5;ctx.stroke();
    ctx.fillStyle='rgba(196,168,130,.38)';ctx.beginPath();const hx=CX,hy=CY-bh*.1,hr=r*.2;
    ctx.moveTo(hx,hy+hr);ctx.bezierCurveTo(hx,hy-hr*1.5,hx-hr*2.4,hy-hr*.75,hx-hr*2.4,hy+hr*.3);ctx.bezierCurveTo(hx-hr*2.4,hy+hr*2,hx,hy+hr*3.3,hx,hy+hr*3.3);ctx.bezierCurveTo(hx,hy+hr*3.3,hx+hr*2.4,hy+hr*2,hx+hr*2.4,hy+hr*.3);ctx.bezierCurveTo(hx+hr*2.4,hy-hr*.75,hx,hy-hr*1.5,hx,hy+hr);ctx.fill();ctx.restore();
    const t=performance.now()/1000;
    for(let i=0;i<2;i++){const sx=CX+(i===0?-r*.44:r*.38),wv=Math.sin(t*1.4+i*2)*r*.15;ctx.save();ctx.strokeStyle='rgba(107,86,68,.35)';ctx.lineWidth=.8;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(sx,CY-bh*.52);ctx.quadraticCurveTo(sx+wv,CY-bh*.84,sx-wv,CY-bh*1.16);ctx.stroke();ctx.restore();}
  }
  function drawArrows(dt){
    const S=Math.min(W,H),sz=S*.016,trail=sz*3.6;
    for(const a of arrows){
      if(a.dead)continue;
      a.x+=a.vx*dt;a.y+=a.vy*dt;
      const dist=Math.hypot(a.x-CX,a.y-CY),maxD=Math.hypot(W/2,H/2);
      const alpha=Math.min(1,.1+(maxD-dist)/(maxD-SHIELD_R)*1.08);
      const angle=Math.atan2(a.vy,a.vx);
      ctx.save();ctx.globalAlpha=Math.max(0,Math.min(1,alpha));ctx.translate(a.x,a.y);ctx.rotate(angle);
      ctx.shadowColor=a.pastShield?'#c498a8':a.color;ctx.shadowBlur=a.pastShield?sz*1.8:sz*.6;
      const tg=ctx.createLinearGradient(-trail,0,0,0);tg.addColorStop(0,'transparent');tg.addColorStop(1,a.color+(a.pastShield?'99':'32'));
      ctx.strokeStyle=tg;ctx.lineWidth=a.pastShield?sz*.5:sz*.34;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(-trail,0);ctx.lineTo(-sz*.1,0);ctx.stroke();
      ctx.fillStyle=a.color;ctx.beginPath();ctx.moveTo(sz,0);ctx.lineTo(-sz*.4,-sz*.56);ctx.lineTo(-sz*.1,0);ctx.lineTo(-sz*.4,sz*.56);ctx.closePath();ctx.fill();
      ctx.restore();
      ctx.save();ctx.globalAlpha=Math.max(0,Math.min(1,alpha))*.68;ctx.font='bold '+(sz*.78)+'px "DM Mono",monospace';ctx.fillStyle=a.color;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(a.label,a.x+Math.cos(angle+Math.PI/2)*sz,a.y+Math.sin(angle+Math.PI/2)*sz);ctx.restore();
    }
  }
  function drawParticles(nowSec){
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i],age=nowSec-p.born;if(age>.5){particles.splice(i,1);continue;}
      ctx.save();ctx.globalAlpha=(1-age/.5)*.85;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x+p.vx*age*75,p.y+p.vy*age*75,p.r*(1-age*.5),0,Math.PI*2);ctx.fill();ctx.restore();
    }
  }
  function burst(x,y,color,n){const now=performance.now()/1000;for(let i=0;i<n;i++){const a=Math.PI*2*i/n+Math.random()*.4;particles.push({x,y,vx:Math.cos(a),vy:Math.sin(a),r:1.5+Math.random()*2.5,color,born:now});}}
  function overlayDark(a){const vg=ctx.createRadialGradient(CX,CY,0,CX,CY,Math.max(W,H)*.65);vg.addColorStop(0,'rgba(10,5,2,'+a*.82+')');vg.addColorStop(1,'rgba(2,1,0,'+a+')');ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);}
  function txt(str,x,y,font,color,blur){ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle=color;ctx.font=font;if(blur){ctx.shadowColor=color;ctx.shadowBlur=blur;}ctx.fillText(str,x,y);ctx.restore();}

  /* MAIN LOOP */
  let lastT=null;
  function loop(){
    const nowMs=performance.now(),nowSec=nowMs/1000;
    const dt=lastT!==null?Math.min(nowSec-lastT,.05):0;lastT=nowSec;
    resizeCanvas();

    if(phase==='playing'){
      const gt=gameTime();
      /* Spawn: arrow must arrive at shield in approachRate seconds.
         Beat times include leadIn offset. userOffset shifts when notes appear. */
      while(bmIdx<BEATMAP.length&&gt>=BEATMAP[bmIdx].time-approachRate){
        spawnArrow(BEATMAP[bmIdx].dir);bmIdx++;
      }
      drawBg();checkCollisions();drawShield(nowSec);drawArrows(dt);drawParticles(nowSec);drawCup();
      if(combo>=3){ctx.save();ctx.font='bold '+(10+Math.min(combo,20)*.28)+'px "DM Mono",monospace';ctx.fillStyle=combo>=10?'#d4f030':'#c4a882';ctx.textAlign='center';ctx.textBaseline='middle';ctx.globalAlpha=.32;ctx.fillText(combo+'\xd7',CX,CY+SHIELD_R*1.55);ctx.restore();}
      if(!sourceNode&&bmIdx>=BEATMAP.length&&arrows.length===0){phase='results';showMenu(true);}
    } else {
      /* idle or results — draw background + shield decoratively */
      drawBg();drawShield(nowSec);drawCup();overlayDark(.55);
    }
    raf=requestAnimationFrame(loop);
  }

  /* INPUT — only shield rotation during play, never starts game */
  function onDir(dir){
    if(phase==='playing')rotateShield(dir);
  }
  document.addEventListener('keydown',e=>{
    if(!modal.classList.contains('active'))return;
    /* Don't consume events when focus is on a slider */
    if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT'||e.target.tagName==='BUTTON')return;
    const k=e.key.toLowerCase();
    if(k in DIR_KEYS){e.preventDefault();onDir(DIR_KEYS[k]);return;}
    if(e.key==='Escape'){e.preventDefault();closeGame();}
  });
  function quadrant(x,y){const dx=x-CX,dy=y-CY;return Math.abs(dx)>Math.abs(dy)?(dx<0?0:2):(dy<0?1:3);}
  gc.addEventListener('touchstart',e=>{
    e.preventDefault();
    const r=gc.getBoundingClientRect();
    for(const t of e.changedTouches)onDir(quadrant(t.clientX-r.left,t.clientY-r.top));
  },{passive:false});
  gc.addEventListener('click',e=>{
    if(phase==='playing'){const r=gc.getBoundingClientRect();onDir(quadrant(e.clientX-r.left,e.clientY-r.top));}
  });

  /* PLAY / RETRY BUTTONS */
  async function startGame(){
    initAudio();if(audioCtx.state==='suspended')await audioCtx.resume();
    if(!audioLoaded)await loadAudio();
    hideMenu();
    resetState();phase='playing';lastT=null;
    startAudio();
  }
  btnPlay.addEventListener('click',startGame);
  btnRetry.addEventListener('click',startGame);

  function closeGame(){
    stopAudio();phase='idle';modal.classList.remove('active');
    if(raf){cancelAnimationFrame(raf);raf=null;}
    arrows=[];particles=[];feedback.textContent='';lastT=null;
  }

  avatarBtn.addEventListener('click',()=>{
    modal.classList.add('active');W=window.innerWidth;H=window.innerHeight;
    resizeCanvas();calcSizes();initAudio();loadAudio();
    phase='idle';resetState();lastT=null;
    showMenu(false);
    if(raf)cancelAnimationFrame(raf);
    raf=requestAnimationFrame(loop);
  });
  closeBtn.addEventListener('click',closeGame);
  modal.addEventListener('click',e=>{if(e.target===modal)closeGame();});
  window.addEventListener('resize',()=>{if(modal.classList.contains('active')){W=window.innerWidth;H=window.innerHeight;calcSizes();}},{passive:true});
})();
</script>
